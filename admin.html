<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - Master Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .hidden-panel { display: none !important; }
        .card { background: white; border-radius: 1.2rem; padding: 1.2rem; border: 1px solid #e2e8f0; }
        .selected-row { background-color: #eff6ff !important; border-left: 5px solid #3b82f6; }
        .low-stock { background-color: #fef2f2; border-left: 5px solid #ef4444; }
        
        /* PDF Template Style */
        #pdf-content { font-family: 'Hanuman', serif; padding: 30px; color: black; background: white; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #333; padding: 8px; text-align: left; font-size: 12px; }
        .pdf-table th { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-[2.5rem] shadow-2xl text-center border">
        <h1 class="font-bold text-blue-900 text-2xl mb-6 italic uppercase">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl text-center mb-4 outline-none focus:ring-2 ring-blue-500">
        <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="dashboard-panel" class="hidden-panel max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center bg-white p-6 rounded-[2rem] shadow-sm border">
            <h2 class="text-xl font-bold text-blue-900 uppercase">Roththa Shop Control</h2>
            <button onclick="window.location.reload()" class="text-red-500 p-2"><i class="fas fa-power-off text-2xl"></i></button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button onclick="window.showPanel('admin-main')" class="card flex flex-col items-center p-10 hover:bg-blue-50">
                <i class="fas fa-warehouse text-4xl text-blue-600 mb-4"></i>
                <span class="font-bold">គ្រប់គ្រងស្តុក & Export PDF</span>
            </button>
            <button onclick="window.showPanel('pos-panel')" class="card flex flex-col items-center p-10 border-2 border-emerald-200 hover:bg-emerald-50">
                <i class="fas fa-shopping-cart text-4xl text-emerald-600 mb-4"></i>
                <span class="font-bold">ផ្ទាំងលក់ទំនិញ (POS)</span>
            </button>
            <button onclick="window.showPanel('report-panel')" class="card flex flex-col items-center p-10 hover:bg-purple-50">
                <i class="fas fa-file-invoice-dollar text-4xl text-purple-600 mb-4"></i>
                <span class="font-bold">របាយការណ៍លក់</span>
            </button>
        </div>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border">
            <button onclick="window.showPanel('dashboard-panel')" class="bg-gray-100 px-4 py-2 rounded-xl font-bold text-xs">Dashboard</button>
            <div class="flex gap-2">
                <button onclick="window.exportSelectedPDF()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md"><i class="fas fa-file-pdf mr-2"></i>Export Selected PDF</button>
                <button onclick="window.showPanel('setup-panel')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">កំណត់ប្រភេទ</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="card border-t-8 border-blue-600 sticky top-4">
                    <h2 id="form-title" class="font-bold mb-4 text-blue-700 italic uppercase underline text-[10px]">បញ្ចូលទំនិញ</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-3">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-3 bg-gray-50 border rounded-xl text-xs outline-none">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-3 bg-blue-50 border rounded-xl text-[10px] font-bold"></select>
                            <select id="p-sup-select" class="w-1/2 p-3 bg-orange-50 border rounded-xl text-[10px] font-bold"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ $" class="w-1/2 p-3 border rounded-xl text-xs font-bold text-emerald-600">
                            <input type="number" id="p-stock" placeholder="ចំនួនស្តុក" class="w-1/2 p-3 border rounded-xl text-xs">
                        </div>
                        <input type="file" id="p-file" class="w-full text-[10px] border border-dashed p-2 rounded-xl">
                        <input type="hidden" id="p-img">
                        <button onclick="window.saveProduct()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">រក្សាទុក</button>
                        <button id="cancel-btn" onclick="window.clearForm()" class="hidden w-full bg-gray-400 text-white py-2 rounded-xl text-[10px]">បោះបង់</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-xs italic uppercase">បញ្ជីស្តុក</h2>
                        <input type="text" id="search-p" onkeyup="window.filterTable('product-table-body', 'search-p')" placeholder="ស្វែងរក..." class="p-2 border rounded-xl text-[10px] outline-none">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="py-3 px-2"><input type="checkbox" id="select-all" onclick="window.toggleAll(this)"></th>
                                    <th>រូបភាព</th>
                                    <th>ឈ្មោះទំនិញ</th>
                                    <th class="text-center">ស្តុក</th>
                                    <th class="text-right">តម្លៃ</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="pos-panel" class="hidden-panel max-w-7xl mx-auto space-y-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border no-print">
            <button onclick="window.showPanel('dashboard-panel')" class="bg-gray-100 px-4 py-2 rounded-xl font-bold text-xs">Dashboard</button>
            <h2 class="font-bold text-emerald-600 uppercase italic">POS - លក់ទំនិញ</h2>
            <input type="text" id="search-pos" onkeyup="window.filterTable('pos-item-list', 'search-pos')" placeholder="ស្វែងរកទំនិញលក់..." class="p-2 border rounded-xl text-[10px] outline-none">
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 no-print h-[600px] overflow-y-auto pr-2">
                <div id="pos-item-list" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            </div>
            <div class="lg:col-span-5">
                <div class="card h-full flex flex-col border-2 border-blue-100" id="receipt-area">
                    <div id="invoice-header" class="hidden text-center border-b pb-4 mb-4">
                        <h1 class="text-xl font-bold">ROTH THA SHOP</h1>
                        <p class="text-[10px]">វិក្កយបត្រលក់ / SALES INVOICE</p>
                        <p id="inv-date" class="text-[9px]"></p>
                    </div>
                    <div id="cart-list" class="flex-grow space-y-2 overflow-y-auto mb-4 min-h-[300px]"></div>
                    <div class="border-t pt-4">
                        <div class="flex justify-between font-bold text-2xl text-blue-900 mb-4">
                            <span>សរុប:</span><span id="cart-total">$0.00</span>
                        </div>
                        <button onclick="window.checkout()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg no-print">ទូទាត់ & បោះពុម្ព</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="report-panel" class="hidden-panel max-w-5xl mx-auto space-y-6">
        <button onclick="window.showPanel('dashboard-panel')" class="bg-white p-3 rounded-xl border">Back</button>
        <div class="card">
            <h2 class="font-bold mb-4 text-purple-600">ប្រវត្តិលក់</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-gray-50 border-b">
                        <tr><th>កាលបរិច្ឆេទ</th><th>វិក្កយបត្រ</th><th>ទំនិញ</th><th class="text-right">សរុប</th><th class="text-center">Action</th></tr>
                    </thead>
                    <tbody id="order-history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div style="display: none;">
        <div id="pdf-content">
            <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px;">
                <h1 style="font-size: 24px; margin: 0;">ROTH THA SHOP - STOCK REPORT</h1>
                <p id="pdf-date" style="font-size: 10px;"></p>
            </div>
            <table class="pdf-table">
                <thead>
                    <tr><th>ល.រ</th><th>ឈ្មោះទំនិញ</th><th>ស្តុក</th><th>តម្លៃរាយ</th><th>សរុប</th></tr>
                </thead>
                <tbody id="pdf-table-body"></tbody>
            </table>
            <div style="margin-top: 20px; text-align: right;">
                <h3 id="pdf-grand-total" style="font-size: 16px;"></h3>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = [];
        let allProducts = [];

        // --- NAVIGATION ---
        window.showPanel = (id) => {
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden-panel'));
            document.getElementById(id).classList.remove('hidden-panel');
            if(id === 'admin-main') window.loadAll();
            if(id === 'pos-panel') window.loadPosItems();
            if(id === 'report-panel') window.loadOrders();
        };

        document.getElementById('login-btn').onclick = () => {
            if(document.getElementById('admin-pass').value === "12345") window.showPanel('dashboard-panel');
            else alert("កូដខុស!");
        };

        // --- STOCK ACTIONS ---
        window.loadAll = async () => {
            const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            const body = document.getElementById('product-table-body');
            body.innerHTML = "";
            let i = 1;
            snap.forEach(d => {
                const p = d.data();
                const isLow = p.stock < 5 ? 'low-stock' : '';
                body.innerHTML += `
                    <tr class="border-b ${isLow}" id="row-${d.id}">
                        <td class="p-3"><input type="checkbox" class="row-checkbox" data-id="${d.id}" data-name="${p.name}" data-stock="${p.stock}" data-price="${p.price}" onclick="window.rowSelect('${d.id}', this)"></td>
                        <td class="p-1"><img src="${p.img || 'https://via.placeholder.com/40'}" class="w-10 h-10 object-cover rounded"></td>
                        <td class="font-bold text-blue-900">${p.name}</td>
                        <td class="text-center font-bold">${p.stock}</td>
                        <td class="text-right font-bold">$${p.price.toFixed(2)}</td>
                        <td class="text-center">
                            <button onclick="window.editProduct('${d.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                            <button onclick="window.deleteItem('products','${d.id}')" class="text-red-300"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            window.loadSettings();
        };

        window.rowSelect = (id, el) => {
            const row = document.getElementById('row-' + id);
            if(el.checked) row.classList.add('selected-row');
            else row.classList.remove('selected-row');
        };

        window.toggleAll = (master) => {
            document.querySelectorAll('.row-checkbox').forEach(c => {
                c.checked = master.checked;
                window.rowSelect(c.dataset.id, c);
            });
        };

        // --- PDF EXPORT (SELECTED) ---
        window.exportSelectedPDF = () => {
            const selected = document.querySelectorAll('.row-checkbox:checked');
            if(selected.length === 0) return alert("សូមជ្រើសរើសទំនិញ!");

            const pdfBody = document.getElementById('pdf-table-body');
            pdfBody.innerHTML = "";
            let grandTotal = 0;
            let i = 1;

            selected.forEach(chk => {
                const total = chk.dataset.stock * chk.dataset.price;
                grandTotal += total;
                pdfBody.innerHTML += `<tr><td>${i++}</td><td>${chk.dataset.name}</td><td>${chk.dataset.stock}</td><td>$${chk.dataset.price}</td><td>$${total.toFixed(2)}</td></tr>`;
            });

            document.getElementById('pdf-grand-total').innerText = "សរុប: $" + grandTotal.toFixed(2);
            document.getElementById('pdf-date').innerText = "កាលបរិច្ឆេទ: " + new Date().toLocaleString();
            
            html2pdf().from(document.getElementById('pdf-content')).set({ filename: 'Roththa_Stock.pdf', html2canvas: { scale: 2 } }).save();
        };

        // --- POS ACTIONS ---
        window.loadPosItems = async () => {
            const snap = await getDocs(query(collection(db, "products"), orderBy("name")));
            const list = document.getElementById('pos-item-list');
            list.innerHTML = "";
            allProducts = [];
            snap.forEach(d => {
                const p = d.data();
                allProducts.push({ id: d.id, ...p });
                list.innerHTML += `
                    <div onclick="window.addToCart('${d.id}')" class="bg-white card border p-3 cursor-pointer hover:border-emerald-500 text-center">
                        <img src="${p.img || 'https://via.placeholder.com/60'}" class="w-16 h-16 object-cover mx-auto mb-1 rounded border">
                        <h4 class="font-bold text-[10px] text-blue-900 truncate">${p.name}</h4>
                        <p class="text-xs text-emerald-600 font-bold">$${p.price.toFixed(2)}</p>
                        <p class="text-[8px] text-gray-400 italic">ស្តុក: ${p.stock}</p>
                    </div>`;
            });
        };

        window.addToCart = (id) => {
            const p = allProducts.find(x => x.id === id);
            if(p.stock <= 0) return alert("អស់ស្តុក!");
            const exist = cart.find(x => x.id === id);
            if(exist) { if(exist.qty < p.stock) exist.qty++; else return; }
            else { cart.push({ ...p, qty: 1 }); }
            window.renderCart();
        };

        window.renderCart = () => {
            const list = document.getElementById('cart-list');
            let total = 0; list.innerHTML = "";
            cart.forEach((item, idx) => {
                total += item.price * item.qty;
                list.innerHTML += `<div class="flex justify-between bg-gray-50 p-2 rounded-xl border text-[10px]">
                    <div><b>${item.name}</b><br>$${item.price} x ${item.qty}</div>
                    <button onclick="window.removeCart(${idx})" class="text-red-500"><i class="fas fa-times"></i></button>
                </div>`;
            });
            document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
        };

        window.removeCart = (idx) => { cart.splice(idx, 1); window.renderCart(); };

        window.checkout = async () => {
            if(cart.length === 0) return;
            const batch = writeBatch(db);
            let total = 0;
            let summary = cart.map(i => `${i.name}(x${i.qty})`).join(", ");
            
            cart.forEach(item => {
                total += item.price * item.qty;
                batch.update(doc(db, "products", item.id), { stock: item.stock - item.qty });
            });
            
            await addDoc(collection(db, "orders"), { items: summary, total, createdAt: serverTimestamp() });
            await batch.commit();
            
            document.getElementById('invoice-header').classList.remove('hidden');
            document.getElementById('inv-date').innerText = new Date().toLocaleString();
            window.print();
            document.getElementById('invoice-header').classList.add('hidden');
            
            cart = []; window.renderCart(); window.loadPosItems();
            alert("លក់រួចរាល់!");
        };

        // --- UTILS ---
        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat-select').value,
                supplier: document.getElementById('p-sup-select').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                img: document.getElementById('p-img').value || "",
                updatedAt: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            window.clearForm(); window.loadAll();
        };

        document.getElementById('p-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => document.getElementById('p-img').value = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        window.deleteItem = async (col, id) => { if(confirm("លុប?")) { await deleteDoc(doc(db, col, id)); window.loadAll(); } };
        window.clearForm = () => { document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = ""; document.getElementById('cancel-btn').classList.add('hidden'); };
        
        window.loadSettings = async () => {
            const cSnap = await getDocs(collection(db, "categories"));
            const sSnap = await getDocs(collection(db, "suppliers"));
            const cSel = document.getElementById('p-cat-select');
            const sSel = document.getElementById('p-sup-select');
            cSel.innerHTML = sSel.innerHTML = "";
            cSnap.forEach(d => cSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
            sSnap.forEach(d => sSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
        };

        window.filterTable = (bodyId, inputId) => {
            const val = document.getElementById(inputId).value.toLowerCase();
            const items = document.getElementById(bodyId).children;
            for(let item of items) item.style.display = item.innerText.toLowerCase().includes(val) ? '' : 'none';
        };

    </script>
</body>
</html>
