<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Construction - Order System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f3f4f6; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-lg leading-none">Roththa Construction</h1>
        <div class="relative cursor-pointer p-1" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full px-1.5 font-bold border-2 border-blue-800">0</span>
        </div>
    </nav>

    <div class="p-4 sticky top-16 bg-white z-40 border-b">
        <input type="text" id="search-input" onkeyup="searchProduct()" 
            class="w-full p-3 rounded-xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none" 
            placeholder="ស្វែងរកសម្ភារៈសំណង់...">
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4 mb-24">
        </div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-4 bg-blue-800 text-white flex justify-between items-center">
            <span class="font-bold uppercase tracking-wider italic">កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-3xl p-2">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3 bg-gray-50 text-sm">
            <p class="text-center text-gray-400 mt-20 italic">មិនទាន់មានទំនិញ</p>
        </div>

        <div class="p-5 border-t bg-white shadow-inner">
            <div class="mb-4 text-left">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">ឈ្មោះអតិថិជន (Auto)</label>
                <input type="text" id="cust-name" readonly 
                    class="w-full mt-1 p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-800 outline-none">
            </div>
            
            <div class="flex justify-between items-center font-bold text-xl mb-6">
                <span class="text-gray-500 text-lg">សរុបរួម:</span>
                <span id="cart-total" class="text-red-600 font-black">$0.00</span>
            </div>

            <button id="btn-checkout" onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                <i class="fas fa-paper-plane"></i> បញ្ជាក់ការកុម្ម៉ង់
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const products = [
            { id: 1, name: "ស៊ីម៉ងត៍ K-Cement", price: 5.50, img: "https://via.placeholder.com/200?text=K-Cement" },
            { id: 2, name: "ដែកសរសៃ ១២លី", price: 0.85, img: "https://via.placeholder.com/200?text=Steel" },
            { id: 3, name: "ការ៉ូបាត 60x60", price: 12.00, img: "https://via.placeholder.com/200?text=Tiles" },
            { id: 4, name: "ថ្នាំលាប Nippon", price: 45.00, img: "https://via.placeholder.com/200?text=Paint" }
            { id: 5, name: "Cement huaxin", price: 7.00, img: "https://ibb.co/2YpvVZGx" },
           ];

        let cart = [];

        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            document.getElementById('cust-name').value = user ? (user.first_name + " " + (user.last_name || "")).trim() : "ភ្ញៀវទូទៅ";
            renderProducts(products);
        };

        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <img src="${p.img}" class="w-full h-24 object-cover rounded-xl mb-2">
                    <h3 class="font-bold text-xs h-8 overflow-hidden">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-red-500 font-bold text-sm">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart(${p.id})" class="bg-blue-700 text-white p-2 rounded-lg text-xs">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function searchProduct() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(term)));
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            exist ? exist.qty++ : cart.push({ ...product, qty: 1 });
            updateCartUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-20 italic">មិនទាន់មានទំនិញ</p>';
                document.getElementById('cart-total').innerText = "$0.00";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                const sub = item.price * item.qty;
                total += sub;
                return `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                        <div class="font-bold text-[11px]">
                            ${item.name}<br><span class="text-blue-600 font-normal">$${item.price.toFixed(2)} x ${item.qty}</span>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 p-2 text-xl">&times;</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        // មុខងារផ្ញើការកុម្ម៉ង់ (Bot API + Date + Profile Link)
        async function checkout() {
            if (cart.length === 0) return alert("សូមរើសផលិតផលសិន!");

            const btn = document.getElementById('btn-checkout');
            const name = document.getElementById('cust-name').value;
            
            // ព័ត៌មាន Bot និង Admin
            const botToken = "8761931144:AAGVP-81bHM1jJF6e9KhSqAcuGYCYe62DQE";
            const adminChatId = "7453536903";

            // បង្កើតកាលបរិច្ឆេទខ្មែរ
            const now = new Date();
            const dateStr = now.toLocaleDateString('km-KH');
            const timeStr = now.toLocaleTimeString('km-KH');

            // បង្កើត Profile Link
            const user = tg.initDataUnsafe?.user;
            let userLink = "មិនមានព័ត៌មាន";
            if (user && user.username) {
                userLink = `[ចុចទីនេះដើម្បី Chat](https://t.me/${user.username})`;
            } else if (user && user.id) {
                userLink = `[User ID: ${user.id}](tg://user?id=${user.id})`;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងបញ្ជូន...';

            let message = "🏗️ *ការកុម្ម៉ង់ថ្មី (ស្វ័យប្រវត្តិ)*\n";
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `👤 *អតិថិជន:* ${name}\n`;
            message += `📅 *ថ្ងៃទី:* ${dateStr}\n`;
            message += `⏰ *ម៉ោង:* ${timeStr}\n`;
            message += `🔗 *Profile:* ${userLink}\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            
            let total = 0;
            cart.forEach((item, index) => {
                const subTotal = item.price * item.qty;
                total += subTotal;
                message += `${index + 1}. ${item.name} (x${item.qty}) = *$${subTotal.toFixed(2)}*\n`;
            });
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `💰 *សរុបរួម: $${total.toFixed(2)}*\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += "🚀 _ផ្ញើចេញពី Roththa Mini App_";

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: adminChatId,
                        text: message,
                        parse_mode: "Markdown",
                        disable_web_page_preview: false
                    })
                });

                if (response.ok) {
                    alert("✅ រួចរាល់! ការកុម្ម៉ង់ត្រូវបានបញ្ជូនទៅអ្នកលក់។");
                    cart = [];
                    updateCartUI();
                    tg.close();
                } else {
                    alert("❌ បញ្ហា៖ សូមប្រាកដថាអ្នកបានចុច Start លើ Bot រួចហើយ!");
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> បញ្ជាក់ការកុម្ម៉ង់';
                }
            } catch (error) {
                alert("❌ បញ្ហាអ៊ីនធឺណិត!");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> បញ្ជាក់ការកុម្ម៉ង់';
            }
        }
    </script>
</body>
</html>
