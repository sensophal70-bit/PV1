<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roththa Shop - Customer System v17.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-up { transition: transform 0.3s ease-out; transform: translateY(100%); }
        .modal-up.active { transform: translateY(0); }
        .cat-btn.active { background-color: #1e40af !important; color: white !important; border-color: #1e40af !important; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-32">

    <div class="bg-blue-800 p-5 rounded-b-[2rem] shadow-lg sticky top-0 z-30 text-white border-b-4 border-yellow-500">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-lg font-bold italic uppercase">Roththa Shop</h1>
                <p id="user-display" class="text-[10px] opacity-90 italic text-yellow-300">ស្វាគមន៍អតិថិជន</p>
            </div>
            <div class="flex gap-2">
                <button onclick="window.toggleAccountModal()" class="bg-white/20 p-2 rounded-xl border border-white/30 text-[10px] font-bold">
                    <i class="fas fa-user-circle mr-1"></i> គណនី
                </button>
            </div>
        </div>
        <input type="text" id="search-box" onkeyup="window.filterProducts()" placeholder="ស្វែងរកផលិតផល..." class="w-full p-3 rounded-2xl border-none outline-none text-[11px] text-gray-800 shadow-inner">
    </div>

    <div id="cat-list" class="flex gap-2 overflow-x-auto px-4 py-4 no-scrollbar bg-white border-b sticky top-[135px] z-20 shadow-sm">
        <button onclick="window.filterByCategory('All', event)" class="cat-btn active whitespace-nowrap px-6 py-2 rounded-full text-[10px] font-bold border shadow-sm transition-all bg-white text-gray-500">ទាំងអស់</button>
    </div>

    <div class="px-3 mt-4">
        <div id="product-grid" class="grid grid-cols-3 gap-2 pb-10 text-center"></div>
    </div>

    <div id="cart-bar" onclick="window.toggleCartModal()" class="fixed bottom-6 left-6 right-6 bg-blue-900 text-white p-4 rounded-3xl shadow-2xl flex justify-between items-center hidden z-40 border border-white/10 active:scale-95 transition-all">
        <div class="flex items-center gap-3">
            <span id="cart-count" class="bg-red-500 text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            <div id="cart-total-bar" class="font-bold text-sm">$0.00</div>
        </div>
        <div class="text-[9px] font-bold uppercase italic text-yellow-400">ពិនិត្យកន្ត្រក <i class="fas fa-chevron-right ml-1"></i></div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity" onclick="window.toggleCartModal()"></div>
    <div id="cart-modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 modal-up p-6 shadow-2xl max-h-[90vh] flex flex-col">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h2 class="text-center font-bold text-blue-900 mb-4 text-[11px] uppercase border-b pb-2 italic">កន្ត្រកទំនិញរបស់អ្នក</h2>
        <div id="cart-items-list" class="flex-grow overflow-y-auto space-y-3 no-scrollbar py-2"></div>
        <div class="mt-4 pt-4 border-t border-gray-100">
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="text-gray-400 text-[10px] uppercase italic font-bold">សរុបរួម</span>
                <span id="modal-total-price" class="text-red-600 text-2xl font-bold">$0.00</span>
            </div>
            <button id="btn-checkout" onclick="window.handleCheckout()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                <i class="fab fa-telegram-plane text-lg text-yellow-400"></i> បញ្ជូនទៅ Telegram
            </button>
        </div>
    </div>

    <div id="account-overlay" class="fixed inset-0 bg-black/60 z-50 hidden" onclick="window.toggleAccountModal()"></div>
    <div id="account-modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 modal-up p-8 shadow-2xl text-center">
        <div class="w-20 h-20 bg-blue-100 rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-white shadow-md overflow-hidden">
            <img id="acc-photo" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
        </div>
        <h2 id="acc-name" class="text-xl font-bold text-gray-800">ឈ្មោះអតិថិជន</h2>
        <p id="acc-id" class="text-[10px] text-gray-400 mb-6 italic">Telegram ID: ...</p>
        <button onclick="window.toggleAccountModal()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-500 text-xs">បិទវិញ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [], cart = [], currentLoc = "មិនបានបញ្ជាក់ទីតាំង";

        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        const customerName = user ? `${user.first_name} ${user.last_name || ''}`.trim() : "ភ្ញៀវទូទៅ";

        document.getElementById('user-display').innerText = `សួស្តី, ${customerName}`;
        document.getElementById('acc-name').innerText = customerName;
        document.getElementById('acc-id').innerText = `ID: ${user?.id || 'N/A'}`;
        if(user?.photo_url) document.getElementById('acc-photo').src = user.photo_url;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                currentLoc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            });
        }

        // --- CART LOGIC ---
        window.updateCartUI = () => {
            const count = cart.reduce((s, i) => s + Number(i.qty), 0);
            const total = cart.reduce((s, i) => s + (Number(i.qty) * Number(i.price)), 0);
            
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total-bar').innerText = `$${total.toFixed(2)}`;
            document.getElementById('modal-total-price').innerText = `$${total.toFixed(2)}`;
            
            document.getElementById('cart-items-list').innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <img src="${item.img || ''}" class="w-12 h-12 object-cover rounded-xl border">
                    <div class="flex-grow text-left">
                        <div class="font-bold text-[10px] line-clamp-1">${item.name}</div>
                        <div class="text-blue-600 font-bold text-[10px]">$${Number(item.price).toFixed(2)}</div>
                    </div>
                    <div class="flex items-center gap-1 bg-white p-1 rounded-xl border">
                        <button onclick="window.changeQty('${item.id}', -1)" class="w-7 h-7 text-gray-400 font-bold">-</button>
                        <input type="number" value="${item.qty}" 
                            onchange="window.manualInputQty('${item.id}', this.value)"
                            class="w-10 text-center font-bold text-[11px] outline-none border-none bg-transparent">
                        <button onclick="window.changeQty('${item.id}', 1)" class="w-7 h-7 text-blue-600 font-bold">+</button>
                    </div>
                </div>`).join('');
        };

        window.manualInputQty = (id, val) => {
            const i = cart.find(x => x.id === id);
            const p = allProducts.find(x => x.id === id);
            let n = parseInt(val);
            if (isNaN(n) || n <= 0) n = 1;
            if (n > p.stock) { alert("ក្នុងស្តុកមានត្រឹមតែ " + p.stock); n = p.stock; }
            if (i) { i.qty = n; window.updateCartUI(); }
        };

        window.addToCart = (id) => {
            const p = allProducts.find(i => i.id === id);
            if(p.stock <= 0) return alert("អស់ពីស្តុកហើយ!");
            const f = cart.find(i => i.id === id);
            if(f) {
                if(f.qty < p.stock) f.qty++;
                else alert("អស់ស្តុកហើយ!");
            } else cart.push({...p, qty: 1});
            window.updateCartUI();
            tg.HapticFeedback.impactOccurred('light');
        };

        window.changeQty = (id, d) => {
            const i = cart.find(x => x.id === id);
            const p = allProducts.find(x => x.id === id);
            if(i) {
                if(d > 0 && i.qty >= p.stock) return alert("អស់ស្តុកហើយ!");
                i.qty = Math.max(0, Number(i.qty) + d);
                if(i.qty === 0) cart = cart.filter(x => x.id !== id);
                window.updateCartUI();
            }
        };

        // --- CHECKOUT & STOCK DEDUCTION ---
        window.handleCheckout = async () => {
            if (cart.length === 0) return alert("សូមរើសទំនិញ!");
            const btn = document.getElementById('btn-checkout');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងបញ្ជូន...`;

            try {
                // 1. កាត់ស្តុកចេញពី Firebase
                const updatePromises = cart.map(async (item) => {
                    const productRef = doc(db, "products", item.id);
                    const productSnap = await getDoc(productRef);
                    if (productSnap.exists()) {
                        const currentStock = productSnap.data().stock || 0;
                        return updateDoc(productRef, { stock: Math.max(0, currentStock - item.qty) });
                    }
                });
                await Promise.all(updatePromises);

                // 2. រក្សាទុក Order
                const total = cart.reduce((s, i) => s + (i.qty * i.price), 0);
                await addDoc(collection(db, "orders"), {
                    customer_name: customerName,
                    items: cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
                    total_amount: `$${total.toFixed(2)}`,
                    location: currentLoc,
                    createdAt: serverTimestamp()
                });

                // 3. ផ្ញើ Telegram
                let msg = `🏗 *កុម្ម៉ង់ថ្មី Roththa Shop*\n👤 អតិថិជន: ${customerName}\n📍 ទីតាំង: ${currentLoc}\n--------------------------\n`;
                cart.forEach(i => msg += `• ${i.name} (x${i.qty}) = $${(i.qty * i.price).toFixed(2)}\n`);
                msg += `--------------------------\n💰 *សរុប: $${total.toFixed(2)}*`;

                await fetch(`https://api.telegram.org/bot8790246863:AAGhESD1muJVvaO9DhNxiuqoVmY8dIhEl8U/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: "7453536903", text: msg, parse_mode: "Markdown" })
                });

                alert("✅ បញ្ជាទិញជោគជ័យ!");
                cart = []; window.updateCartUI(); window.toggleCartModal(); window.init();
            } catch (e) { alert("❌ បញ្ហាការតភ្ជាប់!"); }
            btn.disabled = false;
            btn.innerHTML = `<i class="fab fa-telegram-plane text-lg text-yellow-400"></i> បញ្ជូនទៅ Telegram`;
        };

        // --- UI HELPERS ---
        window.toggleCartModal = () => { document.getElementById('cart-modal').classList.toggle('active'); document.getElementById('overlay').classList.toggle('hidden'); setTimeout(() => document.getElementById('overlay').classList.toggle('opacity-0'), 10); };
        window.toggleAccountModal = () => { document.getElementById('account-modal').classList.toggle('active'); document.getElementById('account-overlay').classList.toggle('hidden'); };
        
        window.filterByCategory = (cat, event) => {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            if (event) event.currentTarget.classList.add('active');
            renderProducts(cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat));
        };

        window.filterProducts = () => {
            const v = document.getElementById('search-box').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(v)));
        };

        function renderProducts(data) {
            document.getElementById('product-grid').innerHTML = data.map(p => `
                <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
                    <div class="w-full aspect-square mb-2 overflow-hidden rounded-lg bg-gray-50 relative">
                        <img src="${p.img || ''}" class="w-full h-full object-cover">
                        ${p.stock <= 0 ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center text-white text-[8px] font-bold">អស់ស្តុក</div>' : ''}
                    </div>
                    <h3 class="font-bold text-[9px] line-clamp-2 h-7 leading-tight mb-1 text-gray-700">${p.name}</h3>
                    <div class="flex justify-between w-full px-1 mb-2">
                        <span class="text-red-600 font-bold text-[10px]">$${Number(p.price).toFixed(2)}</span>
                        <span class="text-[8px] text-gray-400 italic">ស្តុក: ${p.stock || 0}</span>
                    </div>
                    <button onclick="window.addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="w-full ${p.stock <= 0 ? 'bg-gray-300' : 'bg-blue-600'} text-white py-1.5 rounded-lg text-[9px] font-bold transition-all active:scale-90">បន្ថែម</button>
                </div>`).join('');
        }

        window.init = async () => {
            const [cSnap, pSnap] = await Promise.all([
                getDocs(collection(db, "categories")),
                getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")))
            ]);
            allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
            const list = document.getElementById('cat-list');
            list.innerHTML = `<button onclick="window.filterByCategory('All', event)" class="cat-btn active whitespace-nowrap px-6 py-2 rounded-full text-[10px] font-bold border shadow-sm transition-all bg-white text-gray-500">ទាំងអស់</button>`;
            cSnap.forEach(d => {
                list.innerHTML += `<button onclick="window.filterByCategory('${d.data().name}', event)" class="cat-btn whitespace-nowrap px-6 py-2 bg-white text-gray-500 rounded-full text-[10px] font-bold border shadow-sm">${d.data().name}</button>`;
            });
            renderProducts(allProducts);
        }
        window.init();
    </script>
</body>
</html>
