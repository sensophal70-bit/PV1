<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - Firebase</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="font-bold">Roththa Construction</h1>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[10px] rounded-full px-1.5 border-2 border-blue-800">0</span>
        </div>
    </nav>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4 mb-24">
        <p class="col-span-2 text-center text-gray-400 italic">កំពុងទាញទិន្នន័យពី Firebase...</p>
    </div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-4 bg-blue-800 text-white flex justify-between items-center">
            <span class="font-bold">កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-5 border-t">
            <input type="text" id="cust-name" readonly class="w-full mb-3 p-3 bg-gray-100 rounded-xl font-bold">
            <div class="flex justify-between items-center font-bold text-xl mb-4">
                <span>សរុប:</span> <span id="cart-total" class="text-red-600">$0.00</span>
            </div>
            <button id="btn-checkout" onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold">បញ្ជាក់ការកុម្ម៉ង់</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ១. ដាក់ Config របស់អ្នក (ដែលអ្នកបានថតរូបផ្ញើឱ្យខ្ញុំមិញ)
        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI...", 
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab77270...",
            measurementId: "G-TZN1C3N9FX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ២. អនុគមន៍ទាញទិន្នន័យពី Firebase
        async function loadProducts() {
            try {
                const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                renderProducts(products); // បង្ហាញទៅលើអេក្រង់
            } catch (error) {
                console.error("Error loading products: ", error);
                document.getElementById('product-list').innerHTML = "បញ្ហាអ៊ីនធឺណិត!";
            }
        }

        // មុខងារបង្ហាញផលិតផល (UI)
        window.renderProducts = function(items) {
            const list = document.getElementById('product-list');
            if(items.length === 0) {
                list.innerHTML = "<p class='col-span-2 text-center text-gray-400'>មិនទាន់មានទំនិញក្នុងស្តុក</p>";
                return;
            }
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <img src="${p.img}" class="w-full h-24 object-cover rounded-xl mb-2">
                    <h3 class="font-bold text-xs h-8 overflow-hidden">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-red-500 font-bold text-sm">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart('${p.id}', '${p.name}', ${p.price})" class="bg-blue-700 text-white p-2 rounded-lg text-xs">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ហៅឱ្យដំណើរការនៅពេលបើក App
        window.onload = () => {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            document.getElementById('cust-name').value = user ? user.first_name : "ភ្ញៀវទូទៅ";
            loadProducts(); 
        };
    </script>

    <script>
        // ផ្នែក Cart & Checkout (រក្សាទុកកូដចាស់របស់អ្នក ប៉ុន្តែកែ addToCart បន្តិច)
        let cart = [];
        function addToCart(id, name, price) {
            const exist = cart.find(i => i.id === id);
            exist ? exist.qty++ : cart.push({ id, name, price, qty: 1 });
            updateCartUI();
        }
        // ... (អនុគមន៍ updateCartUI, toggleCart, checkout រក្សាទុកដដែល) ...
    </script>
</body>
</html>
