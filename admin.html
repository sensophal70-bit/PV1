<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Roththa Shop (PV1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <div class="max-w-xl mx-auto space-y-8">
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-blue-100">
            <h2 class="font-bold text-blue-900 mb-4 flex items-center"><i class="fas fa-tags mr-2"></i> បន្ថែមប្រភេទផលិតផល</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="new-cat-name" placeholder="ឈ្មោះប្រភេទ (ឧ៖ ថ្ម)" class="flex-grow p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm">
                <button id="btn-add-cat" class="bg-blue-600 text-white px-6 rounded-xl font-bold text-xs shadow active:scale-95">បន្ថែម</button>
            </div>
            <div id="cat-tags-list" class="flex flex-wrap gap-2">
                </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h1 id="form-title" class="text-blue-900 font-bold text-center text-xl mb-6 underline underline-offset-8">គ្រប់គ្រងទំនិញ</h1>
            <input type="hidden" id="edit-id">
            
            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                
                <div class="p-4 bg-gray-50 border border-dashed border-gray-300 rounded-2xl text-center">
                    <label class="text-[10px] text-gray-400 block mb-2 font-bold uppercase">រូបភាពផលិតផល</label>
                    <input type="file" id="p-file" accept="image/*" class="text-xs text-gray-500 mb-2">
                    <input type="hidden" id="p-img">
                    <div id="preview-container" class="hidden flex justify-center"><img id="img-preview" src="" class="w-20 h-20 object-cover rounded-xl border"></div>
                </div>

                <select id="p-cat" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none">
                    <option value="">ជ្រើសរើសប្រភេទផលិតផល</option>
                </select>

                <div class="flex gap-2">
                    <button id="btn-save" class="flex-grow bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">រក្សាទុកទិន្នន័យ</button>
                    <button id="btn-cancel" class="hidden bg-gray-400 text-white px-6 rounded-2xl font-bold" onclick="resetForm()">បោះបង់</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 bg-gray-50 flex justify-between items-center border-b">
                <span class="text-[10px] font-bold text-gray-400 uppercase">បញ្ជីផលិតផល</span>
                <input type="text" onkeyup="searchProduct(this.value)" placeholder="ស្វែងរក..." class="p-2 border rounded-xl text-[10px] w-32 outline-none">
            </div>
            <table class="w-full text-left"><tbody id="product-table-body" class="divide-y divide-gray-100"></tbody></table>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h2 class="font-bold text-blue-900 mb-4 italic underline underline-offset-4">ប្រវត្តិការកុម្ម៉ង់អតិថិជន</h2>
            <div id="order-history-list" class="space-y-4 max-h-[500px] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];

        // --- ១. គ្រប់គ្រង CATEGORY ---

        window.loadCategories = async () => {
            const snap = await getDocs(collection(db, "categories"));
            const list = document.getElementById('cat-tags-list');
            const select = document.getElementById('p-cat');
            
            list.innerHTML = '';
            select.innerHTML = '<option value="">ជ្រើសរើសប្រភេទផលិតផល</option>';

            snap.forEach(res => {
                const cat = res.data().name;
                // បង្ហាញជា Tag សម្រាប់លុប
                list.innerHTML += `<span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-100 flex items-center gap-2">
                    ${cat} <i onclick="deleteCategory('${res.id}')" class="fas fa-times-circle cursor-pointer text-red-400"></i>
                </span>`;
                // បន្ថែមចូលក្នុង Dropdown
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        };

        document.getElementById('btn-add-cat').onclick = async () => {
            const name = document.getElementById('new-cat-name').value;
            if(!name) return;
            await addDoc(collection(db, "categories"), { name });
            document.getElementById('new-cat-name').value = '';
            loadCategories();
        };

        window.deleteCategory = async (id) => {
            if(confirm("តើអ្នកចង់លុបប្រភេទនេះ?")) {
                await deleteDoc(doc(db, "categories", id));
                loadCategories();
            }
        };

        // --- ២. គ្រប់គ្រងផលិតផល & ORDERS ---

        window.deleteProduct = async (id) => {
            if(confirm("លុបផលិតផលនេះ?")) {
                await deleteDoc(doc(db, "products", id));
                loadAllData();
            }
        };

        window.deleteOrder = async (id) => {
            if(confirm("លុបប្រវត្តិការកុម្ម៉ង់នេះ?")) {
                await deleteDoc(doc(db, "orders", id));
                loadAllData();
            }
        };

        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('p-img').value = ev.target.result;
                document.getElementById('img-preview').src = ev.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                img: document.getElementById('p-img').value,
                category: document.getElementById('p-cat').value,
                updatedAt: serverTimestamp()
            };

            if(!data.name || !data.price || !data.category) return alert("សូមបំពេញឱ្យគ្រប់!");

            const btn = document.getElementById('btn-save');
            btn.disabled = true;

            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            
            resetForm(); loadAllData(); btn.disabled = false;
        };

        window.editProduct = (id) => {
            const p = allProducts.find(i => i.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.img;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('img-preview').src = p.img;
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('form-title').innerText = "កែសម្រួលផលិតផល";
            document.getElementById('btn-save').innerText = "អាប់ដេត";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        async function loadAllData() {
            loadCategories();
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = [];
            pSnap.forEach(d => allProducts.push({id: d.id, ...d.data()}));
            
            document.getElementById('product-table-body').innerHTML = allProducts.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 w-16"><img src="${p.img}" class="w-10 h-10 object-cover rounded-xl shadow-sm border"></td>
                    <td class="px-2 py-3">
                        <div class="font-bold text-gray-800 text-xs">${p.name}</div>
                        <div class="text-red-500 text-[10px] font-bold">$${p.price.toFixed(2)}</div>
                    </td>
                    <td class="px-4 py-3 text-right space-x-2">
                        <button onclick="editProduct('${p.id}')" class="text-blue-400 p-1"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-300 p-1"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');

            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            document.getElementById('order-history-list').innerHTML = oSnap.docs.map(docSnap => {
                const o = docSnap.data();
                return `
                <div class="bg-gray-50 p-4 rounded-2xl border relative border-gray-100">
                    <button onclick="deleteOrder('${docSnap.id}')" class="absolute top-3 right-3 text-red-300 text-xs"><i class="fas fa-times-circle text-lg"></i></button>
                    <div class="font-bold text-blue-900 text-xs">${o.customer_name}</div>
                    <div class="text-[9px] text-gray-400 mb-2">${o.createdAt?.toDate().toLocaleString() || ""}</div>
                    <div class="text-[10px] text-gray-600 border-t border-dashed mt-2 pt-2">${o.items.map(i => `<div>• ${i.name} (x${i.qty})</div>`).join('')}</div>
                    <div class="text-right font-bold text-red-600 text-xs mt-1 border-t pt-1">សរុប៖ ${o.total_amount}</div>
                </div>`;
            }).join('') || "<p class='text-center text-gray-400 text-xs py-10'>មិនទាន់មានកុម្ម៉ង់</p>";
        }

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('p-file').value = "";
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('form-title').innerText = "គ្រប់គ្រងទំនិញ";
            document.getElementById('btn-save').innerText = "រក្សាទុកទិន្នន័យ";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        window.onload = loadAllData;
    </script>
</body>
</html>
