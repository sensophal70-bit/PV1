<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Online Shop - Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-blue-700 text-white p-5 sticky top-0 z-40 shadow-lg rounded-b-[2rem]">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div>
                <h1 class="text-xl font-bold italic tracking-wider">ROTHTHA SHOP</h1>
                <p class="text-[10px] opacity-80 italic uppercase text-blue-100">Construction & Materials</p>
            </div>
            <div class="flex gap-3">
                <button onclick="showHistory()" class="bg-white/20 p-3 rounded-2xl">
                    <i class="fas fa-history text-lg"></i>
                </button>
                <button onclick="toggleCart()" class="relative bg-white/20 p-3 rounded-2xl">
                    <i class="fas fa-shopping-basket text-lg"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[9px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex justify-around bg-white border-b sticky top-[84px] z-30 max-w-4xl mx-auto italic text-sm font-bold">
        <button id="tab-shop" onclick="switchView('shop')" class="py-3 px-6 active-tab">ហាងទំនិញ</button>
        <button id="tab-history" onclick="switchView('history')" class="py-3 px-6 text-gray-400">ប្រវត្តិកម្មង់</button>
    </div>

    <div id="view-shop" class="max-w-4xl mx-auto">
        <div id="cat-nav" class="flex gap-2 overflow-x-auto p-4 no-scrollbar">
            <button onclick="filterCat('All')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[11px] font-bold whitespace-nowrap shadow-md">ទាំងអស់</button>
        </div>
        <main class="p-4 grid grid-cols-2 md:grid-cols-3 gap-4" id="product-grid"></main>
    </div>

    <div id="view-history" class="hidden max-w-2xl mx-auto p-6 animate-fade-in">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-blue-50 mb-6">
            <h2 class="font-bold text-blue-900 mb-4 text-center italic">ពិនិត្យប្រវត្តិការកុម្ម៉ង់</h2>
            <div class="flex gap-2">
                <input type="text" id="search-history-name" placeholder="បញ្ចូលឈ្មោះដែលអ្នកធ្លាប់កុម្ម៉ង់..." class="flex-grow p-4 bg-gray-50 border rounded-2xl outline-none text-sm italic font-bold">
                <button onclick="fetchCustomerHistory()" class="bg-blue-700 text-white px-6 rounded-2xl font-bold shadow-lg active:scale-90"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div id="history-results" class="space-y-4">
            <div class="text-center text-gray-400 py-10 italic text-xs">សូមបញ្ចូលឈ្មោះដើម្បីស្វែងរក...</div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-blue-900 text-lg italic">កន្ត្រកទំនិញរបស់អ្នក</h2>
                <button onclick="toggleCart()" class="text-gray-300 text-xl"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="cart-items" class="space-y-4 max-h-[40vh] overflow-y-auto no-scrollbar"></div>
            <div class="mt-6 border-t pt-4 space-y-4">
                <input type="text" id="cust-name" placeholder="សូមបញ្ចូលឈ្មោះរបស់អ្នក..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-sm font-bold italic">
                <div class="flex justify-between items-center font-bold text-xl text-blue-900">
                    <span>សរុប៖</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 italic">បញ្ជាក់ការកុម្ម៉ង់</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let products = [], cart = [];

        async function init() {
            // Categories
            const cSnap = await getDocs(collection(db, "categories"));
            cSnap.forEach(d => {
                document.getElementById('cat-nav').innerHTML += `<button onclick="filterCat('${d.data().name}')" class="bg-white text-gray-500 border border-gray-100 px-5 py-2 rounded-xl text-[11px] font-bold shadow-sm whitespace-nowrap">${d.data().name}</button>`;
            });

            // Products
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            products = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
            renderProducts(products);
        }

        function renderProducts(data) {
            document.getElementById('product-grid').innerHTML = data.map(p => `
                <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-50 flex flex-col">
                    <div class="h-32 bg-gray-100"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-[11px] line-clamp-1">${p.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-red-600 font-bold text-xs">$${p.price.toFixed(2)}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-blue-50 text-blue-600 w-8 h-8 rounded-xl active:scale-90"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        window.switchView = (view) => {
            const tabs = ['shop', 'history'];
            tabs.forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active-tab');
                document.getElementById(`tab-${t}`).classList.add('text-gray-400');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`tab-${view}`).classList.add('active-tab');
        };

        window.fetchCustomerHistory = async () => {
            const name = document.getElementById('search-history-name').value.trim();
            if(!name) return alert("សូមបញ្ចូលឈ្មោះ!");
            
            const resultsDiv = document.getElementById('history-results');
            resultsDiv.innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-blue-600"></i> កំពុងទាញទិន្នន័យ...</div>`;

            const q = query(collection(db, "orders"), where("customer_name", "==", name), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            
            if(snap.empty) {
                resultsDiv.innerHTML = `<div class="bg-orange-50 text-orange-600 p-6 rounded-2xl text-center text-xs italic border border-orange-100">មិនមានប្រវត្តិសម្រាប់ឈ្មោះ "${name}" ទេ!</div>`;
                return;
            }

            resultsDiv.innerHTML = snap.docs.map(d => {
                const o = d.data();
                const date = o.createdAt?.toDate().toLocaleString('km-KH');
                return `
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-blue-100 animate-slide-up">
                    <div class="flex justify-between items-start border-b border-dashed pb-3 mb-3">
                        <div>
                            <div class="text-[9px] text-gray-400">${date}</div>
                            <div class="font-bold text-blue-900 text-sm">វិក្កយបត្រ៖ #${d.id.slice(0,5).toUpperCase()}</div>
                        </div>
                        <div class="text-red-600 font-bold text-sm">${o.total_amount}</div>
                    </div>
                    <div class="space-y-2">
                        ${o.items.map(i => `
                            <div class="flex justify-between text-[10px] text-gray-600 italic">
                                <span>${i.name} (x${i.qty})</span>
                                <span>$${(i.qty * i.price).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 bg-green-50 text-green-600 p-2 rounded-xl text-center text-[9px] font-bold italic">កម្មង់បានជោគជ័យ</div>
                </div>`;
            }).join('');
        };

        // Cart Logic
        window.addToCart = (id) => {
            const p = products.find(x => x.id === id);
            const item = cart.find(x => x.id === id);
            if(item) item.qty++; else cart.push({...p, qty: 1});
            updateCart();
        };

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl">
                    <img src="${i.img}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-grow text-[10px]">
                        <div class="font-bold">${i.name}</div>
                        <div class="text-blue-600 font-bold">$${i.price.toFixed(2)}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty('${i.id}', -1)" class="w-6 h-6 bg-white border rounded-lg">-</button>
                        <span class="text-xs font-bold">${i.qty}</span>
                        <button onclick="changeQty('${i.id}', 1)" class="w-6 h-6 bg-blue-600 text-white rounded-lg">+</button>
                    </div>
                </div>`).join('');
        }

        window.changeQty = (id, delta) => {
            const item = cart.find(x => x.id === id);
            item.qty += delta;
            if(item.qty < 1) cart = cart.filter(x => x.id !== id);
            updateCart();
        };

        window.toggleCart = () => document.getElementById('cart-modal').classList.toggle('hidden');
        window.showHistory = () => switchView('history');

        window.checkout = async () => {
            const name = document.getElementById('cust-name').value.trim();
            if(!name || cart.length === 0) return alert("សូមបំពេញឈ្មោះ និងរើសទំនិញ!");
            
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            await addDoc(collection(db, "orders"), {
                customer_name: name,
                items: cart,
                total_amount: `$${total.toFixed(2)}`,
                createdAt: serverTimestamp()
            });

            alert("កុម្ម៉ង់បានជោគជ័យ!");
            cart = []; updateCart(); toggleCart();
            document.getElementById('cust-name').value = "";
            switchView('history'); // ប្តូរទៅមើលប្រវត្តិភ្លាមៗ
            document.getElementById('search-history-name').value = name;
            fetchCustomerHistory();
        };

        init();
    </script>
</body>
</html>
