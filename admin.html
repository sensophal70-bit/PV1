<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - Full Supplier & Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .hidden-panel { display: none; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .pdf-box { font-family: 'Hanuman', serif !important; padding: 30px; background: white; color: black; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th { background-color: #1e40af; color: white; border: 1px solid #1e3a8a; padding: 10px; font-size: 11px; }
        .pdf-table td { border: 1px solid #ddd; padding: 8px; font-size: 10px; vertical-align: middle; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-[2.5rem] shadow-2xl border border-blue-50">
        <div class="text-center mb-6">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 text-2xl">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="font-bold text-blue-900 text-xl text-center">Admin Access</h1>
        </div>
        <input type="password" id="admin-pass" placeholder="បញ្ចូលលេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 focus:ring-blue-500">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-[1400px] mx-auto">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-6 rounded-[2rem] shadow-xl text-white">
                <div class="flex justify-between items-center opacity-80 mb-2">
                    <span class="text-xs font-bold uppercase tracking-wider">ចំណូលសរុប (Revenue)</span>
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div id="total-revenue" class="text-3xl font-bold">$0.00</div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-blue-100">
                <div class="flex justify-between items-center text-gray-400 mb-2">
                    <span class="text-xs font-bold uppercase text-blue-800">ការកុម្ម៉ង់សរុប</span>
                    <i class="fas fa-shopping-cart text-blue-500"></i>
                </div>
                <div id="total-orders" class="text-3xl font-bold text-blue-900">0</div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                <div class="flex justify-between items-center text-gray-400 mb-2">
                    <span class="text-xs font-bold uppercase text-orange-800">ទំនិញក្នុងស្តុក</span>
                    <i class="fas fa-box text-orange-500"></i>
                </div>
                <div id="total-stock-items" class="text-3xl font-bold text-orange-600">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-orange-100">
                    <h2 class="font-bold text-orange-700 mb-4 flex items-center text-sm"><i class="fas fa-tags mr-2"></i> ប្រភេទផលិតផល</h2>
                    <div class="flex gap-2">
                        <input type="text" id="cat-name" placeholder="ឈ្មោះប្រភេទ..." class="flex-grow p-3 bg-gray-50 border rounded-xl outline-none text-xs">
                        <button onclick="addCategory()" class="bg-orange-600 text-white px-4 rounded-xl font-bold active:scale-90"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="cat-badges" class="flex flex-wrap gap-2 mt-4"></div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-blue-100">
                    <h2 id="form-title" class="font-bold text-blue-900 mb-6 flex items-center text-sm"><i class="fas fa-edit mr-2"></i> គ្រប់គ្រងទំនិញ & Supplier</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                        <select id="p-cat" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold text-slate-500"></select>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-1/2 p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                        </div>

                        <div class="p-4 bg-blue-50 rounded-2xl space-y-2 border border-blue-100">
                            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">ព័ត៌មានអ្នកផ្គត់ផ្គង់ (Supplier)</span>
                            <input type="text" id="s-name" placeholder="ឈ្មោះអ្នកផ្គត់ផ្គង់" class="w-full p-2.5 bg-white border rounded-lg outline-none text-xs">
                            <input type="text" id="s-phone" placeholder="លេខទូរសព្ទ" class="w-full p-2.5 bg-white border rounded-lg outline-none text-xs">
                            <input type="text" id="s-address" placeholder="អាសយដ្ឋាន" class="w-full p-2.5 bg-white border rounded-lg outline-none text-xs">
                            <textarea id="s-note" placeholder="ផ្សេងៗ..." class="w-full p-2.5 bg-white border rounded-lg outline-none text-xs h-16 no-scrollbar"></textarea>
                        </div>

                        <div class="p-3 bg-gray-50 border border-dashed rounded-xl text-center">
                            <input type="file" id="p-file" accept="image/*" class="text-[10px] text-gray-400">
                            <input type="hidden" id="p-img">
                        </div>
                        <button id="btn-save" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-md active:scale-95 transition-all">រក្សាទុក</button>
                        <button id="btn-cancel" onclick="resetForm()" class="hidden w-full bg-gray-400 text-white py-2 rounded-xl font-bold mt-2">បោះបង់</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 h-[500px] flex flex-col overflow-hidden">
                    <div class="p-5 bg-gray-50 border-b flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase">បញ្ជីស្តុកទំនិញ</span>
                        <button onclick="exportData('product', 'pdf')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-[10px] font-bold">EXPORT STOCK PDF</button>
                    </div>
                    <div class="overflow-y-auto p-4 no-scrollbar flex-grow">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-gray-400 border-b sticky top-0 bg-white">
                                <tr><th>រូបភាព</th><th>ឈ្មោះ</th><th>Supplier</th><th>ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-right">សកម្មភាព</th></tr>
                            </thead>
                            <tbody id="product-list" class="divide-y divide-gray-50 text-xs"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 h-[450px] flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-4 border-b pb-3">
                        <div class="flex items-center gap-3">
                            <h2 class="font-bold text-blue-900 italic">ប្រវត្តិការកម្មង់</h2>
                            <button onclick="deleteAllOrders()" class="bg-red-50 text-red-500 px-3 py-1 rounded-lg text-[9px] font-bold hover:bg-red-500 hover:text-white transition-all">លុបទាំងអស់</button>
                        </div>
                        <button onclick="exportData('order', 'pdf')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold italic">EXPORT ORDERS PDF</button>
                    </div>
                    <div id="order-list" class="space-y-3 overflow-y-auto no-scrollbar pr-1 flex-grow"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="supplier-modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-xs rounded-[2rem] p-6 shadow-2xl">
            <div class="text-center mb-4">
                <div class="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto text-blue-600 mb-2 text-lg">
                    <i class="fas fa-address-book"></i>
                </div>
                <h3 class="font-bold text-blue-900">ព័ត៌មានអ្នកផ្គត់ផ្គង់</h3>
            </div>
            <div id="modal-content" class="space-y-3 text-xs leading-relaxed"></div>
            <button onclick="closeModal()" class="w-full mt-6 bg-gray-100 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-200 transition-colors">បិទ</button>
        </div>
    </div>

    <div id="pdf-render-zone" style="position: absolute; left: -9999px; top: 0; width: 800px; background: white;">
        <div id="pdf-content" class="pdf-box">
            <h1 style="text-align: center; color: #1e40af; border-bottom: 2px solid #1e40af; padding-bottom: 10px;" id="pdf-title"></h1>
            <p style="text-align: right; font-size: 10px; color: #666; margin-top: 5px;">របាយការណ៍នៅ៖ <span id="pdf-date"></span></p>
            <div id="pdf-table-area"></div>
            <div id="pdf-footer-total" style="margin-top: 20px; text-align: right; font-weight: bold; font-size: 14px; color: #d32f2f;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];
        let allOrders = [];

        window.checkLogin = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-main').classList.remove('hidden-panel');
                loadAll();
            } else { alert("លេខកូដខុស!"); }
        };

        window.addCategory = async () => {
            const name = document.getElementById('cat-name').value;
            if(name) { await addDoc(collection(db, "categories"), { name: name }); document.getElementById('cat-name').value = ""; loadAll(); }
        };

        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => document.getElementById('p-img').value = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                img: document.getElementById('p-img').value,
                // Supplier Data
                supplier_name: document.getElementById('s-name').value,
                supplier_phone: document.getElementById('s-phone').value,
                supplier_address: document.getElementById('s-address').value,
                supplier_note: document.getElementById('s-note').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name) return alert("សូមបញ្ចូលឈ្មោះទំនិញ!");
            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            resetForm(); loadAll();
        };

        window.editProduct = (id) => {
            const p = allProducts.find(i => i.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-img').value = p.img;
            // Set Supplier
            document.getElementById('s-name').value = p.supplier_name || "";
            document.getElementById('s-phone').value = p.supplier_phone || "";
            document.getElementById('s-address').value = p.supplier_address || "";
            document.getElementById('s-note').value = p.supplier_note || "";
            
            document.getElementById('form-title').innerText = "កែសម្រួលទំនិញ";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.viewSupplier = (id) => {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modal-content').innerHTML = `
                <div class="border-b pb-2 text-[11px]"><strong>ឈ្មោះ៖</strong> ${p.supplier_name || '-'}</div>
                <div class="border-b pb-2 text-[11px]"><strong>លេខទូរសព្ទ៖</strong> <a href="tel:${p.supplier_phone}" class="text-blue-600 font-bold">${p.supplier_phone || '-'}</a></div>
                <div class="border-b pb-2 text-[11px]"><strong>អាសយដ្ឋាន៖</strong> ${p.supplier_address || '-'}</div>
                <div class="bg-gray-50 p-3 rounded-lg mt-2 text-[10px]"><strong>ចំណាំ៖</strong> ${p.supplier_note || '-'}</div>
            `;
            document.getElementById('supplier-modal').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('supplier-modal').classList.add('hidden');

        window.deleteOrder = async (id) => {
            if(confirm("លុបការកុម្ម៉ង់នេះមែនទេ?")) { await deleteDoc(doc(db, "orders", id)); loadAll(); }
        };

        window.deleteAllOrders = async () => {
            if(confirm("⚠️ លុបប្រវត្តិការកុម្ម៉ង់ទាំងអស់មែនទេ?")) {
                const batch = writeBatch(db);
                const oSnap = await getDocs(collection(db, "orders"));
                oSnap.forEach((d) => batch.delete(d.ref));
                await batch.commit(); loadAll();
            }
        };

        // --- LOAD ALL ---
        async function loadAll() {
            // Categories
            const cSnap = await getDocs(collection(db, "categories"));
            document.getElementById('cat-badges').innerHTML = "";
            document.getElementById('p-cat').innerHTML = `<option value="">ជ្រើសរើសប្រភេទ</option>`;
            cSnap.forEach(d => {
                document.getElementById('cat-badges').innerHTML += `<span class="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold border border-orange-200">${d.data().name}</span>`;
                document.getElementById('p-cat').innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
            });

            // Products
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('total-stock-items').innerText = allProducts.length;
            document.getElementById('product-list').innerHTML = allProducts.map(p => `
                <tr class="border-b">
                    <td class="py-2"><img src="${p.img}" class="w-8 h-8 rounded border"></td>
                    <td><div class="font-bold">${p.name}</div><div class="text-[9px] text-gray-400 italic">${p.category}</div></td>
                    <td><button onclick="viewSupplier('${p.id}')" class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-[9px] font-bold underline">Supplier</button></td>
                    <td class="text-center font-bold text-orange-600">${p.stock}</td>
                    <td class="text-right font-bold text-red-500">$${p.price.toFixed(2)}</td>
                    <td class="text-right">
                        <button onclick="editProduct('${p.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteDoc(doc(db,'products','${p.id}')).then(loadAll)" class="text-gray-300"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');

            // Orders
            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            allOrders = oSnap.docs.map(d => ({id: d.id, ...d.data()}));
            
            let revenue = 0;
            allOrders.forEach(o => revenue += parseFloat(o.total_amount.replace('$', '')));
            document.getElementById('total-revenue').innerText = `$${revenue.toFixed(2)}`;
            document.getElementById('total-orders').innerText = allOrders.length;

            document.getElementById('order-list').innerHTML = allOrders.map(o => `
                <div class="bg-gray-50 p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold text-blue-900 text-[11px]">${o.customer_name}</div>
                        <div class="text-[8px] text-gray-400">${o.createdAt?.toDate().toLocaleString('km-KH')}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right font-bold text-red-600 text-[11px]">${o.total_amount}</div>
                        <button onclick="deleteOrder('${o.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt text-[10px]"></i></button>
                    </div>
                </div>`).join('');
        }

        // --- PDF EXPORT ---
        window.exportData = async (target, format) => {
            const data = (target === 'product') ? allProducts : allOrders;
            const area = document.getElementById('pdf-table-area');
            const footer = document.getElementById('pdf-footer-total');
            const renderZone = document.getElementById('pdf-render-zone');
            
            document.getElementById('pdf-title').innerText = target === 'product' ? "របាយការណ៍ស្តុកទំនិញ & Supplier" : "របាយការណ៍លក់លម្អិត (ជាមួយពេលវេលា)";
            document.getElementById('pdf-date').innerText = new Date().toLocaleString('km-KH');

            let html = `<table class="pdf-table"><thead><tr>`;
            let grandTotal = 0;

            if(target === 'product') {
                html += `<th>រូបភាព</th><th>ឈ្មោះផលិតផល</th><th>Supplier</th><th>ស្តុក</th><th>តម្លៃ</th></tr></thead><tbody>`;
                data.forEach(p => {
                    html += `<tr>
                        <td><img src="${p.img}" crossOrigin="anonymous" style="width:30px;height:30px;object-fit:cover;"></td>
                        <td>${p.name} <br><small style="color:gray;">${p.category}</small></td>
                        <td>${p.supplier_name || '-'} <br><small>${p.supplier_phone || ''}</small></td>
                        <td style="text-align:center;">${p.stock}</td>
                        <td style="text-align:right;">$${p.price.toFixed(2)}</td>
                    </tr>`;
                });
            } else {
                html += `<th>ថ្ងៃខែ & ម៉ោង</th><th>អតិថិជន</th><th>ទំនិញ (Qty)</th><th>សរុប ($)</th></tr></thead><tbody>`;
                data.forEach(o => {
                    grandTotal += parseFloat(o.total_amount.replace('$', ''));
                    const itemsHtml = o.items.map(i => `• ${i.name} (x${i.qty}) = $${(i.qty * i.price).toFixed(2)}`).join('<br>');
                    html += `<tr>
                        <td>${o.createdAt?.toDate().toLocaleString('km-KH')}</td>
                        <td><strong>${o.customer_name}</strong></td>
                        <td style="font-size:9px;">${itemsHtml}</td>
                        <td style="text-align:right; font-weight:bold;">${o.total_amount}</td>
                    </tr>`;
                });
            }

            area.innerHTML = html + `</tbody></table>`;
            footer.innerText = grandTotal > 0 ? `សរុបចំណូលក្នុងរបាយការណ៍៖ $${grandTotal.toFixed(2)}` : "";

            renderZone.style.left = "0"; 
            renderZone.style.opacity = "0.01";
            await document.fonts.ready;
            
            const imgs = area.getElementsByTagName('img');
            await Promise.all(Array.from(imgs).map(img => img.complete ? Promise.resolve() : new Promise(res => img.onload = res)));

            const canvas = await html2canvas(document.getElementById('pdf-content'), { scale: 2, useCORS: true });
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            pdf.save(target + "_report_" + new Date().getTime() + ".pdf");
            renderZone.style.left = "-9999px";
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = "";
