<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ហាងលក់សម្ភារៈសំណង់ - Roththa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@300;400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fas fa-hard-hat mr-2"></i> ហាងសំណង់ Roththa
            </h1>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full px-1.5 font-bold shadow">0</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="search-input" onkeyup="searchProduct()" 
                class="w-full p-4 pl-12 rounded-full border-none shadow focus:ring-2 focus:ring-blue-500 outline-none" 
                placeholder="ស្វែងរកសម្ភារៈសំណង់ (ស៊ីម៉ងត៍, ដែក, ការ៉ូ...)">
            <i class="fas fa-search absolute left-5 top-5 text-gray-400"></i>
        </div>
    </div>

    <main class="container mx-auto p-4 mb-20">
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-5 bg-blue-700 text-white flex justify-between items-center">
            <h2 class="text-lg font-bold"><i class="fas fa-shopping-basket mr-2"></i> កន្ត្រករបស់អ្នក</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto p-5 space-y-4">
            <p class="text-center text-gray-400 mt-10">មិនទាន់មានទំនិញក្នុងកន្ត្រក</p>
        </div>

        <div class="p-5 bg-gray-50 border-t">
            <div class="mb-4 space-y-2">
                <label class="text-sm font-bold text-gray-700">ព័ត៌មានដឹកជញ្ជូន:</label>
                <input type="text" id="cust-name" placeholder="ឈ្មោះអតិថិជន" class="w-full p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="tel" id="cust-phone" placeholder="លេខទូរស័ព្ទ" class="w-full p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div class="flex justify-between items-center text-xl font-bold text-blue-800 mb-4 border-t pt-4">
                <span>សរុបរួម:</span>
                <span id="cart-total">$0.00</span>
            </div>

            <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg flex justify-center items-center transition">
                <i class="fab fa-telegram text-2xl mr-2"></i> ផ្ញើការកុម្ម៉ង់ទៅ Telegram
            </button>
        </div>
    </div>

    <script>
        // ១. បញ្ជីផលិតផល (Data)
        const products = [
            { id: 1, name: "ស៊ីម៉ងត៍ K-Cement", price: 5.50, img: "https://via.placeholder.com/200x150?text=K-Cement" },
            { id: 2, name: "ដែកសរសៃ ១២លី (1kg)", price: 0.85, img: "https://via.placeholder.com/200x150?text=Steel+12mm" },
            { id: 3, name: "ការ៉ូបាត 60x60 (1Box)", price: 12.00, img: "https://via.placeholder.com/200x150?text=Tiles" },
            { id: 4, name: "ថ្នាំលាបផ្ទះ Nippon Paint", price: 45.00, img: "https://via.placeholder.com/200x150?text=Nippon+Paint" },
            { id: 5, name: "ឥដ្ឋតាន់ (1000ដុំ)", price: 65.00, img: "https://via.placeholder.com/200x150?text=Bricks" },
            { id: 6, name: "ដុំសាប៊ូត្រាំដែក", price: 3.50, img: "https://via.placeholder.com/200x150?text=Cleaner" }
        ];

        let cart = [];

        // ២. បង្ហាញផលិតផលលើ Website
        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm hover:shadow-md transition border border-gray-100 flex flex-col">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-3">
                    <h3 class="font-bold text-sm text-gray-800 h-10 overflow-hidden leading-tight">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-red-600 font-bold">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ៣. មុខងារ Search
        function searchProduct() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        // ៤. មុខងារគ្រប់គ្រងកន្ត្រកទំនិញ
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            if (exist) {
                exist.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');
            
            cartCount.innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-center text-gray-400 mt-10">មិនទាន់មានទំនិញក្នុងកន្ត្រក</p>';
                cartTotal.innerText = "$0.00";
                return;
            }

            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                const subTotal = item.price * item.qty;
                total += subTotal;
                return `
                    <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100 shadow-sm">
                        <div class="flex items-center">
                            <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover mr-3 border">
                            <div>
                                <p class="text-xs font-bold text-gray-800">${item.name}</p>
                                <p class="text-xs text-blue-600 font-bold">$${item.price.toFixed(2)} x ${item.qty}</p>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 transition p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            }).join('');
            cartTotal.innerText = "$" + total.toFixed(2);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        // ៥. មុខងារផ្ញើសារទៅកាន់ Telegram @roththa2
        function checkout() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();

            if (cart.length === 0) return alert("សូមរើសផលិតផលដាក់ក្នុងកន្ត្រកសិន!");
            if (!name || !phone) return alert("សូមបំពេញឈ្មោះ និងលេខទូរស័ព្ទ!");

            const myTelegramUser = "roththa2"; 
            
            let message = "🏗️ *ការកុម្ម៉ង់សម្ភារៈសំណង់ថ្មី*\n";
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `👤 *អតិថិជន:* ${name}\n`;
            message += `📞 *លេខទូរស័ព្ទ:* ${phone}\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += "📦 *បញ្ជីទំនិញ:*\n";
            
            let total = 0;
            cart.forEach((item, index) => {
                const subTotal = item.price * item.qty;
                total += subTotal;
                message += `${index + 1}. ${item.name}\n   └─ ${item.qty} x $${item.price.toFixed(2)} = *$${subTotal.toFixed(2)}*\n`;
            });

            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `💰 *សរុបរួម: $${total.toFixed(2)}*\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += "⏰ _ផ្ញើចេញពីគេហទំព័រហាងសំណង់_";

            const telegramUrl = `https://t.me/${myTelegramUser}?text=${encodeURIComponent(message)}`;
            window.open(telegramUrl, '_blank');
        }

        // ចាប់ផ្តើមដំណើរការ
        renderProducts(products);
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
    // ១. ចាប់ផ្តើមទាញយកទិន្នន័យពី Telegram
    const tg = window.Telegram.WebApp;
    tg.expand(); // ពង្រីកអេក្រង់ឱ្យធំ

    // ២. មុខងារទាញព័ត៌មានមកបំពេញក្នុង Input អូតូ
    function autoFillTelegramInfo() {
        const user = tg.initDataUnsafe?.user;

        if (user) {
            // ទាញឈ្មោះ (នាមខ្លួន + នាមត្រកូល)
            const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim();
            if (fullName) {
                document.getElementById('cust-name').value = fullName;
            }

            // សម្គាល់៖ Telegram មិនអនុញ្ញាតឱ្យទាញ "លេខទូរស័ព្ទ" ដោយស្វ័យប្រវត្តិភ្លាមៗទេ 
            // ដើម្បីការពារឯកជនភាព លុះត្រាតែអ្នកប្រើចុចប៊ូតុង "Share Contact"។
            // ប៉ុន្តែយើងអាចដាក់ Username ជាបណ្តោះអាសន្នបាន។
            if (user.username) {
                document.getElementById('cust-phone').placeholder = "បញ្ចូលលេខទូរស័ព្ទ (Username: @" + user.username + ")";
            }
        }
    }

    // ហៅមុខងារនេះឱ្យដើរនៅពេល Page Load រួចរាល់
    window.onload = function() {
        renderProducts(products); // បង្ហាញផលិតផល
        autoFillTelegramInfo();   // បំពេញឈ្មោះអូតូ
    };

    // ៣. កែសម្រួលមុខងារ Checkout ឱ្យកាន់តែប្រសើរ
    function checkout() {
        const name = document.getElementById('cust-name').value.trim();
        const phone = document.getElementById('cust-phone').value.trim();

        if (cart.length === 0) return alert("សូមរើសផលិតផលសិន!");
        if (!name || !phone) return alert("សូមបំពេញឈ្មោះ និងលេខទូរស័ព្ទ!");

        const myTelegramUser = "roththa2"; 
        
        let message = "🏗️ *ការកុម្ម៉ង់ពី Telegram Mini App*\n";
        message += "━━━━━━━━━━━━━━━━━━\n";
        message += `👤 *អតិថិជន:* ${name}\n`;
        message += `📞 *លេខទូរស័ព្ទ:* ${phone}\n`;
        // បន្ថែមព័ត៌មាន ID បើមាន
        if(tg.initDataUnsafe?.user?.id) {
            message += `🆔 *Telegram ID:* ${tg.initDataUnsafe.user.id}\n`;
        }
        message += "━━━━━━━━━━━━━━━━━━\n";
        message += "📦 *បញ្ជីទំនិញ:*\n";
        
        let total = 0;
        cart.forEach((item, index) => {
            const subTotal = item.price * item.qty;
            total += subTotal;
            message += `${index + 1}. ${item.name} (x${item.qty}) = *$${subTotal.toFixed(2)}*\n`;
        });

        message += "━━━━━━━━━━━━━━━━━━\n";
        message += `💰 *សរុបរួម: $${total.toFixed(2)}*\n`;
        message += "━━━━━━━━━━━━━━━━━━\n";

        const telegramUrl = `https://t.me/${myTelegramUser}?text=${encodeURIComponent(message)}`;
        window.open(telegramUrl, '_blank');
    }
</script>

</body>
</html>
