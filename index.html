<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - PV1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; }
        .cart-sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-lg">Roththa Construction</h1>
        <div class="relative cursor-pointer p-2" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-[10px] rounded-full px-1.5 border-2 border-blue-800 font-bold">0</span>
        </div>
    </nav>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4">
        <p class="col-span-2 text-center text-gray-400 py-10 italic">កំពុងទាញទិន្នន័យពី Firebase...</p>
    </div>

    <div id="cart-sidebar" class="cart-sidebar fixed right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl transform translate-x-full z-[60] flex flex-col">
        <div class="p-4 bg-blue-800 text-white flex justify-between items-center">
            <span class="font-bold text-lg"><i class="fas fa-shopping-basket mr-2"></i>កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-3xl p-2">&times;</button>
        </div>
        
        <div id="cart-items-list" class="flex-grow overflow-y-auto p-4 space-y-3 bg-gray-50">
            <p class="text-center text-gray-400 mt-10 italic">មិនទាន់មានទំនិញក្នុងកន្ត្រក</p>
        </div>

        <div class="p-5 border-t bg-white shadow-lg">
            <div class="mb-3 text-sm font-bold text-gray-500">
                អ្នកបញ្ជាទិញ៖ <span id="user-display" class="text-blue-700 ml-1">...</span>
            </div>
            <div class="flex justify-between items-center font-bold text-xl mb-4">
                <span>សរុប:</span>
                <span id="cart-total" class="text-red-600">$0.00</span>
            </div>
            <button onclick="sendOrder()" id="btn-submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                <i class="fab fa-telegram-plane mr-2"></i>បញ្ជាក់ការកុម្ម៉ង់
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.onload = async () => {
            const tele = window.Telegram.WebApp;
            const user = tele.initDataUnsafe?.user;
            document.getElementById('user-display').innerText = user ? user.first_name : "ភ្ញៀវ (Browser)";
            tele.expand();

            try {
                const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                const list = document.getElementById('product-list');
                let html = '';
                querySnapshot.forEach((doc) => {
                    const p = doc.data();
                    html += `
                        <div class="bg-white p-3 rounded-2xl shadow-sm border relative overflow-hidden">
                            <img src="${p.img}" class="w-full h-28 object-cover rounded-xl mb-2">
                            <h3 class="font-bold text-xs h-8 overflow-hidden">${p.name}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-red-600 font-bold">$${p.price.toFixed(2)}</span>
                                <button onclick="addToCart('${doc.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})" class="bg-blue-700 text-white w-8 h-8 rounded-lg flex items-center justify-center active:scale-90 transition-all">
                                    <i class="fas fa-plus text-xs"></i>
                                </button>
                            </div>
                        </div>`;
                });
                list.innerHTML = html || "<p class='col-span-2 text-center text-gray-400'>គ្មានទំនិញក្នុងស្តុក</p>";
            } catch (e) {
                document.getElementById('product-list').innerHTML = "ការទាញទិន្នន័យមានបញ្ហា!";
            }
        };
    </script>

    <script>
        let cart = [];

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function addToCart(id, name, price) {
            const item = cart.find(i => i.id === id);
            if (item) { item.qty++; } else { cart.push({ id, name, price, qty: 1 }); }
            updateCartUI();
        }

        function changeQty(index, amount) {
            if (cart[index].qty + amount > 0) { cart[index].qty += amount; } 
            else { if (confirm("លុបទំនិញនេះចេញពីកន្ត្រក?")) { cart.splice(index, 1); } }
            updateCartUI();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10 italic">មិនទាន់មានទំនិញ</p>';
                totalDisplay.innerText = '$0.00';
                countDisplay.innerText = '0';
                return;
            }

            let total = 0;
            list.innerHTML = cart.map((item, index) => {
                const subTotal = item.price * item.qty;
                total += subTotal;
                return `
                    <div class="bg-white p-3 rounded-xl border flex flex-col gap-2 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-xs text-gray-700">${item.name}</span>
                            <button onclick="removeItem(${index})" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center border rounded-lg bg-gray-50">
                                <button onclick="changeQty(${index}, -1)" class="w-7 h-7 flex items-center justify-center font-bold text-red-500">-</button>
                                <span class="w-8 text-center font-bold text-xs text-blue-800">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="w-7 h-7 flex items-center justify-center font-bold text-green-600">+</button>
                            </div>
                            <span class="font-bold text-blue-700 text-sm">$${subTotal.toFixed(2)}</span>
                        </div>
                    </div>`;
            }).join('');

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = cart.length;
        }

        async function sendOrder() {
    if (cart.length === 0) return alert("សូមរើសទំនិញសិន!");

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerText = "កំពុងផ្ញើ...";

    // ១. រៀបចំទិន្នន័យអតិថិជនពី Telegram Web App
    const tele = window.Telegram.WebApp;
    const user = tele.initDataUnsafe?.user;
    const userName = user ? (user.first_name + (user.last_name ? " " + user.last_name : "")) : "ភ្ញៀវ";
    const userId = user ? user.id : "";
    const userUsername = user ? user.username : "";
    
    // ២. រៀបចំកាលបរិច្ឆេទ និងម៉ោង
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-GB'); // ទម្រង់ DD/MM/YYYY
    const timeStr = now.toLocaleTimeString('en-US', { hour12: true }); // ទម្រង់ HH:MM:SS AM/PM

    // ៣. រៀបចំខ្លឹមសារសារ (Formatting like the image)
    let message = `🏗 *ការកុម្ម៉ង់ថ្មី (ស្វ័យប្រវត្តិ)*\n`;
    message += `━━━━━━━━━━━━━━━━━━\n\n`;
    message += `👤 *អតិថិជន:* ${userName}\n`;
    message += `📅 *ថ្ងៃទី:* ${dateStr}\n`;
    message += `⏰ *ម៉ោង:* ${timeStr}\n`;
    
    if (userUsername) {
        message += `🔗 *Profile:* [ចុចទីនេះដើម្បី Chat](https://t.me/${userUsername})\n`;
    } else if (userId) {
        message += `🔗 *Profile:* [ចុចទីនេះដើម្បី Chat](tg://user?id=${userId})\n`;
    }

    message += `\n━━━━━━━━━━━━━━━━━━\n`;

    // បញ្ជីទំនិញ
    cart.forEach((item, idx) => {
        const itemTotal = (item.qty * item.price).toFixed(2);
        message += `${idx + 1}. ${item.name} (x${item.qty}) = *$${itemTotal}*\n`;
    });

    message += `━━━━━━━━━━━━━━━━━━\n`;
    message += `💰 *សរុប៖ ${document.getElementById('cart-total').innerText}*\n\n`;
    message += `🚀 *ផ្ញើចេញពី Roththa Mini App*`;

    // ៤. ព័ត៌មាន Bot (សូមប្រើ Token និង ID របស់អ្នក)
    const botToken = "8790246863:AAGhESD1muJVvaO9DhNxiuqoVmY8dIhEl8U"; 
    const chatId = "7453536903"; 

    const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                text: message,
                parse_mode: 'Markdown',
                disable_web_page_preview: false
            })
        });

        if (response.ok) {
            alert("✅ ការកុម្ម៉ង់ត្រូវបានផ្ញើជោគជ័យ!");
            cart = [];
            updateCartUI();
            toggleCart();
        } else {
            alert("❌ ផ្ញើមិនចេញ! សូមពិនិត្យ Bot Token/Chat ID");
        }
    } catch (e) {
        alert("❌ បញ្ហាអ៊ីនធឺណិត!");
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-telegram-plane mr-2"></i>បញ្ជាក់ការកុម្ម៉ង់';
    }
}

    </script>
</body>
</html>
