<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1.5rem; padding: 1.2rem; border: 1px solid #e2e8f0; }
        .hidden-panel { display: none; }
        .selected-row { background-color: #eff6ff !important; border-left: 4px solid #2563eb; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="font-bold text-blue-900 text-xl mb-6 underline italic">ADMIN PRO CONTROL</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 ring-blue-500">
        <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all uppercase">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="card bg-blue-700 text-white border-none flex flex-col items-center">
                <p class="text-[9px] opacity-80 font-bold uppercase">ចំណូលសរុប</p>
                <h2 id="dash-revenue" class="text-xl md:text-2xl font-black mt-1">$0.00</h2>
            </div>
            <div class="card bg-orange-500 text-white border-none flex flex-col items-center">
                <p class="text-[9px] opacity-80 font-bold uppercase">ការកុម្ម៉ង់</p>
                <h2 id="dash-orders" class="text-xl md:text-2xl font-black mt-1">0</h2>
            </div>
            <div class="card bg-emerald-600 text-white border-none flex flex-col items-center">
                <p class="text-[9px] opacity-80 font-bold uppercase">មុខទំនិញ</p>
                <h2 id="dash-products" class="text-xl md:text-2xl font-black mt-1">0</h2>
            </div>
            <button onclick="window.loadAll()" class="card bg-white border-2 border-blue-600 text-blue-600 font-bold hover:bg-blue-50 transition-all">
                <i class="fas fa-sync-alt mr-2"></i> UPDATE
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="card border-t-8 border-blue-600">
                    <h2 id="form-title" class="font-bold text-slate-800 mb-4 text-sm italic underline">បញ្ចូលទំនិញថ្មី</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-3">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-3 bg-gray-50 border rounded-xl text-xs outline-none focus:ring-1">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-3 bg-blue-50 border rounded-xl text-[10px] font-bold text-blue-700"></select>
                            <select id="p-sup-select" class="w-1/2 p-3 bg-orange-50 border rounded-xl text-[10px] font-bold text-orange-700"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-1/2 p-3 bg-emerald-50 border rounded-xl text-xs font-bold">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-3 bg-gray-50 border rounded-xl text-xs">
                        </div>
                        <input type="file" id="p-file" class="w-full text-[10px] text-gray-400 border border-dashed p-2 rounded-xl">
                        <input type="hidden" id="p-img">
                        <div class="flex gap-2">
                            <button id="save-btn" onclick="window.saveProduct()" class="flex-grow bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 text-xs">រក្សាទុក</button>
                            <button id="cancel-btn" onclick="window.clearForm()" class="hidden bg-gray-400 text-white px-4 rounded-xl text-xs font-bold">បោះបង់</button>
                        </div>
                    </div>
                </div>

                <div class="card border-t-8 border-slate-800">
                    <h2 class="font-bold text-slate-800 mb-4 text-xs italic">កំណត់ប្រភេទ និង Supplier</h2>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="cat-input" placeholder="ឈ្មោះប្រភេទ..." class="flex-grow p-2 bg-gray-50 border rounded-xl text-[10px]">
                        <button onclick="window.addCategory()" class="bg-blue-500 text-white px-3 rounded-xl text-xs font-bold">+</button>
                    </div>
                    <div class="space-y-2">
                        <input type="text" id="sup-name-input" placeholder="ឈ្មោះ Supplier..." class="w-full p-2 bg-gray-50 border rounded-xl text-[10px]">
                        <div class="flex gap-2">
                            <input type="text" id="sup-phone-input" placeholder="លេខទូរសព្ទ..." class="flex-grow p-2 bg-gray-50 border rounded-xl text-[10px]">
                            <button onclick="window.addSupplier()" class="bg-orange-500 text-white px-3 rounded-xl text-xs font-bold">ថែម Supplier</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div id="export-area-stock" class="card h-[500px] flex flex-col overflow-hidden">
                    <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
                        <h2 class="font-bold text-blue-900 text-xs italic uppercase"><i class="fas fa-boxes mr-1"></i> បញ្ជីស្តុកផលិតផល</h2>
                        <div class="flex gap-2">
                            <input type="text" id="search-stock" onkeyup="window.searchTable('product-table-body', this.value)" placeholder="ស្វែងរកទំនិញ..." class="p-2 border rounded-xl text-[10px] w-28 outline-none focus:ring-1">
                            <button onclick="window.exportSelected('export-area-stock', 'Stock_Report')" class="bg-red-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold shadow-md uppercase">Export PDF</button>
                        </div>
                    </div>
                    <div class="overflow-y-auto no-scrollbar flex-grow">
                        <table class="w-full text-left text-[11px]">
                            <thead class="sticky top-0 bg-white border-b text-gray-400 z-10">
                                <tr>
                                    <th class="py-2 px-1"><input type="checkbox" id="select-all-products" onclick="window.selectAll('product-checkbox')"></th>
                                    <th>រូប</th><th>ឈ្មោះ</th><th>ប្រភេទ</th><th class="text-center">ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-right px-2">សកម្មភាព</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="export-area-order" class="card h-[500px] flex flex-col overflow-hidden border-l-8 border-blue-900">
                    <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
                        <h2 class="font-bold text-blue-900 text-xs italic uppercase"><i class="fas fa-history mr-1"></i> ប្រវត្តិការលក់</h2>
                        <div class="flex gap-2">
                            <input type="text" id="search-order" onkeyup="window.searchOrders(this.value)" placeholder="រកតាមឈ្មោះភ្ញៀវ..." class="p-2 border rounded-xl text-[10px] w-28 outline-none focus:ring-1">
                            <button onclick="window.exportToPDF('export-area-order', 'All_Sales_Report')" class="bg-emerald-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold shadow-md uppercase">Export All</button>
                        </div>
                    </div>
                    <div id="order-history-list" class="space-y-3 overflow-y-auto no-scrollbar flex-grow pr-2">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH ---
        document.getElementById('login-btn').onclick = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden-panel');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                window.loadAll();
            } else { alert("Wrong Password!"); }
        };

        // --- LOAD DATA ---
        window.loadAll = async () => {
            try {
                const cSnap = await getDocs(query(collection(db, "categories"), orderBy("name")));
                const sSnap = await getDocs(query(collection(db, "suppliers"), orderBy("name")));
                const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
                const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));

                // Update Dash
                document.getElementById('dash-products').innerText = pSnap.size;
                document.getElementById('dash-orders').innerText = oSnap.size;
                let rev = 0; oSnap.forEach(d => { let v = d.data().total_amount ? d.data().total_amount.toString().replace('$', '') : 0; rev += parseFloat(v) || 0; });
                document.getElementById('dash-revenue').innerText = `$${rev.toFixed(2)}`;

                // Dropdowns
                const catSel = document.getElementById('p-cat-select');
                const supSel = document.getElementById('p-sup-select');
                catSel.innerHTML = `<option value="">-- ប្រភេទ --</option>`;
                supSel.innerHTML = `<option value="">-- Supplier --</option>`;
                cSnap.forEach(d => catSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
                sSnap.forEach(d => {
                    const s = d.data();
                    supSel.innerHTML += `<option value="${s.name}">${s.name} (${s.phone || 'គ្មានលេខ'})</option>`;
                });

                // Products Table
                const pBody = document.getElementById('product-table-body');
                pBody.innerHTML = "";
                pSnap.forEach(d => {
                    const p = d.data();
                    pBody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50 transition-all" id="row-${d.id}">
                            <td class="px-1"><input type="checkbox" class="product-checkbox" value="${d.id}" onclick="window.highlightRow('${d.id}', this)"></td>
                            <td class="py-2"><img src="${p.img || ''}" class="w-8 h-8 rounded border object-cover"></td>
                            <td class="font-bold text-blue-900">${p.name}</td>
                            <td class="text-gray-400 text-[9px] uppercase">${p.category}</td>
                            <td class="text-center font-bold text-orange-600">${p.stock || 0}</td>
                            <td class="text-right font-bold text-emerald-600">$${(p.price || 0).toFixed(2)}</td>
                            <td class="text-right px-2">
                                <button onclick="window.editProduct('${d.id}')" class="text-blue-400 hover:text-blue-600 mr-2"><i class="fas fa-edit"></i></button>
                                <button onclick="window.deleteItem('products','${d.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>`;
                });

                // Orders List
                window.allOrders = oSnap.docs; // Store for search
                window.renderOrders(window.allOrders);

            } catch (e) { console.error(e); alert("Error loading data. Check Firebase Rules!"); }
        };

        // --- PRODUCT ACTIONS ---
        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat-select').value,
                supplier: document.getElementById('p-sup-select').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                img: document.getElementById('p-img').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name || !data.category) return alert("Fill all info!");

            if(id) {
                await updateDoc(doc(db, "products", id), data);
                alert("Update Success!");
            } else {
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "products"), data);
                alert("Saved Success!");
            }
            window.clearForm(); window.loadAll();
        };

        window.editProduct = async (id) => {
            const d = await getDoc(doc(db, "products", id));
            const p = d.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat-select').value = p.category;
            document.getElementById('p-sup-select').value = p.supplier;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-img').value = p.img || "";
            document.getElementById('form-title').innerText = "កែសម្រួលទំនិញ (Editing Mode)";
            document.getElementById('save-btn').innerText = "Update";
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.clearForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-stock').value = "";
            document.getElementById('form-title').innerText = "បញ្ចូលទំនិញថ្មី";
            document.getElementById('save-btn').innerText = "រក្សាទុក";
            document.getElementById('cancel-btn').classList.add('hidden');
        };

        // --- MASTER DATA ---
        window.addCategory = async () => {
            const v = document.getElementById('cat-input').value;
            if(v) { await addDoc(collection(db, "categories"), {name: v}); window.loadAll(); document.getElementById('cat-input').value=""; }
        };

        window.addSupplier = async () => {
            const name = document.getElementById('sup-name-input').value;
            const phone = document.getElementById('sup-phone-input').value;
            if(name) { 
                await addDoc(collection(db, "suppliers"), {name: name, phone: phone}); 
                window.loadAll(); 
                document.getElementById('sup-name-input').value=""; 
                document.getElementById('sup-phone-input').value="";
            }
        };

        window.deleteItem = async (col, id) => {
            if(confirm("Confirm Delete?")) { await deleteDoc(doc(db, col, id)); window.loadAll(); }
        };

        // --- SEARCH & FILTER ---
        window.searchTable = (tableId, query) => {
            const rows = document.getElementById(tableId).getElementsByTagName('tr');
            for (let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(query.toLowerCase()) ? "" : "none";
            }
        };

        window.renderOrders = (docs) => {
            const body = document.getElementById('order-history-list');
            body.innerHTML = "";
            docs.forEach(d => {
                const o = d.data();
                const date = o.createdAt ? o.createdAt.toDate().toLocaleString('km-KH') : 'New';
                body.innerHTML += `
                    <div class="p-3 bg-white rounded-xl border-l-4 border-blue-600 shadow-sm relative group order-item">
                        <div class="flex justify-between">
                            <span class="font-bold text-blue-900 text-[10px] uppercase">${o.customer_name || 'Guest'}</span>
                            <span class="text-red-600 font-bold text-[10px]">${o.total_amount || '$0.00'}</span>
                        </div>
                        <p class="text-[8px] text-gray-400 italic mb-1">${date}</p>
                        <div class="text-[9px] text-gray-500">
                            ${o.items ? o.items.map(i => i.name + " x" + i.qty).join(", ") : ""}
                        </div>
                        <button onclick="window.deleteItem('orders','${d.id}')" class="absolute right-2 top-2 opacity-0 group-hover:opacity-100 text-red-300"><i class="fas fa-times-circle"></i></button>
                    </div>`;
            });
        };

        window.searchOrders = (query) => {
            const filtered = window.allOrders.filter(d => 
                (d.data().customer_name || '').toLowerCase().includes(query.toLowerCase())
            );
            window.renderOrders(filtered);
        };

        // --- SELECT & EXPORT ---
        window.selectAll = (cls) => {
            const chks = document.getElementsByClassName(cls);
            const master = document.getElementById('select-all-products');
            for(let c of chks) {
                c.checked = master.checked;
                window.highlightRow(c.value, c);
            }
        };

        window.highlightRow = (id, el) => {
            const row = document.getElementById(`row-${id}`);
            if(el.checked) row.classList.add('selected-row');
            else row.classList.remove('selected-row');
        };

        window.exportSelected = async (elId, name) => {
            // បើមាន Checkbox គឺវាលាក់ជួរដែលមិនបាន Select សិនចាំ Export
            const chks = document.getElementsByClassName('product-checkbox');
            let hasSelection = false;
            for(let c of chks) if(c.checked) hasSelection = true;

            if(hasSelection) {
                const rows = document.getElementById('product-table-body').getElementsByTagName('tr');
                for(let r of rows) {
                    if(!r.classList.contains('selected-row')) r.style.display = 'none';
                }
                await window.exportToPDF(elId, name + "_Selected");
                for(let r of rows) r.style.display = ''; // បង្ហាញវិញ
            } else {
                await window.exportToPDF(elId, name + "_Full");
            }
        };

        window.exportToPDF = async (elID, name) => {
            const element = document.getElementById(elID);
            const canvas = await html2canvas(element, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfW = pdf.internal.pageSize.getWidth();
            const pdfH = (canvas.height * pdfW) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);
            pdf.save(`${name}_${new Date().toLocaleDateString()}.pdf`);
        };

        // File Handler
        document.getElementById('p-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => document.getElementById('p-img').value = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

    </script>
</body>
</html>
