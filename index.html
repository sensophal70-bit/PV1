<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Store - Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <h1 class="font-bold">ហាងសំណង់ Roththa</h1>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] rounded-full px-1.5">0</span>
        </div>
    </nav>

    <div class="p-4">
        <input type="text" id="search-input" onkeyup="searchProduct()" 
            class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" 
            placeholder="ស្វែងរកសម្ភារៈសំណង់...">
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-3 p-4"></div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-80 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-4 bg-blue-600 text-white flex justify-between items-center">
            <span class="font-bold">កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3"></div>

        <div class="p-4 border-t bg-gray-50">
            <div class="mb-3">
                <label class="text-xs font-bold text-gray-500 uppercase">ឈ្មោះអតិថិជន (ស្វ័យប្រវត្តិ)</label>
                <input type="text" id="cust-name" readonly class="w-full p-2 bg-gray-100 border rounded font-bold text-blue-700 outline-none">
            </div>
            <div class="flex justify-between font-bold text-lg mb-4">
                <span>សរុប:</span>
                <span id="cart-total" class="text-red-600">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg flex justify-center items-center">
                <i class="fab fa-telegram-plane mr-2"></i> បញ្ជាក់ការកុម្ម៉ង់
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            { id: 1, name: "ស៊ីម៉ងត៍ K-Cement", price: 5.50, img: "https://via.placeholder.com/150?text=Cement" },
            { id: 2, name: "ដែកសរសៃ ១២លី", price: 0.85, img: "https://via.placeholder.com/150?text=Steel" },
            { id: 3, name: "ការ៉ូបាត 60x60", price: 12.00, img: "https://via.placeholder.com/150?text=Tiles" },
            { id: 4, name: "ថ្នាំលាបផ្ទះ Nippon", price: 45.00, img: "https://via.placeholder.com/150?text=Paint" }
        ];

        let cart = [];

        // ទាញឈ្មោះពី Telegram អូតូ
        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('cust-name').value = `${user.first_name} ${user.last_name || ''}`.trim();
            } else {
                document.getElementById('cust-name').value = "ភ្ញៀវទូទៅ";
            }
            renderProducts(products);
        };

        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                    <img src="${p.img}" class="w-full h-24 object-cover rounded-lg mb-2">
                    <h3 class="font-bold text-xs h-8 overflow-hidden">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-red-500 font-bold text-sm">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white p-1.5 rounded-lg text-xs">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function searchProduct() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(term)));
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            exist ? exist.qty++ : cart.push({ ...product, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400">ទទេ</p>';
                document.getElementById('cart-total').innerText = "$0.00";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `<div class="flex justify-between items-center text-sm border-b pb-2">
                    <div><b>${item.name}</b><br><small>$${item.price} x ${item.qty}</small></div>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500">&times;</button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        // មុខងារផ្ញើដោយ Automated (SendData)
        function checkout() {
    if (cart.length === 0) return alert("កន្ត្រកទំនិញនៅទំនេរ!");

    const name = document.getElementById('cust-name').value;
    const myTelegramUser = "roththa2"; // Username របស់អ្នក

    let message = "🏗️ *ការកុម្ម៉ង់សម្ភារៈសំណង់ថ្មី*\n";
    message += "━━━━━━━━━━━━━━━━━━\n";
    message += `👤 *អតិថិជន:* ${name}\n`;
    message += "━━━━━━━━━━━━━━━━━━\n";
    
    let total = 0;
    cart.forEach((item, index) => {
        const subTotal = item.price * item.qty;
        total += subTotal;
        message += `${index + 1}. ${item.name} (x${item.qty}) = *$${subTotal.toFixed(2)}*\n`;
    });

    message += "━━━━━━━━━━━━━━━━━━\n";
    message += `💰 *សរុបរួម: $${total.toFixed(2)}*\n`;
    message += "━━━━━━━━━━━━━━━━━━\n";

    // បង្កើត Link ដើម្បីបើក Chat ទៅកាន់ @roththa2
    const telegramUrl = `https://t.me/${myTelegramUser}?text=${encodeURIComponent(message)}`;
    
    // បើក Telegram Chat
    window.open(telegramUrl, '_blank');
}

    </script>
</body>
</html>
