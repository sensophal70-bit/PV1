<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - Stock Manager v13.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; padding: 1.5rem; border: 1px solid #e2e8f0; }
        .hidden-panel { display: none !important; }
        .selected-row { background-color: #f0f9ff !important; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-panel" class="max-w-md mx-auto mt-20 card text-center border-t-8 border-blue-600 shadow-xl">
        <h1 class="font-bold text-blue-900 text-2xl mb-6 uppercase italic">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 border rounded-2xl text-center mb-4 outline-none focus:ring-2 ring-blue-500">
        <button onclick="window.login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
            <h2 class="font-bold text-blue-900 italic uppercase">Roththa Shop v13.0</h2>
            <div class="flex gap-2">
                <button onclick="window.showModal('cat-modal')" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-blue-200">+ Category</button>
                <button onclick="window.showModal('sup-modal')" class="bg-orange-50 text-orange-600 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-orange-200">+ Supplier</button>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-3 py-2 rounded-xl text-[10px] font-bold">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="card border-t-4 border-blue-600">
                    <h3 id="form-title" class="font-bold text-xs mb-4 uppercase underline text-blue-600 italic">បញ្ចូលទំនិញថ្មី</h3>
                    <div class="space-y-3">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-2 border rounded-xl text-xs outline-none">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-blue-50"></select>
                            <select id="p-sup-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-orange-50"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ $" class="w-1/2 p-2 border rounded-xl text-xs font-bold text-emerald-600">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-2 border rounded-xl text-xs">
                        </div>
                        <div id="img-preview-container" class="hidden text-center"><img id="img-view" class="w-16 h-16 rounded mx-auto border mb-2 object-cover"></div>
                        <input type="file" id="p-file" class="w-full text-[10px] border p-1 rounded-xl bg-gray-50">
                        <input type="hidden" id="p-img">
                        
                        <div class="flex gap-2">
                            <button id="btn-save" onclick="window.saveProduct()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow">រក្សាទុក</button>
                            <button id="btn-cancel" onclick="window.cancelEdit()" class="hidden flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold text-xs uppercase shadow">បោះបង់</button>
                        </div>
                    </div>
                </div>

                <div class="card border-t-4 border-orange-500">
                    <h3 class="font-bold text-[10px] uppercase text-orange-600 underline italic mb-3">ប្រវត្តិការលក់</h3>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <button onclick="window.exportSelectedInvoices()" class="bg-blue-600 text-white py-1 rounded text-[8px] font-bold uppercase shadow">Export PDF</button>
                        <button onclick="window.deleteSelectedOrders()" class="bg-red-600 text-white py-1 rounded text-[8px] font-bold uppercase shadow">Delete All</button>
                    </div>
                    <div class="overflow-y-auto max-h-[300px]">
                        <table class="w-full text-[10px]">
                            <tbody id="order-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 card border-t-4 border-emerald-500">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                    <h3 class="font-bold text-xs uppercase text-emerald-700 italic">របាយការណ៍ស្តុក</h3>
                    <div class="relative w-full md:w-64">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                        <input type="text" onkeyup="window.searchStock(this.value)" placeholder="ស្វែងរកទំនិញ ឬប្រភេទ..." class="w-full pl-9 p-2 border rounded-2xl text-[10px] outline-none focus:ring-2 ring-emerald-400">
                    </div>
                    <button onclick="window.exportStockPDF()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow">Stock PDF</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-[11px] text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-3"><input type="checkbox" onclick="window.selectAll('p-chk', this)"></th>
                                <th>រូបភាព</th><th>ឈ្មោះ</th><th>ប្រភេទ</th><th class="text-center">ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-center">កែ/លុប</th>
                            </tr>
                        </thead>
                        <tbody id="product-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="cat-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-sm"><h3 class="font-bold mb-4 uppercase text-sm border-b pb-2">ប្រភេទផលិតផល</h3><input type="text" id="new-cat" class="w-full p-2 border rounded-xl mb-4 outline-none text-center"><button onclick="window.addCategory()" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold uppercase">បន្ថែម</button><div id="cat-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div><button onclick="window.closeModal('cat-modal')" class="w-full mt-4 text-gray-400 text-[10px]">បិទ</button></div></div>
    <div id="sup-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-sm"><h3 class="font-bold mb-4 uppercase text-sm border-b pb-2">អ្នកផ្គត់ផ្គង់</h3><input type="text" id="new-sup-name" placeholder="ឈ្មោះ" class="w-full p-2 border rounded-xl mb-2 outline-none text-center"><input type="text" id="new-sup-phone" placeholder="លេខទូរស័ព្ទ" class="w-full p-2 border rounded-xl mb-4 outline-none text-center"><button onclick="window.addSupplier()" class="w-full bg-orange-600 text-white py-2 rounded-xl font-bold uppercase">បន្ថែម</button><div id="sup-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div><button onclick="window.closeModal('sup-modal')" class="w-full mt-4 text-gray-400 text-[10px]">បិទ</button></div></div>

    <div id="pdf-view-panel" class="hidden-panel fixed inset-0 bg-gray-900/95 z-[100] flex flex-col items-center p-4 overflow-y-auto">
        <div class="w-full max-w-3xl flex justify-between mb-4 sticky top-0 bg-gray-900/80 p-2 rounded-xl"><button onclick="window.showMain()" class="bg-white px-6 py-2 rounded-xl font-bold text-blue-900 italic">Back</button><button id="btn-download" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold shadow-xl uppercase italic">Download PDF</button></div>
        <div id="pdf-render-area" class="w-full max-w-2xl bg-white shadow-2xl rounded p-2"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH & NAVIGATION ---
        window.login = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden-panel');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                window.loadAll();
            } else alert("លេខកូដខុស!");
        };
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden-panel');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden-panel');
        window.showMain = () => { document.getElementById('pdf-view-panel').classList.add('hidden-panel'); document.getElementById('admin-main').classList.remove('hidden-panel'); };

        // --- STOCK SEARCH ---
        window.searchStock = (q) => {
            const rows = document.getElementById('product-body').children;
            for(let r of rows) {
                const text = r.innerText.toLowerCase();
                r.style.display = text.includes(q.toLowerCase()) ? "" : "none";
            }
        };

        // --- EDIT & UPDATE PRODUCT ---
        window.editProduct = async (id) => {
            const snap = await getDoc(doc(db, "products", id));
            const p = snap.data();
            
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat-select').value = p.category;
            document.getElementById('p-sup-select').value = p.supplier;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-img').value = p.img || "";
            
            if(p.img) {
                document.getElementById('img-view').src = p.img;
                document.getElementById('img-preview-container').classList.remove('hidden');
            }

            document.getElementById('form-title').innerText = "កែសម្រួលទំនិញ";
            document.getElementById('btn-save').innerText = "Update Now";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-stock').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('img-preview-container').classList.add('hidden');
            document.getElementById('form-title').innerText = "បញ្ចូលទំនិញថ្មី";
            document.getElementById('btn-save').innerText = "រក្សាទុក";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat-select').value,
                supplier: document.getElementById('p-sup-select').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                img: document.getElementById('p-img').value,
                updatedAt: serverTimestamp()
            };

            if(!data.name) return alert("សូមបញ្ចូលឈ្មោះ!");

            if(id) {
                // Update existing product
                await updateDoc(doc(db, "products", id), data);
                alert("បានកែប្រែជោគជ័យ!");
                window.cancelEdit();
            } else {
                // Add new product
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "products"), data);
                alert("បានរក្សាទុក!");
                window.cancelEdit();
            }
            window.loadAll();
        };

        // --- LOAD DATA ---
        window.loadAll = async () => {
            const [pSnap, oSnap, cSnap, sSnap] = await Promise.all([
                getDocs(query(collection(db, "products"), orderBy("createdAt", "desc"))),
                getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc"))),
                getDocs(collection(db, "categories")),
                getDocs(collection(db, "suppliers"))
            ]);

            // Update Cat/Sup Selects
            const cSel = document.getElementById('p-cat-select');
            const sSel = document.getElementById('p-sup-select');
            cSel.innerHTML = sSel.innerHTML = "";
            cSnap.forEach(d => cSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
            sSnap.forEach(d => sSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);

            // Update Stock Table
            const pBody = document.getElementById('product-body');
            pBody.innerHTML = "";
            pSnap.forEach(d => {
                const p = d.data();
                pBody.innerHTML += `
                    <tr class="border-b" id="p-row-${d.id}">
                        <td class="p-3"><input type="checkbox" class="p-chk" data-id="${d.id}" onclick="window.highRow('p-row-${d.id}', this)"></td>
                        <td><img src="${p.img || ''}" class="w-10 h-10 rounded border object-cover" crossorigin="anonymous"></td>
                        <td class="font-bold">${p.name}</td>
                        <td class="text-[9px] text-gray-400">${p.category || ''}</td>
                        <td class="text-center font-bold text-orange-600">${p.stock}</td>
                        <td class="text-right font-bold text-emerald-600">$${(p.price || 0).toFixed(2)}</td>
                        <td class="text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="window.editProduct('${d.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                                <button onclick="window.del('products','${d.id}')" class="text-red-300 hover:text-red-600"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });

            // Update Orders
            const oBody = document.getElementById('order-body');
            oBody.innerHTML = "";
            oSnap.forEach(d => {
                const o = d.data();
                oBody.innerHTML += `<tr class="border-b"><td class="p-2 font-bold">${o.customer_name}</td><td class="text-right text-blue-600 font-bold">$${o.total_amount}</td></tr>`;
            });
        };

        // --- UTILS ---
        window.del = async (col, id) => { if(confirm("លុបមែនទេ?")) { await deleteDoc(doc(db, col, id)); window.loadAll(); } };
        window.highRow = (rid, el) => document.getElementById(rid).classList.toggle('selected-row', el.checked);
        window.selectAll = (cls, master) => { const chks = document.getElementsByClassName(cls); for(let c of chks) { c.checked = master.checked; window.highRow(c.closest('tr').id, c); } };
        
        // Image Processing
        document.getElementById('p-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                document.getElementById('p-img').value = ev.target.result;
                document.getElementById('img-view').src = ev.target.result;
                document.getElementById('img-preview-container').classList.remove('hidden');
            };
            r.readAsDataURL(e.target.files[0]);
        };

        // PDF (Existing Logic)
        window.exportStockPDF = async () => {
            const checked = document.querySelectorAll('.p-chk:checked');
            if(checked.length === 0) return alert("សូមជ្រើសរើសទំនិញ!");
            const area = document.getElementById('pdf-render-area');
            area.innerHTML = `<div style="padding:20px; font-family:'Hanuman',serif;"><h2 style="text-align:center; color:#059669; border-bottom:2px solid #059669; padding-bottom:10px;">របាយការណ៍ស្តុកទំនិញ</h2><table style="width:100%; border-collapse:collapse; margin-top:20px; font-size:12px;"><thead><tr style="background:#ecfdf5;"><th>រូបភាព</th><th style="text-align:left;">ឈ្មោះ</th><th style="text-align:center;">ស្តុក</th><th style="text-align:right;">តម្លៃ</th></tr></thead><tbody id="pdf-rows"></tbody></table></div>`;
            const rows = area.querySelector('#pdf-rows');
            for(let c of checked) {
                const snap = await getDoc(doc(db, "products", c.dataset.id));
                const p = snap.data();
                rows.innerHTML += `<tr><td style="border:1px solid #eee; text-align:center; padding:5px;"><img src="${p.img}" style="width:40px; height:40px; object-fit:cover;" crossorigin="anonymous"></td><td style="border:1px solid #eee; padding:10px;">${p.name}</td><td style="border:1px solid #eee; text-align:center;">${p.stock}</td><td style="border:1px solid #eee; text-align:right; padding:10px;">$${p.price.toFixed(2)}</td></tr>`;
            }
            window.showPDFPreview("Stock_Report.pdf");
        };

        window.showPDFPreview = (filename) => {
            document.getElementById('admin-main').classList.add('hidden-panel');
            document.getElementById('pdf-view-panel').classList.remove('hidden-panel');
            document.getElementById('btn-download').onclick = () => {
                const opt = { margin: 0.2, filename, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4' } };
                html2pdf().from(document.getElementById('pdf-render-area')).set(opt).save();
            };
        };
    </script>
</body>
</html>
