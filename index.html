<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
    // ១. ចាប់ផ្តើមទាញយកទិន្នន័យពី Telegram
    const tg = window.Telegram.WebApp;
    tg.expand(); // ពង្រីកអេក្រង់ឱ្យធំ

    // ២. មុខងារទាញព័ត៌មានមកបំពេញក្នុង Input អូតូ
    function autoFillTelegramInfo() {
        const user = tg.initDataUnsafe?.user;

        if (user) {
            // ទាញឈ្មោះ (នាមខ្លួន + នាមត្រកូល)
            const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim();
            if (fullName) {
                document.getElementById('cust-name').value = fullName;
            }

            // សម្គាល់៖ Telegram មិនអនុញ្ញាតឱ្យទាញ "លេខទូរស័ព្ទ" ដោយស្វ័យប្រវត្តិភ្លាមៗទេ 
            // ដើម្បីការពារឯកជនភាព លុះត្រាតែអ្នកប្រើចុចប៊ូតុង "Share Contact"។
            // ប៉ុន្តែយើងអាចដាក់ Username ជាបណ្តោះអាសន្នបាន។
            if (user.username) {
                document.getElementById('cust-phone').placeholder = "បញ្ចូលលេខទូរស័ព្ទ (Username: @" + user.username + ")";
            }
        }
    }

    // ហៅមុខងារនេះឱ្យដើរនៅពេល Page Load រួចរាល់
    window.onload = function() {
        renderProducts(products); // បង្ហាញផលិតផល
        autoFillTelegramInfo();   // បំពេញឈ្មោះអូតូ
    };

    // ៣. កែសម្រួលមុខងារ Checkout ឱ្យកាន់តែប្រសើរ
async function checkout() {
    if (cart.length === 0) return alert("កន្ត្រកទំនិញនៅទំនេរ!");

    const name = document.getElementById('cust-name').value;
    const botToken = "លេខ_TOKEN_របស់_BOT_អ្នក"; 
    const adminChatId = "លេខ_CHAT_ID_របស់អ្នក"; 

    let message = "🔔 *មានការកុម្ម៉ង់ថ្មី (ស្វ័យប្រវត្តិ)*\n";
    message += `👤 អតិថិជន: ${name}\n`;
    cart.forEach(i => {
        message += `- ${i.name} (x${i.qty})\n`;
    });
    const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    message += `💰 សរុប: $${total.toFixed(2)}`;

    // ផ្ញើទៅកាន់ Bot តាមរយៈ API (Automated)
    const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${adminChatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

    try {
        await fetch(url);
        alert("ការកុម្ម៉ង់ត្រូវបានបញ្ជូនដោយជោគជ័យ!");
        cart = []; // លាងកន្ត្រក
        updateCartUI();
        tg.close(); // បិទ App
    } catch (error) {
        alert("មានបញ្ហាក្នុងការផ្ញើ! សូមព្យាយាមម្តងទៀត។");
    }
}


</script>
