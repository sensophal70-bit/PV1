<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roththa Shop - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-up { transition: transform 0.3s ease-out; transform: translateY(100%); }
        .modal-up.active { transform: translateY(0); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-32">

    <div class="bg-blue-800 p-5 rounded-b-[2rem] shadow-lg sticky top-0 z-30 text-white border-b-4 border-yellow-500">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-lg font-bold italic uppercase tracking-wider">Roththa Shop</h1>
                <p id="user-display" class="text-[10px] opacity-90 italic text-yellow-300">ស្វាគមន៍អតិថិជន</p>
            </div>
            <div class="flex gap-2">
                <button onclick="window.toggleAccountModal()" class="bg-white/20 p-2 rounded-xl border border-white/30 text-[10px] font-bold active:scale-95 transition-all">
                    <i class="fas fa-user-circle mr-1"></i> គណនី
                </button>
                <button onclick="window.toggleHistoryModal()" class="bg-white/20 p-2 rounded-xl border border-white/30 text-[10px] font-bold active:scale-95 transition-all">
                    <i class="fas fa-history mr-1"></i> ប្រវត្តិ
                </button>
            </div>
        </div>
        <input type="text" id="search-box" onkeyup="window.filterProducts()" placeholder="ស្វែងរកផលិតផល..." class="w-full p-3 rounded-2xl border-none outline-none text-[11px] text-gray-800 shadow-inner">
    </div>

    <div id="cat-list" class="flex gap-2 overflow-x-auto px-4 py-4 no-scrollbar bg-white border-b sticky top-[135px] z-20">
        <button onclick="window.filterByCategory('All')" class="cat-btn bg-blue-800 text-white whitespace-nowrap px-6 py-2 rounded-full text-[10px] font-bold border shadow-sm transition-all">ទាំងអស់</button>
    </div>

    <div class="px-3 mt-4">
        <div id="product-grid" class="grid grid-cols-3 gap-2 pb-10"></div>
    </div>

    <div id="cart-bar" onclick="window.toggleCartModal()" class="fixed bottom-6 left-6 right-6 bg-blue-900 text-white p-4 rounded-3xl shadow-2xl flex justify-between items-center hidden z-40 border border-white/10 active:scale-95 transition-all">
        <div class="flex items-center gap-3">
            <span id="cart-count" class="bg-red-500 text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            <div id="cart-total-bar" class="font-bold text-sm">$0.00</div>
        </div>
        <div class="text-[9px] font-bold uppercase italic text-yellow-400">ពិនិត្យកន្ត្រក <i class="fas fa-chevron-right ml-1"></i></div>
    </div>

    <div id="account-overlay" class="fixed inset-0 bg-black/60 z-50 hidden" onclick="window.toggleAccountModal()"></div>
    <div id="account-modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 modal-up p-8 shadow-2xl text-center">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div class="w-20 h-20 bg-blue-100 rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-white shadow-md overflow-hidden">
            <img id="acc-photo" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
        </div>
        <h2 id="acc-name" class="text-xl font-bold text-gray-800">ឈ្មោះអតិថិជន</h2>
        <p id="acc-id" class="text-[10px] text-gray-400 mb-6 italic">Telegram ID: ...</p>
        <button onclick="window.toggleAccountModal()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-500 text-xs active:bg-gray-200">បិទវិញ</button>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity" onclick="window.toggleCartModal()"></div>
    <div id="cart-modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 modal-up p-6 shadow-2xl max-h-[90vh] flex flex-col">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h2 class="text-center font-bold text-blue-900 mb-4 text-[11px] uppercase border-b pb-2 italic tracking-widest">កន្ត្រកទំនិញរបស់អ្នក</h2>
        <div id="cart-items-list" class="flex-grow overflow-y-auto space-y-3 no-scrollbar py-2"></div>
        <div class="mt-4 pt-4 border-t border-gray-100">
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="text-gray-400 text-[10px] uppercase italic font-bold">សរុបរួម</span>
                <span id="modal-total-price" class="text-red-600 text-2xl font-bold">$0.00</span>
            </div>
            <button id="btn-checkout" onclick="window.handleCheckout()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fab fa-telegram-plane text-lg text-yellow-400"></i> បញ្ជូនទៅ Telegram
            </button>
        </div>
    </div>

    <div id="history-overlay" class="fixed inset-0 bg-black/60 z-50 hidden" onclick="window.toggleHistoryModal()"></div>
    <div id="history-modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 modal-up p-6 shadow-2xl max-h-[75vh] flex flex-col">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
        <h2 class="text-center font-bold text-gray-800 mb-4 text-[11px] border-b pb-2 italic uppercase">ប្រវត្តិការកម្មង់</h2>
        <div id="customer-history-list" class="flex-grow overflow-y-auto space-y-2 no-scrollbar px-1"></div>
        <button onclick="window.clearHistory()" class="text-center text-red-500 text-[11px] font-bold py-4 active:bg-red-50 rounded-xl transition-all">
            <i class="fas fa-trash-alt mr-1"></i> សម្អាតប្រវត្តិទាំងអស់
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [], cart = [];
        let currentLoc = "មិនបានបញ្ជាក់ទីតាំង";

        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        const customerName = user ? `${user.first_name} ${user.last_name || ''}`.trim() : "ភ្ញៀវទូទៅ";

        // Setup UI
        document.getElementById('user-display').innerText = `សួស្តី, ${customerName}`;
        document.getElementById('acc-name').innerText = customerName;
        document.getElementById('acc-id').innerText = `ID: ${user?.id || 'N/A'}`;
        if(user?.photo_url) document.getElementById('acc-photo').src = user.photo_url;

        // ១. ចាប់ទីតាំងទុកជាមុន (Auto Pre-load)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => currentLoc = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`,
                () => console.log("Location Denied"),
                { enableHighAccuracy: true }
            );
        }

        // ២. មុខងារបញ្ជូនការកម្មង់
        window.handleCheckout = async () => {
            if (cart.length === 0) return alert("សូមរើសទំនិញ!");
            
            const btn = document.getElementById('btn-checkout');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងបញ្ជូន...`;

            const total = cart.reduce((s, i) => s + (Number(i.qty) * Number(i.price)), 0);
            const contactLink = user?.username ? `https://t.me/${user.username}` : `tg://user?id=${user?.id}`;

            const message = 
                `🏗 *ការកុម្ម៉ង់ថ្មី Roththa Shop*\n` +
                `━━━━━━━━━━━━━━━━\n` +
                `👤 *អតិថិជន:* [${customerName}](${contactLink})\n` +
                `📍 *ទីតាំង:* [ចុចមើលផែនទី](${currentLoc})\n` +
                `━━━━━━━━━━━━━━━━\n` +
                cart.map(i => `🛍 ${i.name}\n   └ ចំនួន: ${i.qty} | $${(Number(i.qty) * Number(i.price)).toFixed(2)}`).join('\n\n') +
                `\n━━━━━━━━━━━━━━━━\n` +
                `💰 *សរុបរួម: $${total.toFixed(2)}*\n\n` +
                `👉 [ចុចឆាតទៅអតិថិជន](${contactLink})`;

            try {
                const res = await fetch(`https://api.telegram.org/bot8790246863:AAGhESD1muJVvaO9DhNxiuqoVmY8dIhEl8U/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: "7453536903", text: message, parse_mode: "Markdown", disable_web_page_preview: true })
                });

                if(res.ok) {
                    const history = JSON.parse(localStorage.getItem('my_orders') || "[]");
                    history.unshift({ date: new Date().toLocaleString('km-KH'), total: total, items: [...cart] });
                    localStorage.setItem('my_orders', JSON.stringify(history.slice(0, 15)));
                    alert("✅ បញ្ជូនការកម្មង់ជោគជ័យ!");
                    cart = []; window.updateCartUI(); window.toggleCartModal();
                }
            } catch (e) { alert("❌ បញ្ហាការតភ្ជាប់!"); }
            
            btn.disabled = false;
            btn.innerHTML = `<i class="fab fa-telegram-plane text-lg"></i> បញ្ជូនទៅ Telegram`;
        };

        // ៣. មុខងារគ្រប់គ្រងចំនួនក្នុងកន្ត្រក (Input & Calculation)
        window.updateManualQty = (id, val) => {
            const item = cart.find(i => i.id === id);
            if (item) {
                let v = parseInt(val);
                item.qty = (isNaN(v) || v < 1) ? 1 : v;
                
                // បង្ហាញតម្លៃសរុបអូតូពេលវាយលេខ
                const total = cart.reduce((s, i) => s + (Number(i.qty) * Number(i.price)), 0);
                const count = cart.reduce((s, i) => s + Number(i.qty), 0);
                document.getElementById('modal-total-price').innerText = `$${total.toFixed(2)}`;
                document.getElementById('cart-total-bar').innerText = `$${total.toFixed(2)}`;
                document.getElementById('cart-count').innerText = count;
            }
        };

        window.changeQty = (id, d) => {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty = Math.max(1, Number(i.qty) + d); window.updateCartUI(); }
        };

        window.addToCart = (id) => {
            const p = allProducts.find(i => i.id === id);
            const found = cart.find(i => i.id === id);
            if(found) found.qty++; else cart.push({...p, qty: 1});
            window.updateCartUI();
        };

        window.removeFromCart = (id) => {
            if(confirm("លុបទំនិញចេញ?")) { cart = cart.filter(i => i.id !== id); window.updateCartUI(); }
        };

        window.updateCartUI = () => {
            const count = cart.reduce((s, i) => s + Number(i.qty), 0);
            const total = cart.reduce((s, i) => s + (Number(i.qty) * Number(i.price)), 0);
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total-bar').innerText = `$${total.toFixed(2)}`;
            document.getElementById('modal-total-price').innerText = `$${total.toFixed(2)}`;
            
            document.getElementById('cart-items-list').innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100 shadow-sm">
                    <img src="${item.img || item.image || 'https://via.placeholder.com/150'}" class="w-12 h-12 object-cover rounded-xl border">
                    <div class="flex-grow text-left">
                        <div class="font-bold text-[10px] line-clamp-1 text-gray-800">${item.name}</div>
                        <div class="text-blue-600 font-bold text-[10px]">$${Number(item.price).toFixed(2)}</div>
                    </div>
                    <div class="flex items-center gap-1 bg-white p-1 rounded-xl border">
                        <button onclick="window.changeQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center bg-gray-50 rounded-lg text-gray-500">-</button>
                        <input type="number" inputmode="numeric" value="${item.qty}" oninput="window.updateManualQty('${item.id}', this.value)" class="w-9 text-center font-bold text-[11px] text-blue-700 bg-transparent border-none outline-none p-0">
                        <button onclick="window.changeQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center bg-gray-50 rounded-lg text-blue-600">+</button>
                    </div>
                    <button onclick="window.removeFromCart('${item.id}')" class="ml-1 text-red-300 active:text-red-500"><i class="fas fa-trash-alt text-[10px]"></i></button>
                </div>`).join('');
        };

        // ៤. មុខងារទូទៅ (UI Modals, Search, Categories)
        window.toggleAccountModal = () => {
            document.getElementById('account-modal').classList.toggle('active');
            document.getElementById('account-overlay').classList.toggle('hidden');
        };

        window.toggleCartModal = () => {
            document.getElementById('cart-modal').classList.toggle('active');
            const o = document.getElementById('overlay');
            o.classList.toggle('hidden'); setTimeout(() => o.classList.toggle('opacity-0'), 10);
        };

        window.toggleHistoryModal = () => {
            const m = document.getElementById('history-modal');
            const o = document.getElementById('history-overlay');
            m.classList.toggle('active'); o.classList.toggle('hidden');
            if(m.classList.contains('active')) {
                const h = JSON.parse(localStorage.getItem('my_orders') || "[]");
                document.getElementById('customer-history-list').innerHTML = h.map(o => `
                    <div class="bg-gray-50 p-3 rounded-xl border mb-2 text-[9px] text-left">
                        <div class="flex justify-between font-bold text-blue-800 border-b pb-1 mb-1"><span>📅 ${o.date}</span><span class="text-red-600">$${Number(o.total).toFixed(2)}</span></div>
                        <div class="text-gray-500 italic leading-relaxed">${o.items.map(i => `• ${i.name} (x${i.qty})`).join('<br>')}</div>
                    </div>`).join('') || "<p class='text-center py-10 text-gray-400 font-bold'>មិនទាន់មានប្រវត្តិកម្មង់</p>";
            }
        };

        window.clearHistory = () => {
            if(confirm("តើបងចង់លុបប្រវត្តិទាំងអស់មែនទេ?")) {
                localStorage.removeItem('my_orders');
                window.toggleHistoryModal();
                alert("🗑️ បានសម្អាតរួចរាល់!");
            }
        };

        window.filterByCategory = (cat) => {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('bg-blue-800', 'text-white');
                b.classList.add('bg-white', 'text-gray-500');
            });
            event.target.classList.add('bg-blue-800', 'text-white');
            renderProducts(cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat));
        };

        window.filterProducts = () => {
            const v = document.getElementById('search-box').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(v)));
        };

        async function init() {
            try {
                const cSnap = await getDocs(collection(db, "categories"));
                const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
                allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
                cSnap.forEach(d => {
                    document.getElementById('cat-list').innerHTML += `<button onclick="window.filterByCategory('${d.data().name}')" class="cat-btn whitespace-nowrap px-6 py-2 bg-white text-gray-500 rounded-full text-[10px] font-bold border shadow-sm transition-all">${d.data().name}</button>`;
                });
                renderProducts(allProducts);
            } catch (e) { console.error("Firebase Error:", e); }
        }

        function renderProducts(data) {
            document.getElementById('product-grid').innerHTML = data.map(p => `
                <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
                    <div class="w-full aspect-square mb-2 overflow-hidden rounded-lg bg-gray-50 border border-gray-100">
                        <img src="${p.img || p.image || 'https://via.placeholder.com/150'}" 
                             onerror="this.src='https://via.placeholder.com/150?text=Error'"
                             class="w-full h-full object-cover active:scale-110 transition-transform">
                    </div>
                    <h3 class="font-bold text-[9px] line-clamp-2 h-7 leading-tight mb-1 text-gray-700 text-center">${p.name}</h3>
                    <div class="text-red-600 font-bold text-[10px] mb-2">$${Number(p.price).toFixed(2)}</div>
                    <button onclick="window.addToCart('${p.id}')" class="w-full bg-blue-600 text-white py-1.5 rounded-lg text-[9px] font-bold shadow-md active:scale-90 transition-all">បន្ថែម</button>
                </div>`).join('');
        }

        init();
    </script>
</body>
</html>
