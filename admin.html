<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - Universal Fixed Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .hidden-panel { display: none; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-[2.5rem] shadow-2xl border text-center">
        <h1 class="font-bold text-blue-900 text-xl mb-6 italic underline">ADMIN ACCESS</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 ring-blue-500">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 shadow-lg">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-[1400px] mx-auto">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-white">
            <div class="bg-blue-700 p-6 rounded-[2rem] shadow-lg border-b-4 border-blue-900">
                <div class="text-[10px] opacity-80 font-bold mb-1 uppercase">ចំណូលសរុប</div>
                <div id="total-revenue" class="text-3xl font-bold">$0.00</div>
            </div>
            <div class="bg-orange-500 p-6 rounded-[2rem] shadow-lg border-b-4 border-orange-700">
                <div class="text-[10px] opacity-80 font-bold mb-1 uppercase">ការកុម្ម៉ង់</div>
                <div id="total-orders" class="text-3xl font-bold">0</div>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] shadow-lg border-b-4 border-slate-950">
                <div class="text-[10px] opacity-80 font-bold mb-1 uppercase">ទំនិញក្នុងស្តុក</div>
                <div id="total-stock-items" class="text-3xl font-bold">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border">
                    <h2 class="font-bold text-slate-800 mb-6 text-sm flex justify-between">
                        <span><i class="fas fa-edit mr-2 text-blue-500"></i>ព័ត៌មានទំនិញ</span>
                        <span id="edit-mode-label" class="text-blue-600 hidden text-[10px] italic animate-pulse">កំពុងកែប្រែ...</span>
                    </h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="p-cat" class="p-3 bg-gray-50 border rounded-xl text-sm outline-none"></select>
                            <select id="p-sup" class="p-3 bg-blue-50 border border-blue-100 rounded-xl text-sm font-bold text-blue-600 outline-none"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃលក់ ($)" class="w-1/2 p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                        </div>
                        <input type="file" id="p-file" class="text-[10px] text-gray-400">
                        <input type="hidden" id="p-img">
                        <div class="flex gap-2">
                            <button id="btn-save" class="flex-grow bg-blue-700 text-white py-4 rounded-2xl font-bold active:scale-95 shadow-md">រក្សាទុក</button>
                            <button id="btn-cancel" onclick="resetForm()" class="hidden bg-gray-200 text-gray-600 px-6 rounded-2xl font-bold active:scale-95">បោះបង់</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-blue-100">
                    <h2 class="font-bold text-blue-700 mb-4 text-xs italic">អ្នកផ្គត់ផ្គង់ (Supplier)</h2>
                    <div class="space-y-2">
                        <input type="text" id="sup-name" placeholder="ឈ្មោះ..." class="w-full p-2 bg-gray-50 border rounded-lg text-xs outline-none">
                        <input type="text" id="sup-phone" placeholder="លេខទូរស័ព្ទ..." class="w-full p-2 bg-gray-50 border rounded-lg text-xs outline-none">
                        <input type="text" id="sup-loc" placeholder="ទីតាំង..." class="w-full p-2 bg-gray-50 border rounded-lg text-xs outline-none">
                        <input type="text" id="sup-note" placeholder="ផ្សេងៗ..." class="w-full p-2 bg-gray-50 border rounded-lg text-xs outline-none">
                        <button onclick="addSupplier()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">+ បន្ថែម</button>
                    </div>
                    <div id="sup-badges" class="flex flex-col gap-2 mt-4 max-h-[160px] overflow-y-auto no-scrollbar"></div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-orange-100">
                    <h2 class="font-bold text-orange-700 mb-4 text-xs italic">ប្រភេទ (Category)</h2>
                    <div class="flex gap-2">
                        <input type="text" id="cat-name" placeholder="ឈ្មោះប្រភេទ..." class="flex-grow p-3 bg-gray-50 border rounded-xl outline-none text-xs">
                        <button onclick="addCategory()" class="bg-orange-600 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="cat-badges" class="flex flex-wrap gap-2 mt-4"></div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="bg-white rounded-[2.5rem] shadow-sm border h-[480px] flex flex-col overflow-hidden">
                    <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                        <input type="text" id="search-stock" onkeyup="filterStock()" placeholder="ស្វែងរកក្នុងស្តុក..." class="w-1/2 px-4 py-2 border rounded-xl text-xs outline-none focus:ring-1 ring-blue-300">
                        <button onclick="exportData('product')" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">EXPORT STOCK PDF</button>
                    </div>
                    <div class="overflow-y-auto p-4 no-scrollbar flex-grow">
                        <table class="w-full text-left text-xs">
                            <thead class="text-gray-400 border-b"><tr><th>រូប</th><th>ឈ្មោះ</th><th>អ្នកផ្គត់ផ្គង់</th><th class="text-center">ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-right">Action</th></tr></thead>
                            <tbody id="product-list"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border h-[550px] flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-blue-900 text-sm italic underline decoration-blue-200">ប្រវត្តិការកម្មង់លម្អិត</h2>
                        <div class="flex gap-2">
                            <button onclick="exportAllOrders()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">EXPORT ALL</button>
                            <button onclick="exportSelectedOrders()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">SELECTED (<span id="select-count">0</span>)</button>
                        </div>
                    </div>
                    <div id="order-list" class="space-y-3 overflow-y-auto no-scrollbar flex-grow"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-overlay" class="fixed inset-0 bg-white/95 backdrop-blur-sm z-[100] hidden overflow-y-auto p-4 md:p-10">
        <div class="max-w-4xl mx-auto bg-white border shadow-2xl rounded-3xl overflow-hidden">
            <div class="p-4 border-b flex justify-between bg-gray-50">
                <button onclick="document.getElementById('pdf-overlay').classList.add('hidden')" class="text-red-500 font-bold border px-4 py-1 rounded-lg">បិទ</button>
                <span class="text-xs font-bold text-blue-600 italic">PREVIEW REPORT</span>
            </div>
            <div id="pdf-content" class="p-10 bg-white" style="font-family: 'Hanuman', serif;">
                <h1 id="pdf-title" class="text-center text-blue-800 font-bold text-xl border-b-2 border-blue-800 pb-2 mb-6 uppercase"></h1>
                <div id="pdf-data-list" class="space-y-6"></div>
                <div id="pdf-grand-total" class="mt-8 pt-4 border-t-2 border-dashed text-right text-xl font-bold text-red-600"></div>
            </div>
            <div class="p-6 bg-gray-50 text-center">
                <button id="btn-final-download" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all italic">ទាញយកជាឯកសារ PDF</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [], allOrders = [], allSuppliers = [], selectedOrderIds = [];

        window.checkLogin = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-main').classList.remove('hidden-panel');
                loadAll();
            } else { alert("លេខកូដមិនត្រឹមត្រូវ!"); }
        };

        async function loadAll() {
            // Suppliers
            const sSnap = await getDocs(collection(db, "suppliers"));
            allSuppliers = sSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('sup-badges').innerHTML = "";
            document.getElementById('p-sup').innerHTML = `<option value="">Supplier</option>`;
            allSuppliers.forEach(s => {
                document.getElementById('sup-badges').innerHTML += `
                    <div class="p-2 bg-blue-50 border rounded-xl flex justify-between items-center text-[10px]">
                        <div class="flex flex-col"><b>${s.name}</b><span class="text-gray-500">${s.phone || '-'}</span></div>
                        <button onclick="deleteSupplier('${s.id}')" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>`;
                document.getElementById('p-sup').innerHTML += `<option value="${s.name}">${s.name}</option>`;
            });

            // Categories
            const cSnap = await getDocs(collection(db, "categories"));
            document.getElementById('cat-badges').innerHTML = "";
            document.getElementById('p-cat').innerHTML = `<option value="">ប្រភេទ</option>`;
            cSnap.forEach(d => {
                const name = d.data().name;
                document.getElementById('cat-badges').innerHTML += `<span class="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-[10px] border border-orange-100">${name}</span>`;
                document.getElementById('p-cat').innerHTML += `<option value="${name}">${name}</option>`;
            });

            // Products
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('total-stock-items').innerText = allProducts.length;
            renderProducts(allProducts);

            // Orders
            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            allOrders = oSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('total-orders').innerText = allOrders.length;
            let rev = 0;
            allOrders.forEach(o => {
                let val = o.total_amount ? o.total_amount.toString().replace('$', '') : "0";
                rev += parseFloat(val) || 0;
            });
            document.getElementById('total-revenue').innerText = `$${rev.toFixed(2)}`;
            renderOrders(allOrders);
        }

        window.addSupplier = async () => {
            const data = { name: document.getElementById('sup-name').value, phone: document.getElementById('sup-phone').value, location: document.getElementById('sup-loc').value, note: document.getElementById('sup-note').value };
            if(data.name) { await addDoc(collection(db, "suppliers"), data); clearSupplierInputs(); loadAll(); }
        };

        window.addCategory = async () => {
            const name = document.getElementById('cat-name').value;
            if(name) { await addDoc(collection(db, "categories"), {name}); document.getElementById('cat-name').value=""; loadAll(); }
        };

        function renderProducts(data) {
            document.getElementById('product-list').innerHTML = data.map(p => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-2"><img src="${p.img || ''}" class="w-8 h-8 rounded border object-cover"></td>
                    <td><div class="font-bold">${p.name}</div><div class="text-[9px] text-gray-400">${p.category}</div></td>
                    <td class="text-blue-600 font-bold underline cursor-pointer" onclick="alert('Phone: ${allSuppliers.find(s=>s.name===p.supplier)?.phone || '-'}')">${p.supplier || '-'}</td>
                    <td class="text-center font-bold text-orange-600">${p.stock}</td>
                    <td class="text-right font-bold text-red-500">$${(p.price || 0).toFixed(2)}</td>
                    <td class="text-right">
                        <button onclick="editProduct('${p.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-gray-200 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function renderOrders(data) {
            document.getElementById('order-list').innerHTML = data.map(o => `
                <div class="bg-white p-4 rounded-2xl border flex items-center gap-4 shadow-sm">
                    <input type="checkbox" onchange="toggleOrderSelection('${o.id}')" ${selectedOrderIds.includes(o.id)?'checked':''} class="w-4 h-4">
                    <div class="flex-grow">
                        <div class="font-bold text-blue-900 text-[11px]">${o.customer_name || 'គ្មានឈ្មោះ'}</div>
                        <div class="text-[8px] text-gray-400">${o.createdAt?.toDate().toLocaleString('km-KH')}</div>
                    </div>
                    <div class="text-right font-bold text-red-600 text-[11px]">${o.total_amount || '$0.00'}</div>
                </div>`).join('');
        }

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = { name: document.getElementById('p-name').value, category: document.getElementById('p-cat').value, supplier: document.getElementById('p-sup').value, price: parseFloat(document.getElementById('p-price').value) || 0, stock: parseInt(document.getElementById('p-stock').value) || 0, img: document.getElementById('p-img').value, updatedAt: serverTimestamp() };
            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            resetForm(); loadAll();
        };

        window.editProduct = (id) => {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-sup').value = p.supplier || "";
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-img').value = p.img;
            document.getElementById('btn-save').innerText = "កែប្រែ";
            document.getElementById('btn-cancel').classList.remove('hidden');
            document.getElementById('edit-mode-label').classList.remove('hidden');
            window.scrollTo({top:0, behavior:'smooth'});
        };

        window.resetForm = () => { document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = ""; document.getElementById('btn-save').innerText = "រក្សាទុក"; document.getElementById('btn-cancel').classList.add('hidden'); document.getElementById('edit-mode-label').classList.add('hidden'); };

        // --- SMART FIXED GENERATE PDF (No more 0/NaN) ---
        async function generatePDF(title, data, target) {
            const container = document.getElementById('pdf-data-list');
            container.innerHTML = ""; document.getElementById('pdf-title').innerText = title;
            let grandTotal = 0;

            if (target === 'order') {
                data.forEach(order => {
                    let rawT = order.total_amount || order.total || "0";
                    let numT = parseFloat(rawT.toString().replace('$', '')) || 0;
                    grandTotal += numT;

                    let html = `
                        <div style="margin-top:20px; border-left:4px solid #1e40af; padding-left:10px; font-family: 'Hanuman', serif;">
                            <b style="color:#1e40af;">អតិថិជន៖ ${order.customer_name || 'គ្មានឈ្មោះ'}</b><br>
                            <small style="color:gray;">កាលបរិច្ឆេទ៖ ${order.createdAt?.toDate().toLocaleString('km-KH') || '-'}</small>
                        </div>
                        <table style="width:100%; border-collapse:collapse; font-size:10px; margin-top:5px; font-family: 'Hanuman', serif;">
                            <thead><tr style="background:#f1f5f9;"><th style="border:1px solid #ddd; padding:6px; text-align:left;">ទំនិញ</th><th style="border:1px solid #ddd; padding:6px; text-align:center;">ចំនួន</th><th style="border:1px solid #ddd; padding:6px; text-align:right;">សរុប</th></tr></thead><tbody>`;
                    
                    if (order.items && Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            let qty = item.quantity || item.qty || item.count || 0;
                            let price = item.price || item.unit_price || 0;
                            html += `<tr><td style="border:1px solid #eee; padding:6px;">${item.name || 'ទំនិញ'}</td><td style="border:1px solid #eee; padding:6px; text-align:center;">${qty}</td><td style="border:1px solid #eee; padding:6px; text-align:right;">$${(parseFloat(qty) * parseFloat(price)).toFixed(2)}</td></tr>`;
                        });
                    }
                    html += `<tr style="background:#fffcfc;"><td colspan="2" style="border:1px solid #ddd; padding:6px; text-align:right;"><b>សរុប៖</b></td><td style="border:1px solid #ddd; padding:6px; text-align:right; color:#d32f2f;"><b>$${numT.toFixed(2)}</b></td></tr></tbody></table>`;
                    container.innerHTML += html;
                });
                document.getElementById('pdf-grand-total').innerText = `ទឹកប្រាក់សរុបរួម៖ $${grandTotal.toFixed(2)}`;
            } else {
                let html = `<table style="width:100%; border-collapse:collapse; font-size:10px; font-family: 'Hanuman', serif;"><thead style="background:#f1f5f9;"><tr><th style="border:1px solid #ddd; padding:8px;">ឈ្មោះទំនិញ</th><th style="border:1px solid #ddd; padding:8px;">អ្នកផ្គត់ផ្គង់</th><th style="border:1px solid #ddd; padding:8px;">ស្តុក</th><th style="border:1px solid #ddd; padding:8px; text-align:right;">តម្លៃ</th></tr></thead><tbody>`;
                data.forEach(p => {
                    const s = allSuppliers.find(x => x.name === p.supplier) || {};
                    html += `<tr><td style="border:1px solid #ddd; padding:8px;">${p.name || '-'}</td><td style="border:1px solid #ddd; padding:8px; text-align:center;">${p.supplier || '-'}<br><small>${s.phone || ''}</small></td><td style="border:1px solid #ddd; padding:8px; text-align:center;">${p.stock || 0}</td><td style="border:1px solid #ddd; padding:8px; text-align:right;">$${(parseFloat(p.price) || 0).toFixed(2)}</td></tr>`;
                });
                container.innerHTML = html + `</tbody></table>`;
                document.getElementById('pdf-grand-total').innerText = "";
            }
            document.getElementById('pdf-overlay').classList.remove('hidden');
            document.getElementById('btn-final-download').onclick = async () => {
                const canvas = await html2canvas(document.getElementById('pdf-content'), { scale: 2, useCORS: true });
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(title + ".pdf");
            };
        }

        // Helpers
        function clearSupplierInputs() { ['sup-name','sup-phone','sup-loc','sup-note'].forEach(id => document.getElementById(id).value = ""); }
        window.deleteProduct = async (id) => { if(confirm("លុប?")) { await deleteDoc(doc(db, "products", id)); loadAll(); } };
        window.deleteSupplier = async (id) => { if(confirm("លុប?")) { await deleteDoc(doc(db, "suppliers", id)); loadAll(); } };
        window.toggleOrderSelection = (id) => { selectedOrderIds.includes(id) ? selectedOrderIds = selectedOrderIds.filter(i=>i!==id) : selectedOrderIds.push(id); document.getElementById('select-count').innerText = selectedOrderIds.length; };
        window.filterStock = () => { const v = document.getElementById('search-stock').value.toLowerCase(); renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(v))); };
        window.exportData = (t) => generatePDF("របាយការណ៍ស្តុកទំនិញ", allProducts, 'product');
        window.exportAllOrders = () => generatePDF("របាយការណ៍លក់សរុប", allOrders, 'order');
        window.exportSelectedOrders = () => { const data = allOrders.filter(o => selectedOrderIds.includes(o.id)); if(!data.length) return alert("រើសការកុម្ម៉ង់!"); generatePDF("របាយការណ៍លក់ជ្រើសរើស", data, 'order'); };
        document.getElementById('p-file').onchange = (e) => { const reader = new FileReader(); reader.onload = (ev) => document.getElementById('p-img').value = ev.target.result; reader.readAsDataURL(e.target.files[0]); };
        window.loadAll = loadAll;
    </script>
</body>
</html>
