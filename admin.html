<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - Fixed Data Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .hidden-panel { display: none; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-[2.5rem] shadow-2xl border text-center">
        <h1 class="font-bold text-blue-900 text-xl mb-6 italic underline">ADMIN ACCESS</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 ring-blue-500">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 shadow-lg">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-[1400px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-white">
            <div class="bg-blue-700 p-6 rounded-[2rem] shadow-lg border-b-4 border-blue-900">
                <div class="text-[10px] opacity-80 font-bold mb-1 uppercase">ចំណូលសរុប</div>
                <div id="total-revenue" class="text-3xl font-bold">$0.00</div>
            </div>
            <div class="bg-orange-500 p-6 rounded-[2rem] shadow-lg border-b-4 border-orange-700">
                <div class="text-[10px] opacity-80 font-bold mb-1 uppercase">ការកុម្ម៉ង់</div>
                <div id="total-orders" class="text-3xl font-bold">0</div>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] shadow-lg border-b-4 border-slate-950">
                <div class="text-[10px] opacity-80 font-bold mb-1 uppercase">ទំនិញក្នុងស្តុក</div>
                <div id="total-stock-items" class="text-3xl font-bold">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border">
                    <h2 class="font-bold text-slate-800 mb-6 text-sm">ព័ត៌មានទំនិញ</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="p-cat" class="p-3 bg-gray-50 border rounded-xl text-sm outline-none"></select>
                            <select id="p-sup" class="p-3 bg-blue-50 border rounded-xl text-sm font-bold text-blue-600 outline-none"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-1/2 p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                        </div>
                        <input type="file" id="p-file" class="text-[10px]">
                        <input type="hidden" id="p-img">
                        <button id="btn-save" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-md">រក្សាទុក</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border">
                    <h2 class="font-bold text-blue-700 mb-4 text-xs italic">អ្នកផ្គត់ផ្គង់</h2>
                    <input type="text" id="sup-name" placeholder="ឈ្មោះ..." class="w-full p-2 bg-gray-50 border rounded-lg text-xs mb-2">
                    <button onclick="addSupplier()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs">+ បន្ថែម</button>
                    <div id="sup-badges" class="mt-4 space-y-2"></div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="bg-white rounded-[2.5rem] shadow-sm border h-[400px] overflow-hidden flex flex-col">
                    <div class="p-4 bg-gray-50 border-b flex justify-between">
                        <h3 class="font-bold text-xs">បញ្ជីទំនិញក្នុងស្តុក</h3>
                        <button onclick="exportData('product')" class="text-[10px] bg-red-600 text-white px-3 py-1 rounded-lg">PDF</button>
                    </div>
                    <div class="overflow-y-auto p-4 flex-grow no-scrollbar">
                        <table class="w-full text-xs text-left">
                            <thead><tr class="border-b text-gray-400"><th>ឈ្មោះ</th><th>ស្តុក</th><th>តម្លៃ</th><th>Action</th></tr></thead>
                            <tbody id="product-list"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border h-[400px] overflow-hidden flex flex-col">
                    <h3 class="font-bold text-blue-900 mb-4 text-xs italic underline">ប្រវត្តិការកុម្ម៉ង់</h3>
                    <div id="order-list" class="space-y-3 overflow-y-auto no-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // === ⚠️ ប្តូរត្រង់នេះដាក់ CONFIG របស់បង ⚠️ ===
        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [], allOrders = [];

        window.checkLogin = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-main').classList.remove('hidden-panel');
                loadAll();
            } else { alert("ខុសលេខកូដ!"); }
        };

        async function loadAll() {
            try {
                // Load Products
                const pSnap = await getDocs(collection(db, "products"));
                allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('total-stock-items').innerText = allProducts.length;
                renderProducts(allProducts);

                // Load Orders
                const oSnap = await getDocs(collection(db, "orders"));
                allOrders = oSnap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('total-orders').innerText = allOrders.length;
                renderOrders(allOrders);

                // Load Suppliers & Categories (simplified for testing)
                const sSnap = await getDocs(collection(db, "suppliers"));
                document.getElementById('p-sup').innerHTML = sSnap.docs.map(d => `<option>${d.data().name}</option>`).join('') || '<option>No Supplier</option>';
            } catch (e) { console.error("Error loading:", e); }
        }

        function renderProducts(data) {
            document.getElementById('product-list').innerHTML = data.map(p => `
                <tr class="border-b">
                    <td class="py-3 font-bold">${p.name}</td>
                    <td class="text-orange-600">${p.stock}</td>
                    <td class="font-bold text-red-500">$${p.price}</td>
                    <td><button onclick="deleteProduct('${p.id}')" class="text-red-300"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');
        }

        function renderOrders(data) {
            document.getElementById('order-list').innerHTML = data.map(o => `
                <div class="p-3 bg-gray-50 rounded-xl border flex justify-between">
                    <div><b class="text-[11px]">${o.customer_name || 'ភ្ញៀវ'}</b></div>
                    <div class="text-red-600 font-bold">${o.total_amount || '$0'}</div>
                </div>`).join('');
        }

        window.deleteProduct = async (id) => {
            if(confirm("លុបទំនិញ?")) { await deleteDoc(doc(db, "products", id)); loadAll(); }
        };

        document.getElementById('btn-save').onclick = async () => {
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                createdAt: serverTimestamp()
            };
            if(!data.name) return alert("សូមដាក់ឈ្មោះ!");
            await addDoc(collection(db, "products"), data);
            alert("រក្សាទុកបានសម្រេច!");
            loadAll();
        };

        window.addSupplier = async () => {
            const name = document.getElementById('sup-name').value;
            if(name) { await addDoc(collection(db, "suppliers"), {name}); loadAll(); }
        };

        window.loadAll = loadAll;
    </script>
</body>
</html>
