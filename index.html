<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - ទំព័រដើម</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-lg">Roththa Construction</h1>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[10px] rounded-full px-1.5 border-2 border-blue-800">0</span>
        </div>
    </nav>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4 mb-24">
        <p class="col-span-2 text-center text-gray-400 italic">កំពុងទាញទិន្នន័យ...</p>
    </div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-4 bg-blue-800 text-white flex justify-between items-center">
            <span class="font-bold text-lg">កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-5 border-t bg-gray-50">
            <input type="text" id="cust-name" readonly class="w-full mb-3 p-3 bg-white border rounded-xl font-bold">
            <div class="flex justify-between items-center font-bold text-xl mb-4">
                <span>សរុប:</span> <span id="cart-total" class="text-red-600">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">បញ្ជាក់ការកុម្ម៉ង់</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402",
            measurementId: "G-TZN1C3N9FX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadProducts() {
            try {
                const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                renderUI(products);
            } catch (error) {
                console.error(error);
                document.getElementById('product-list').innerHTML = "មិនអាចទាញទិន្នន័យបាន!";
            }
        }

        window.renderUI = function(items) {
            const list = document.getElementById('product-list');
            if(items.length === 0) {
                list.innerHTML = "<p class='col-span-2 text-center text-gray-400 mt-10'>មិនទាន់មានទំនិញ</p>";
                return;
            }
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <img src="${p.img}" class="w-full h-24 object-cover rounded-xl mb-2">
                    <h3 class="font-bold text-sm h-10 overflow-hidden text-gray-700">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-red-600 font-bold">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart('${p.id}', '${p.name}', ${p.price})" class="bg-blue-700 text-white p-2 rounded-lg text-xs">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            document.getElementById('cust-name').value = user ? user.first_name : "ភ្ញៀវ";
            loadProducts();
        };
    </script>

    <script>
        let cart = [];
        function toggleCart() {
            const sb = document.getElementById('cart-sidebar');
            sb.classList.toggle('translate-x-full');
        }

        function addToCart(id, name, price) {
            const item = cart.find(i => i.id === id);
            item ? item.qty++ : cart.push({ id, name, price, qty: 1 });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            let total = 0;
            list.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="text-sm font-bold">${item.name} x ${item.qty}</div>
                        <div class="text-red-500 font-bold">$${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                `;
            }).join('');
            
            totalEl.innerText = `$${total.toFixed(2)}`;
            countEl.innerText = cart.length;
        }

        function checkout() {
            if(cart.length === 0) return alert("កន្ត្រកទទេ!");
            const name = document.getElementById('cust-name').value;
            let msg = `🛒 ការកុម្ម៉ង់ថ្មីពី៖ ${name}\n---------------\n`;
            cart.forEach(i => msg += `• ${i.name} (${i.qty} មុខ)\n`);
            msg += `---------------\n💰 សរុប៖ ${document.getElementById('cart-total').innerText}`;
            
            const token = "YOUR_TELEGRAM_BOT_TOKEN"; // ប្តូរទៅជា Token របស់អ្នក
            const chat_id = "YOUR_CHAT_ID"; // ប្តូរទៅជា ID របស់អ្នក
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                alert("ការកុម្ម៉ង់ត្រូវបានបញ្ជូន!");
                cart = [];
                updateCart();
                toggleCart();
            });
        }
    </script>
</body>
</html>
