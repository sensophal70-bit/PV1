<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - Ultimate Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f4f7f6; }
        .card { background: white; border-radius: 1.5rem; padding: 1.2rem; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden-panel { display: none; }
        .selected-row { background-color: #f0f7ff !important; border-left: 4px solid #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="font-bold text-blue-900 text-2xl mb-6 italic uppercase underline">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 ring-blue-500">
        <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border">
            <button onclick="window.goBack()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-50 hover:text-red-600 transition-all">
                <i class="fas fa-arrow-left mr-2"></i> ចាកចេញ (Back)
            </button>
            <h2 class="font-bold text-blue-900 text-sm md:text-base italic uppercase tracking-widest">Roththa Shop Management</h2>
            <button onclick="window.loadAll()" class="text-blue-500 hover:rotate-180 transition-all duration-500"><i class="fas fa-sync-alt fa-lg"></i></button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="card border-t-8 border-blue-600">
                    <h2 class="font-bold text-slate-800 mb-4 text-xs italic underline">គ្រប់គ្រងទំនិញ</h2>
                    <div class="space-y-3">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-3 bg-gray-50 border rounded-xl text-xs outline-none">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-3 bg-blue-50 border rounded-xl text-[10px] font-bold text-blue-700 outline-none"></select>
                            <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-1/2 p-3 bg-emerald-50 border rounded-xl text-xs font-bold text-emerald-700">
                        </div>
                        <input type="number" id="p-stock" placeholder="ចំនួនស្តុក" class="w-full p-3 bg-gray-50 border rounded-xl text-xs">
                        <input type="file" id="p-file" class="w-full text-[10px] text-gray-400 border border-dashed p-2 rounded-xl">
                        <input type="hidden" id="p-img">
                        <button onclick="window.saveProduct()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md text-xs uppercase">រក្សាទុកទំនិញ</button>
                    </div>
                </div>

                <div class="card border-t-8 border-red-600">
                    <h2 class="font-bold text-red-600 mb-4 text-xs italic uppercase">គ្រោះថ្នាក់ (Danger Zone)</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.deleteAll('products')" class="bg-red-100 text-red-600 p-3 rounded-xl text-[10px] font-bold hover:bg-red-600 hover:text-white transition-all">
                            <i class="fas fa-trash mr-1"></i> លុបស្តុកទាំងអស់
                        </button>
                        <button onclick="window.deleteAll('orders')" class="bg-orange-100 text-orange-600 p-3 rounded-xl text-[10px] font-bold hover:bg-orange-600 hover:text-white transition-all">
                            <i class="fas fa-history mr-1"></i> លុបប្រវត្តិលក់
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                
                <div id="export-area-stock" class="card h-[500px] flex flex-col overflow-hidden">
                    <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                        <h2 class="font-bold text-blue-900 text-xs italic uppercase">បញ្ជីស្តុកផលិតផល</h2>
                        <div class="flex gap-2">
                            <button onclick="window.exportToPDF('export-area-stock', 'Stock_All', false)" class="bg-gray-800 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">Export All</button>
                            <button onclick="window.exportToPDF('export-area-stock', 'Stock_Selected', true)" class="bg-red-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">Export Selected</button>
                        </div>
                    </div>
                    <div class="overflow-y-auto no-scrollbar flex-grow">
                        <table class="w-full text-left text-[11px]">
                            <thead class="sticky top-0 bg-white border-b text-gray-400 z-10">
                                <tr>
                                    <th class="py-2"><input type="checkbox" id="check-all-p" onclick="window.selectAll('p-check', this)"></th>
                                    <th>រូប</th><th>ឈ្មោះ</th><th>ប្រភេទ</th><th class="text-center">ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="export-area-order" class="card h-[450px] flex flex-col overflow-hidden border-l-8 border-emerald-500">
                    <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                        <h2 class="font-bold text-emerald-700 text-xs italic uppercase">ប្រវត្តិការលក់</h2>
                        <div class="flex gap-2">
                            <button onclick="window.exportToPDF('export-area-order', 'Orders_All', false)" class="bg-gray-800 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">Export All</button>
                            <button onclick="window.exportToPDF('export-area-order', 'Orders_Selected', true)" class="bg-emerald-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">Export Selected</button>
                        </div>
                    </div>
                    <div id="order-history-list" class="space-y-3 overflow-y-auto no-scrollbar flex-grow pr-2">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH & NAV ---
        document.getElementById('login-btn').onclick = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden-panel');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                window.loadAll();
            } else { alert("លេខកូដខុស!"); }
        };

        window.goBack = () => {
            if(confirm("តើបងចង់ចាកចេញមែនទេ?")) {
                document.getElementById('admin-main').classList.add('hidden-panel');
                document.getElementById('login-panel').classList.remove('hidden-panel');
                document.getElementById('admin-pass').value = "";
            }
        };

        // --- LOAD DATA ---
        window.loadAll = async () => {
            const cSnap = await getDocs(query(collection(db, "categories"), orderBy("name")));
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));

            const catSel = document.getElementById('p-cat-select');
            catSel.innerHTML = `<option value="">-- ប្រភេទ --</option>`;
            cSnap.forEach(d => catSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);

            const pBody = document.getElementById('product-table-body');
            pBody.innerHTML = "";
            pSnap.forEach(d => {
                const p = d.data();
                pBody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition-all row-item" id="p-row-${d.id}">
                        <td class="py-3"><input type="checkbox" class="p-check" data-id="${d.id}" onclick="window.rowHighlight('p-row-${d.id}', this)"></td>
                        <td><img src="${p.img || ''}" class="w-8 h-8 rounded border object-cover"></td>
                        <td class="font-bold text-blue-900">${p.name}</td>
                        <td class="text-gray-400 text-[9px] uppercase">${p.category}</td>
                        <td class="text-center font-bold text-orange-600">${p.stock}</td>
                        <td class="text-right font-bold text-emerald-600">$${(p.price || 0).toFixed(2)}</td>
                        <td class="text-center"><button onclick="window.deleteOne('products','${d.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>`;
            });

            const oBody = document.getElementById('order-history-list');
            oBody.innerHTML = "";
            oSnap.forEach(d => {
                const o = d.data();
                oBody.innerHTML += `
                    <div class="p-3 bg-gray-50 rounded-xl border border-dashed relative group row-item" id="o-row-${d.id}">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="o-check" data-id="${d.id}" onclick="window.rowHighlight('o-row-${d.id}', this)">
                            <div class="flex-grow">
                                <div class="flex justify-between">
                                    <span class="font-bold text-blue-900 text-[10px]">${o.customer_name || 'Guest'}</span>
                                    <span class="text-red-600 font-bold text-[10px]">${o.total_amount}</span>
                                </div>
                                <div class="text-[9px] text-gray-500 mt-1">
                                    ${o.items ? o.items.map(i => i.name + " x" + i.qty).join(", ") : ""}
                                </div>
                            </div>
                            <button onclick="window.deleteOne('orders','${d.id}')" class="text-gray-300 hover:text-red-500 ml-2"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>`;
            });
        };

        // --- DELETE FUNCTIONS ---
        window.deleteOne = async (col, id) => {
            if(confirm("តើបងពិតជាចង់លុបទិន្នន័យនេះមែនទេ?")) {
                await deleteDoc(doc(db, col, id));
                window.loadAll();
            }
        };

        window.deleteAll = async (col) => {
            if(confirm(`⚠️ ប្រយ័ត្ន! តើបងពិតជាចង់លុបទិន្នន័យក្នុង ${col} ទាំងអស់មែនទេ? វាមិនអាចយកមកវិញបានឡើយ!`)) {
                const snap = await getDocs(collection(db, col));
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
                alert("បានលុបទាំងអស់ដោយជោគជ័យ!");
                window.loadAll();
            }
        };

        // --- EXPORT PDF (ALL & SELECTED) ---
        window.exportToPDF = async (elID, fileName, onlySelected) => {
            const container = document.getElementById(elID);
            const items = container.querySelectorAll('.row-item');
            
            // ប្រសិនបើជ្រើសរើស Selected គឺត្រូវលាក់អាដែលមិនបាន Check
            if(onlySelected) {
                let count = 0;
                items.forEach(item => {
                    const chk = item.querySelector('input[type="checkbox"]');
                    if(!chk.checked) item.style.display = 'none';
                    else count++;
                });
                if(count === 0) {
                    alert("សូមជ្រើសរើសទិន្នន័យជាមុនសិន!");
                    items.forEach(i => i.style.display = ''); // បង្ហាញវិញ
                    return;
                }
            }

            const canvas = await html2canvas(container, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfW = pdf.internal.pageSize.getWidth();
            const pdfH = (canvas.height * pdfW) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);
            pdf.save(`${fileName}_${new Date().toLocaleDateString()}.pdf`);

            // បង្ហាញទិន្នន័យដែលលាក់មកវិញ
            items.forEach(i => i.style.display = '');
        };

        // --- UI HELPERS ---
        window.selectAll = (cls, master) => {
            const chks = document.getElementsByClassName(cls);
            for(let c of chks) {
                c.checked = master.checked;
                const rowId = c.dataset.id;
                // Highlight row/card
                const rowEl = document.getElementById(`${cls[0]}-row-${rowId}`);
                if(c.checked) rowEl.classList.add('selected-row');
                else rowEl.classList.remove('selected-row');
            }
        };

        window.rowHighlight = (id, el) => {
            const row = document.getElementById(id);
            if(el.checked) row.classList.add('selected-row');
            else row.classList.remove('selected-row');
        };

        window.saveProduct = async () => {
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat-select').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                img: document.getElementById('p-img').value,
                createdAt: serverTimestamp()
            };
            if(!data.name) return alert("សូមដាក់ឈ្មោះទំនិញ!");
            await addDoc(collection(db, "products"), data);
            alert("រក្សាទុកបានសម្រេច!"); window.loadAll();
        };

        // File to Base64
        document.getElementById('p-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => document.getElementById('p-img').value = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

    </script>
</body>
</html>
