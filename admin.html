<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - High Security & Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .hidden-panel { display: none; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* ច្បាប់សម្រាប់ PDF: ត្រូវតែមាន Font ខ្មែរច្បាស់លាស់ */
        .pdf-box { font-family: 'Hanuman', serif !important; padding: 30px; background: white; color: black; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th { background-color: #1e40af; color: white; border: 1px solid #1e3a8a; padding: 10px; font-size: 12px; }
        .pdf-table td { border: 1px solid #ddd; padding: 8px; font-size: 11px; vertical-align: middle; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-[2.5rem] shadow-2xl border border-blue-50">
        <div class="text-center mb-6">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 text-2xl">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="font-bold text-blue-900 text-xl">Admin Login</h1>
            <p class="text-[10px] text-gray-400 mt-1">សុវត្ថិភាពទិន្នន័យហាង</p>
        </div>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 focus:ring-blue-500">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-[1400px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-blue-100">
                    <h2 id="form-title" class="font-bold text-blue-900 mb-6 flex items-center"><i class="fas fa-edit mr-2"></i> គ្រប់គ្រងទំនិញ</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-1/2 p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                        </div>
                        <div class="p-3 bg-gray-50 border border-dashed rounded-xl text-center">
                            <input type="file" id="p-file" accept="image/*" class="text-[10px] text-gray-400 mb-2">
                            <input type="hidden" id="p-img">
                        </div>
                        <div class="flex gap-2">
                            <button id="btn-save" class="flex-grow bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-md active:scale-95 transition-all">រក្សាទុក</button>
                            <button id="btn-cancel" onclick="resetForm()" class="hidden bg-gray-400 text-white px-6 rounded-2xl font-bold">បោះបង់</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[400px]">
                    <div class="p-5 bg-gray-50 flex justify-between items-center border-b">
                        <span class="text-xs font-bold text-gray-500 uppercase">បញ្ជីទំនិញក្នុងស្តុក</span>
                        <div class="flex gap-1">
                            <button onclick="exportData('product', 'pdf')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-[9px] font-bold">PDF + រូបភាព</button>
                            <button onclick="exportData('product', 'excel')" class="bg-green-100 text-green-600 px-3 py-1.5 rounded-lg text-[9px] font-bold">EXCEL</button>
                        </div>
                    </div>
                    <div class="overflow-y-auto p-4 no-scrollbar">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-gray-400 border-b sticky top-0 bg-white">
                                <tr><th class="pb-2">រូបភាព</th><th>ឈ្មោះ</th><th class="text-center">ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-right">សកម្មភាព</th></tr>
                            </thead>
                            <tbody id="product-list" class="divide-y divide-gray-50 text-xs"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 h-[450px] flex flex-col">
                    <div class="flex justify-between items-center mb-4 border-b pb-3">
                        <h2 class="font-bold text-blue-900 text-sm">ប្រវត្តិកម្មង់អតិថិជន</h2>
                        <div class="flex gap-1">
                            <button onclick="exportData('order', 'pdf')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-[9px] font-bold">PDF REPORT</button>
                        </div>
                    </div>
                    <div id="order-list" class="space-y-4 overflow-y-auto no-scrollbar pr-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-render-zone" style="position: absolute; left: -9999px; top: 0; width: 800px; background: white;">
        <div id="pdf-content" class="pdf-box">
            <h1 style="text-align: center; color: #1e40af; border-bottom: 2px solid #1e40af; padding-bottom: 10px;" id="pdf-title">របាយការណ៍</h1>
            <p style="text-align: right; font-size: 10px; color: #666; margin-top: 5px;">កាលបរិច្ឆេទ៖ <span id="pdf-date"></span></p>
            <div id="pdf-table-area"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration (ដូចមុន)
        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];
        let allOrders = [];

        // --- ១. Login Logic ---
        window.checkLogin = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-main').classList.remove('hidden-panel');
                loadAll();
            } else { alert("លេខកូដមិនត្រឹមត្រូវ!"); }
        };

        // --- ២. Product & Stock Logic ---
        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => document.getElementById('p-img').value = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                img: document.getElementById('p-img').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name || isNaN(data.price)) return alert("សូមបំពេញឱ្យគ្រប់!");
            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            resetForm(); loadAll();
        };

        window.editProduct = (id) => {
            const p = allProducts.find(i => i.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock || 0;
            document.getElementById('p-img').value = p.img;
            document.getElementById('form-title').innerText = "កែសម្រួលទំនិញ";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = async (id) => { if(confirm("លុបទំនិញនេះ?")) { await deleteDoc(doc(db, "products", id)); loadAll(); } };

        // --- ៣. Export Logic (Fixed Khmer & Images) ---
        window.exportData = async (target, format) => {
            const data = (target === 'product') ? allProducts : allOrders;
            if(format === 'excel') {
                let csv = "\uFEFFឈ្មោះ,ស្តុក,តម្លៃ\n";
                data.forEach(p => csv += `"${p.name}","${p.stock}","${p.price}"\n`);
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                link.download = target + "_report.csv"; link.click();
            } else {
                await generatePDF(target, data);
            }
        };

        async function generatePDF(target, data) {
            const area = document.getElementById('pdf-table-area');
            const renderZone = document.getElementById('pdf-render-zone');
            document.getElementById('pdf-title').innerText = target === 'product' ? "របាយការណ៍ស្តុកទំនិញ" : "របាយការណ៍ប្រវត្តិកម្មង់";
            document.getElementById('pdf-date').innerText = new Date().toLocaleString('km-KH');

            let html = `<table class="pdf-table"><thead><tr>`;
            if(target === 'product') {
                html += `<th>រូបភាព</th><th>ឈ្មោះផលិតផល</th><th>ស្តុក</th><th>តម្លៃ</th></tr></thead><tbody>`;
                data.forEach(p => {
                    html += `<tr>
                        <td style="text-align:center"><img src="${p.img}" crossOrigin="anonymous" style="width:40px;height:40px;object-fit:cover;border-radius:4px"></td>
                        <td>${p.name}</td>
                        <td style="text-align:center">${p.stock || 0}</td>
                        <td style="text-align:right">$${p.price.toFixed(2)}</td>
                    </tr>`;
                });
            } else {
                html += `<th>ថ្ងៃខែ</th><th>អតិថិជន</th><th>ទំនិញ</th><th>សរុប</th></tr></thead><tbody>`;
                data.forEach(o => html += `<tr><td>${o.createdAt?.toDate().toLocaleDateString('km-KH')}</td><td>${o.customer_name}</td><td>${o.items.map(i=>i.name).join(', ')}</td><td style="text-align:right">${o.total_amount}</td></tr>`);
            }
            area.innerHTML = html + `</tbody></table>`;

            // បង្ហាញ Render Zone បណ្តោះអាសន្នដើម្បីឱ្យ Browser Load រូបភាព
            renderZone.style.left = "0"; 
            renderZone.style.opacity = "0.01";

            try {
                await document.fonts.ready; // រង់ចាំ Font ខ្មែរ
                
                // រង់ចាំរូបភាព Load ចប់ ១០០%
                const imgs = area.getElementsByTagName('img');
                await Promise.all(Array.from(imgs).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                }));

                const canvas = await html2canvas(document.getElementById('pdf-content'), {
                    scale: 2, 
                    useCORS: true, 
                    logging: false
                });

                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(target + "_report.pdf");
            } catch (e) { alert("PDF Error: " + e.message); } 
            finally { renderZone.style.left = "-9999px"; }
        }

        // --- ៤. Load & Display ---
        async function loadAll() {
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('product-list').innerHTML = allProducts.map(p => `
                <tr class="hover:bg-gray-50 border-b">
                    <td class="py-2"><img src="${p.img}" class="w-8 h-8 object-cover rounded-lg border"></td>
                    <td class="py-2 font-bold">${p.name}</td>
                    <td class="py-2 text-center text-orange-600 font-bold">${p.stock || 0}</td>
                    <td class="py-2 text-right font-bold text-red-500">$${p.price}</td>
                    <td class="py-2 text-right">
                        <button onclick="editProduct('${p.id}')" class="text-blue-400 mr-2"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-300"><i class="fas fa-trash text-xs"></i></button>
                    </td>
                </tr>`).join('');

            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            allOrders = oSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('order-list').innerHTML = allOrders.map(o => `
                <div class="bg-gray-50 p-4 rounded-2xl border mb-2 flex justify-between items-center">
                    <div>
                        <div class="font-bold text-blue-900 text-[11px]">${o.customer_name}</div>
                        <div class="text-[9px] text-gray-400">${o.createdAt?.toDate().toLocaleString('km-KH')}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-red-600 text-[11px]">${o.total_amount}</div>
                        <button onclick="deleteDoc(doc(db,'orders','${o.id}')).then(loadAll)" class="text-red-300 text-[10px]"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        window.resetForm = () => {
            document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = ""; document.getElementById('p-stock').value = "";
            document.getElementById('p-img').value = ""; document.getElementById('form-title').innerText = "គ្រប់គ្រងទំនិញ";
            document.getElementById('btn-cancel').classList.add('hidden');
        };
    </script>
</body>
</html>
