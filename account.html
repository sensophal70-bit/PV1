<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roththa Shop - Telegram Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background: linear-gradient(to bottom, #1e3a8a, #f1f5f9); min-height: 100vh; }
        .profile-card { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="auth-card" class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl overflow-hidden profile-card">
        <div class="bg-blue-800 p-8 text-center text-white relative">
            <div class="w-24 h-24 bg-white rounded-full mx-auto p-1 shadow-xl mb-4">
                <img id="user-photo" src="https://ui-avatars.com/api/?name=User&background=random" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 id="user-fullname" class="text-xl font-bold italic">កំពុងទាញទិន្នន័យ...</h2>
            <p id="user-id-display" class="text-[10px] opacity-60 tracking-widest mt-1">ID: 000000000</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600">
                    <i class="fas fa-user-check"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-bold">ឈ្មោះអតិថិជន</p>
                    <p id="info-name" class="text-sm font-bold text-gray-700">...</p>
                </div>
            </div>

            <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center text-green-600">
                    <i class="fab fa-telegram-plane"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-bold">ស្ថានភាព</p>
                    <p class="text-sm font-bold text-green-600 italic">ភ្ជាប់ជាមួយ Telegram រួចរាល់</p>
                </div>
            </div>

            <div class="pt-4 space-y-3">
                <button onclick="window.location.href='index.html'" class="w-full bg-blue-800 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    <i class="fas fa-shopping-cart mr-2"></i> ចូលទៅកាន់ហាង
                </button>
                <p class="text-center text-[9px] text-gray-400">ទិន្នន័យរបស់អ្នកត្រូវបានរក្សាទុកដោយសុវត្ថិភាពក្នុង Roththa Shop</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ហៅ Telegram WebApp Object
        const tg = window.Telegram.WebApp;
        tg.expand(); // ពង្រីក Screen ឱ្យពេញ

        async function loginWithTelegram() {
            const user = tg.initDataUnsafe?.user;

            if (user) {
                const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim();
                const userId = user.id.toString();
                const photoUrl = user.photo_url || `https://ui-avatars.com/api/?name=${fullName}&background=random`;

                // បង្ហាញលើ UI
                document.getElementById('user-fullname').innerText = fullName;
                document.getElementById('info-name').innerText = fullName;
                document.getElementById('user-id-display').innerText = `ID: ${userId}`;
                document.getElementById('user-photo').src = photoUrl;

                // រក្សាទុកក្នុង Firebase Firestore (ជា Account របស់គាត់)
                try {
                    const userRef = doc(db, "customers", userId);
                    await setDoc(userRef, {
                        telegram_id: userId,
                        name: fullName,
                        username: user.username || 'N/A',
                        photo: photoUrl,
                        last_login: new Date()
                    }, { merge: true });

                    // រក្សាទុកក្នុង LocalStorage ដើម្បីប្រើក្នុងទំព័រ index.html
                    localStorage.setItem('current_customer', JSON.stringify({id: userId, name: fullName}));
                    
                } catch (e) {
                    console.error("Error saving user:", e);
                }
            } else {
                // បើបើកលើ Browser ធម្មតា (មិនមែនក្នុង Telegram)
                document.getElementById('user-fullname').innerText = "សួស្តី ភ្ញៀវកិត្តិយស";
                document.getElementById('info-name').innerText = "Guest User";
            }
        }

        // ដំណើរការពេលបើក Page
        loginWithTelegram();
    </script>
</body>
</html>
