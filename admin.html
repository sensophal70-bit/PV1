<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - Professional System v16.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; padding: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden-panel { display: none !important; }
        .selected-row { background-color: #f0f9ff !important; border-left: 4px solid #3b82f6; }
        .invoice-page { padding: 30px; background: white; page-break-after: always; color: #1e293b; }
        table th { background-color: #f8fafc; text-transform: uppercase; font-size: 10px; color: #64748b; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-panel" class="max-w-md mx-auto mt-20 card text-center border-t-8 border-blue-600">
        <h1 class="font-bold text-blue-900 text-2xl mb-6 uppercase italic">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 border rounded-2xl text-center mb-4 outline-none focus:ring-2 ring-blue-500">
        <button onclick="window.login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase hover:bg-blue-700 transition">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
            <h2 class="font-bold text-blue-900 italic uppercase">Roththa Shop v16.0</h2>
            <div class="flex gap-2 text-[10px] font-bold">
                <button onclick="window.showModal('cat-modal')" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-xl border border-blue-200">+ ប្រភេទ</button>
                <button onclick="window.showModal('sup-modal')" class="bg-orange-50 text-orange-600 px-3 py-2 rounded-xl border border-orange-200">+ អ្នកផ្គត់ផ្គង់</button>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-3 py-2 rounded-xl">ចាកចេញ</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div class="card border-t-4 border-blue-600">
                    <h3 id="form-title" class="font-bold text-xs mb-4 uppercase underline text-blue-600 italic">បញ្ចូលទំនិញថ្មី</h3>
                    <div class="space-y-3">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-2 border rounded-xl text-xs outline-none focus:ring-1 ring-blue-400">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-blue-50"></select>
                            <select id="p-sup-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-orange-50"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ $" class="w-1/2 p-2 border rounded-xl text-xs font-bold text-emerald-600">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-2 border rounded-xl text-xs">
                        </div>
                        <div id="img-preview-container" class="hidden text-center">
                            <img id="img-view" class="w-16 h-16 rounded mx-auto border mb-2 object-cover shadow-sm">
                        </div>
                        <input type="file" id="p-file" class="w-full text-[10px] border p-1 rounded-xl bg-gray-50">
                        <input type="hidden" id="p-img">
                        
                        <div class="flex gap-2">
                            <button id="btn-save" onclick="window.saveProduct()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow hover:bg-blue-700">រក្សាទុក</button>
                            <button id="btn-cancel" onclick="window.cancelEdit()" class="hidden flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold text-xs uppercase">បោះបង់</button>
                        </div>
                    </div>
                </div>

                <div class="card border-t-4 border-orange-500">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-[10px] uppercase text-orange-600 underline italic">ប្រវត្តិការលក់</h3>
                        <div class="flex gap-1">
                            <button onclick="window.exportSelectedInvoices()" class="bg-blue-600 text-white px-2 py-1 rounded text-[8px] font-bold uppercase shadow">Export Details</button>
                            <button onclick="window.deleteSelectedOrders()" class="bg-red-500 text-white px-2 py-1 rounded text-[8px] font-bold uppercase shadow">Delete</button>
                        </div>
                    </div>
                    <input type="text" onkeyup="window.searchTable('order-body', this.value)" placeholder="រកឈ្មោះអតិថិជន..." class="w-full p-2 mb-2 border rounded-xl text-[10px] outline-none">
                    <div class="overflow-y-auto max-h-[350px] border rounded-lg">
                        <table class="w-full text-[10px] text-left">
                            <thead class="sticky top-0 z-10">
                                <tr class="border-b">
                                    <th class="p-2 text-center w-8"><input type="checkbox" onclick="window.selectAll('o-chk', this)"></th>
                                    <th class="p-2">អតិថិជន</th><th class="text-right p-2">សរុប ($)</th>
                                </tr>
                            </thead>
                            <tbody id="order-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 card border-t-4 border-emerald-500">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                    <h3 class="font-bold text-xs uppercase text-emerald-700 italic">របាយការណ៍ស្តុកទំនិញ</h3>
                    <div class="relative w-full md:w-64">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                        <input type="text" id="stock-search-input" onkeyup="window.searchStock(this.value)" placeholder="ស្វែងរកទំនិញ..." class="w-full pl-9 p-2 border rounded-2xl text-[10px] outline-none focus:ring-2 ring-emerald-400">
                    </div>
                    <button onclick="window.exportStockPDF()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow hover:bg-emerald-700">Stock PDF</button>
                </div>
                
                <div class="overflow-x-auto border rounded-xl">
                    <table class="w-full text-[11px] text-left">
                        <thead>
                            <tr class="border-b">
                                <th class="p-3 w-8"><input type="checkbox" onclick="window.selectAll('p-chk', this)"></th>
                                <th class="p-3">រូបភាព</th><th class="p-3">ឈ្មោះ</th><th class="p-3 text-center">ស្តុក</th><th class="p-3 text-right">តម្លៃ</th><th class="p-3 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="product-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-view-panel" class="hidden-panel fixed inset-0 bg-gray-900/95 z-[100] flex flex-col items-center p-4 overflow-y-auto">
        <div class="w-full max-w-4xl flex justify-between mb-4 sticky top-0 bg-gray-900/80 p-3 rounded-2xl backdrop-blur">
            <button onclick="window.showMain()" class="bg-white px-6 py-2 rounded-xl font-bold text-blue-900 shadow-lg">បិទវិញ</button>
            <button id="btn-download" class="bg-emerald-500 text-white px-8 py-2 rounded-xl font-bold uppercase shadow-xl hover:bg-emerald-400">Download PDF</button>
        </div>
        <div id="pdf-render-area" class="w-full max-w-3xl bg-white shadow-2xl rounded"></div>
    </div>

    <div id="cat-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center"><h3 class="font-bold mb-4 uppercase text-sm border-b pb-2">បន្ថែមប្រភេទផលិតផល</h3><input type="text" id="new-cat" class="w-full p-2 border rounded-xl mb-4 text-center"><button onclick="window.addCategory()" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold">បន្ថែម</button><div id="cat-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div><button onclick="window.closeModal('cat-modal')" class="w-full mt-4 text-gray-400 text-[10px]">បិទ</button></div></div>
    <div id="sup-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center"><h3 class="font-bold mb-4 uppercase text-sm border-b pb-2">បន្ថែមអ្នកផ្គត់ផ្គង់</h3><input type="text" id="new-sup-name" placeholder="ឈ្មោះ" class="w-full p-2 border rounded-xl mb-2 text-center"><input type="text" id="new-sup-phone" placeholder="លេខទូរស័ព្ទ" class="w-full p-2 border rounded-xl mb-4 text-center"><button onclick="window.addSupplier()" class="w-full bg-orange-600 text-white py-2 rounded-xl font-bold">បន្ថែម</button><div id="sup-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div><button onclick="window.closeModal('sup-modal')" class="w-full mt-4 text-gray-400 text-[10px]">បិទ</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH & UI ---
        window.login = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden-panel');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                window.loadAll();
            } else alert("លេខកូដសម្ងាត់មិនត្រឹមត្រូវ!");
        };
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden-panel');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden-panel');
        window.showMain = () => { document.getElementById('pdf-view-panel').classList.add('hidden-panel'); document.getElementById('admin-main').classList.remove('hidden-panel'); };

        // --- LOAD DATA ---
        window.loadAll = async () => {
            const [pSnap, oSnap, cSnap, sSnap] = await Promise.all([
                getDocs(query(collection(db, "products"), orderBy("createdAt", "desc"))),
                getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc"))),
                getDocs(collection(db, "categories")),
                getDocs(collection(db, "suppliers"))
            ]);

            const cSel = document.getElementById('p-cat-select');
            const sSel = document.getElementById('p-sup-select');
            const cList = document.getElementById('cat-list-display');
            const sList = document.getElementById('sup-list-display');
            cSel.innerHTML = sSel.innerHTML = cList.innerHTML = sList.innerHTML = "";
            cSnap.forEach(d => {
                cSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                cList.innerHTML += `<div class="flex justify-between bg-gray-50 p-1 border rounded"><span>${d.data().name}</span><button onclick="window.del('categories','${d.id}')" class="text-red-400">x</button></div>`;
            });
            sSnap.forEach(d => {
                sSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                sList.innerHTML += `<div class="flex justify-between bg-orange-50 p-1 border rounded"><span>${d.data().name}</span><button onclick="window.del('suppliers','${d.id}')" class="text-red-400">x</button></div>`;
            });

            const pBody = document.getElementById('product-body');
            pBody.innerHTML = "";
            pSnap.forEach(d => {
                const p = d.data();
                pBody.innerHTML += `<tr class="hover:bg-gray-50" id="p-row-${d.id}">
                    <td class="p-3 text-center"><input type="checkbox" class="p-chk" data-id="${d.id}" onclick="window.highRow('p-row-${d.id}', this)"></td>
                    <td class="p-3"><img src="${p.img || ''}" class="w-10 h-10 rounded border object-cover" crossorigin="anonymous"></td>
                    <td class="p-3 font-bold text-slate-700">${p.name}</td>
                    <td class="p-3 text-center font-bold text-orange-600">${p.stock || 0}</td>
                    <td class="p-3 text-right font-bold text-emerald-600">$${(parseFloat(p.price) || 0).toFixed(2)}</td>
                    <td class="p-3 text-center">
                        <div class="flex justify-center gap-3">
                            <button onclick="window.editProduct('${d.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                            <button onclick="window.del('products','${d.id}')" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            });

            const oBody = document.getElementById('order-body');
            oBody.innerHTML = "";
            oSnap.forEach(d => {
                const o = d.data();
                oBody.innerHTML += `<tr id="o-row-${d.id}">
                    <td class="p-2 text-center"><input type="checkbox" class="o-chk" data-id="${d.id}" onclick="window.highRow('o-row-${d.id}', this)"></td>
                    <td class="p-2 font-bold text-slate-600">${o.customer_name || 'Guest'}</td>
                    <td class="p-2 text-right font-bold text-blue-600 pr-3">$${(parseFloat(o.total_amount) || 0).toFixed(2)}</td>
                </tr>`;
            });
        };

        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat-select').value,
                supplier: document.getElementById('p-sup-select').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                img: document.getElementById('p-img').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name) return alert("សូមបញ្ចូលឈ្មោះទំនិញ!");
            if(id) { await updateDoc(doc(db, "products", id), data); alert("Update ជោគជ័យ!"); }
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); alert("រក្សាទុកជោគជ័យ!"); }
            window.cancelEdit(); window.loadAll();
        };

        window.editProduct = async (id) => {
            const snap = await getDoc(doc(db, "products", id));
            const p = snap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat-select').value = p.category;
            document.getElementById('p-sup-select').value = p.supplier;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-img').value = p.img || "";
            if(p.img) { document.getElementById('img-view').src = p.img; document.getElementById('img-preview-container').classList.remove('hidden'); }
            document.getElementById('form-title').innerText = "កែសម្រួលទំនិញ";
            document.getElementById('btn-save').innerText = "Update Now";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-stock').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('img-preview-container').classList.add('hidden');
            document.getElementById('form-title').innerText = "បញ្ចូលទំនិញថ្មី";
            document.getElementById('btn-save').innerText = "រក្សាទុក";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        // --- 1. EXPORT STOCK PDF (FIXED GRAND TOTAL) ---
        window.exportStockPDF = async () => {
            const checked = document.querySelectorAll('.p-chk:checked');
            if(checked.length === 0) return alert("សូមរើសទំនិញក្នុងតារាងស្តុក!");
            
            const area = document.getElementById('pdf-render-area');
            let grandTotal = 0;

            area.innerHTML = `
                <div style="padding:40px; font-family:'Hanuman',serif;">
                    <h2 style="text-align:center; color:#059669; border-bottom:3px solid #059669; padding-bottom:10px;">របាយការណ៍ស្តុកទំនិញ</h2>
                    <p style="text-align:right; font-size:10px; color:#666;">Date: ${new Date().toLocaleString('km-KH')}</p>
                    <table style="width:100%; border-collapse:collapse; margin-top:20px; font-size:11px;">
                        <thead>
                            <tr style="background:#ecfdf5;">
                                <th style="border:1px solid #d1fae5; padding:10px;">រូបភាព</th>
                                <th style="border:1px solid #d1fae5; padding:10px; text-align:left;">ឈ្មោះ</th>
                                <th style="border:1px solid #d1fae5; padding:10px;">ស្តុក</th>
                                <th style="border:1px solid #d1fae5; padding:10px; text-align:right;">តម្លៃ</th>
                                <th style="border:1px solid #d1fae5; padding:10px; text-align:right;">សរុប</th>
                            </tr>
                        </thead>
                        <tbody id="pdf-stock-rows"></tbody>
                        <tfoot>
                            <tr style="background:#f8fafc; font-weight:bold;">
                                <td colspan="4" style="border:1px solid #ddd; padding:15px; text-align:right; font-size:14px;">សរុបទឹកប្រាក់ក្នុងស្តុកទាំងអស់:</td>
                                <td id="stock-final-grand-total" style="border:1px solid #ddd; padding:15px; text-align:right; color:#059669; font-size:14px;">$0.00</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>`;
            
            const rowContainer = area.querySelector('#pdf-stock-rows');
            for(let c of checked) {
                const snap = await getDoc(doc(db, "products", c.dataset.id));
                const p = snap.data();
                const price = parseFloat(p.price) || 0;
                const stock = parseInt(p.stock) || 0;
                const subTotal = price * stock;
                grandTotal += subTotal;

                rowContainer.innerHTML += `
                    <tr>
                        <td style="border:1px solid #eee; text-align:center; padding:5px;"><img src="${p.img || ''}" style="width:40px; height:40px; object-fit:cover;" crossorigin="anonymous"></td>
                        <td style="border:1px solid #eee; padding:10px; font-weight:bold;">${p.name}</td>
                        <td style="border:1px solid #eee; text-align:center;">${stock}</td>
                        <td style="border:1px solid #eee; text-align:right; padding:10px;">$${price.toFixed(2)}</td>
                        <td style="border:1px solid #eee; text-align:right; padding:10px; font-weight:bold;">$${subTotal.toFixed(2)}</td>
                    </tr>`;
            }
            area.querySelector('#stock-final-grand-total').innerText = `$${grandTotal.toFixed(2)}`;
            window.showPDFPreview("Stock_Report.pdf");
        };

        // --- 2. EXPORT INVOICE PDF (FIXED TOTAL SUMMARY) ---
        window.exportSelectedInvoices = async () => {
            const checked = document.querySelectorAll('.o-chk:checked');
            if(checked.length === 0) return alert("សូមរើសវិក្កយបត្រ!");
            
            const area = document.getElementById('pdf-render-area');
            area.innerHTML = "";
            let overallGrandTotal = 0;

            // Generate individual invoice pages
            for(let c of checked) {
                const snap = await getDoc(doc(db, "orders", c.dataset.id));
                const o = snap.data();
                const total = parseFloat(o.total_amount) || 0;
                overallGrandTotal += total;
                const id = snap.id.substring(0,8).toUpperCase();

                let itemsHTML = "";
                if(o.items) {
                    o.items.forEach(it => {
                        const itPrice = parseFloat(it.price) || 0;
                        const itQty = parseInt(it.qty) || 0;
                        itemsHTML += `<tr><td style="border:1px solid #e2e8f0; padding:8px;">${it.name}</td><td style="border:1px solid #e2e8f0; padding:8px; text-align:center;">${itQty}</td><td style="border:1px solid #e2e8f0; padding:8px; text-align:right;">$${itPrice.toFixed(2)}</td><td style="border:1px solid #e2e8f0; padding:8px; text-align:right;">$${(itQty*itPrice).toFixed(2)}</td></tr>`;
                    });
                }

                area.innerHTML += `
                    <div class="invoice-page">
                        <div style="display:flex; justify-content:space-between; border-bottom:4px solid #2563eb; padding-bottom:10px; margin-bottom:20px;">
                            <div><h1 style="margin:0; color:#2563eb; font-size:22px;">ROTH THA SHOP</h1><p style="margin:0; font-size:10px;">វិក្កយបត្រ / INVOICE</p></div>
                            <div style="text-align:right;"><p style="margin:0; font-weight:bold;">#${id}</p></div>
                        </div>
                        <p style="font-size:12px;">អតិថិជន: <b>${o.customer_name || 'ភ្ញៀវទូទៅ'}</b></p>
                        <table style="width:100%; border-collapse:collapse; font-size:11px; margin-top:10px;">
                            <thead style="background:#f8fafc;"><tr><th style="border:1px solid #e2e8f0; padding:8px; text-align:left;">ទំនិញ</th><th style="border:1px solid #e2e8f0; padding:8px;">ចំនួន</th><th style="border:1px solid #e2e8f0; padding:8px; text-align:right;">តម្លៃ</th><th style="border:1px solid #e2e8f0; padding:8px; text-align:right;">សរុប</th></tr></thead>
                            <tbody>${itemsHTML}</tbody>
                        </table>
                        <div style="text-align:right; margin-top:20px;"><h2 style="color:#2563eb; margin:0;">Total: $${total.toFixed(2)}</h2></div>
                    </div>`;
            }

            // ADD OVERALL SUMMARY PAGE AT THE END
            area.innerHTML += `
                <div class="invoice-page" style="text-align:center; padding-top:100px;">
                    <div style="border:2px dashed #2563eb; padding:40px; display:inline-block; border-radius:20px;">
                        <h2 style="color:#2563eb; margin-bottom:10px; text-transform:uppercase;">របាយការណ៍សរុបទឹកប្រាក់លក់</h2>
                        <p style="font-size:14px; color:#64748b;">ចំនួនវិក្កយបត្រសរុប: ${checked.length}</p>
                        <div style="font-size:30px; font-weight:bold; color:#1e293b; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                            GRAND TOTAL: <span style="color:#2563eb;">$${overallGrandTotal.toFixed(2)}</span>
                        </div>
                    </div>
                </div>`;

            window.showPDFPreview("Invoices_Summary.pdf");
        };

        // --- PDF ENGINE ---
        window.showPDFPreview = (filename) => {
            document.getElementById('admin-main').classList.add('hidden-panel');
            document.getElementById('pdf-view-panel').classList.remove('hidden-panel');
            document.getElementById('btn-download').onclick = () => {
                const opt = { margin: 0, filename, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
                html2pdf().from(document.getElementById('pdf-render-area')).set(opt).save();
            };
        };

        // --- UTILS ---
        window.del = async (col, id) => { if(confirm("តើអ្នកពិតជាចង់លុបមែនទេ?")) { await deleteDoc(doc(db, col, id)); window.loadAll(); } };
        window.deleteSelectedOrders = async () => { const checked = document.querySelectorAll('.o-chk:checked'); if(checked.length === 0) return; if(confirm("លុបវិក្កយបត្រដែលបានរើស?")) { for(let c of checked) await deleteDoc(doc(db, "orders", c.dataset.id)); window.loadAll(); } };
        window.highRow = (rid, el) => document.getElementById(rid).classList.toggle('selected-row', el.checked);
        window.selectAll = (cls, master) => { const chks = document.getElementsByClassName(cls); for(let c of chks) { c.checked = master.checked; window.highRow(c.closest('tr').id, c); } };
        window.searchStock = (q) => { const rows = document.getElementById('product-body').children; for(let r of rows) r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? "" : "none"; };
        window.searchTable = (tid, q) => { for(let r of document.getElementById(tid).children) r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? "" : "none"; };
        
        document.getElementById('p-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                document.getElementById('p-img').value = ev.target.result;
                document.getElementById('img-view').src = ev.target.result;
                document.getElementById('img-preview-container').classList.remove('hidden');
            };
            r.readAsDataURL(e.target.files[0]);
        };

        window.addCategory = async () => { const name = document.getElementById('new-cat').value; if(name) { await addDoc(collection(db, "categories"), { name }); document.getElementById('new-cat').value = ""; window.loadAll(); } };
        window.addSupplier = async () => { const name = document.getElementById('new-sup-name').value; if(name) { await addDoc(collection(db, "suppliers"), { name, phone: document.getElementById('new-sup-phone').value }); document.getElementById('new-sup-name').value = ""; window.loadAll(); } };
    </script>
</body>
</html>
