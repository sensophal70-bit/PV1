<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roththa Shop - Account Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .auth-card { transition: all 0.4s ease; }
        .hidden { display: none; }
        .loader { border-top-color: #1e40af; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loading-screen" class="fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center">
        <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mb-4"></div>
        <p class="text-xs text-blue-900 font-bold">កំពុងផ្ទៀងផ្ទាត់...</p>
    </div>

    <div id="auth-container" class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 hidden auth-card">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-800 rounded-[2rem] mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-user-shield text-white text-3xl"></i>
            </div>
            <h2 id="form-title" class="text-2xl font-bold text-blue-900 italic">ចូលប្រើប្រាស់</h2>
            <p id="form-subtitle" class="text-gray-400 text-[10px] mt-1 uppercase tracking-widest">Roththa Shop Account</p>
        </div>

        <div id="login-section" class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-4 text-gray-300 text-sm"></i>
                <input type="email" id="email" placeholder="អ៊ីមែល" class="w-full pl-11 pr-4 py-4 bg-gray-50 rounded-2xl outline-none border focus:border-blue-500 text-sm transition-all">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-gray-300 text-sm"></i>
                <input type="password" id="password" placeholder="លេខសម្ងាត់" class="w-full pl-11 pr-4 py-4 bg-gray-50 rounded-2xl outline-none border focus:border-blue-500 text-sm transition-all">
            </div>
            <button onclick="handleAuth('login')" class="w-full bg-blue-800 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-900 active:scale-95 transition-all">ចូលក្នុងប្រព័ន្ធ</button>
            <p class="text-center text-[11px] text-gray-500">មិនទាន់មានគណនី? <span onclick="switchMode(true)" class="text-blue-700 font-bold cursor-pointer underline">បង្កើតថ្មី</span></p>
        </div>

        <div id="register-section" class="space-y-4 hidden">
            <input type="text" id="reg-name" placeholder="ឈ្មោះពេញ" class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none border focus:border-green-500 text-sm transition-all">
            <input type="email" id="reg-email" placeholder="អ៊ីមែលថ្មី" class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none border focus:border-green-500 text-sm transition-all">
            <input type="password" id="reg-password" placeholder="លេខសម្ងាត់ (យ៉ាងតិច ៦ ខ្ទង់)" class="w-full px-4 py-4 bg-gray-50 rounded-2xl outline-none border focus:border-green-500 text-sm transition-all">
            <button onclick="handleAuth('register')" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ចុះឈ្មោះឥឡូវនេះ</button>
            <p class="text-center text-[11px] text-gray-500">មានគណនីរួចហើយ? <span onclick="switchMode(false)" class="text-blue-700 font-bold cursor-pointer underline">ត្រឡប់ទៅ Login</span></p>
        </div>
    </div>

    <div id="profile-container" class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 hidden text-center">
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-800 to-blue-500 rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-white shadow-xl">
            <span id="user-initial" class="text-white text-3xl font-bold italic">R</span>
        </div>
        <h2 id="display-name" class="text-xl font-bold text-gray-800">អតិថិជន</h2>
        <p id="display-email" class="text-gray-400 text-xs mb-6 italic">email@example.com</p>
        
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="location.href='index.html'" class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <i class="fas fa-shopping-bag text-blue-600 mb-1"></i>
                <p class="text-[9px] font-bold text-blue-900">ទៅកាន់ហាង</p>
            </button>
            <button onclick="alert('មុខងារនេះនឹងមកដល់ឆាប់ៗ')" class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <i class="fas fa-cog text-gray-400 mb-1"></i>
                <p class="text-[9px] font-bold text-gray-500">កំណត់ការងារ</p>
            </button>
        </div>

        <button onclick="handleLogout()" class="w-full py-4 rounded-2xl text-red-500 font-bold text-sm bg-red-50 active:bg-red-100 transition-all border border-red-100">
            <i class="fas fa-sign-out-alt mr-2"></i> ចាកចេញពីគណនី
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- ឆែកស្ថានភាព Login ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('loading-screen').classList.add('hidden');
            if (user) {
                showProfile(user);
            } else {
                showAuth();
            }
        });

        window.switchMode = (isReg) => {
            document.getElementById('login-section').classList.toggle('hidden', isReg);
            document.getElementById('register-section').classList.toggle('hidden', !isReg);
            document.getElementById('form-title').innerText = isReg ? "ចុះឈ្មោះថ្មី" : "ចូលប្រើប្រាស់";
        };

        window.handleAuth = async (type) => {
            document.getElementById('loading-screen').classList.remove('hidden');
            try {
                if (type === 'register') {
                    const name = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    const pass = document.getElementById('reg-password').value;
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(userCredential.user, { displayName: name });
                } else {
                    const email = document.getElementById('email').value;
                    const pass = document.getElementById('password').value;
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) {
                alert("កំហុស: " + error.message);
                document.getElementById('loading-screen').classList.add('hidden');
            }
        };

        window.handleLogout = () => {
            if(confirm("តើបងចង់ចាកចេញមែនទេ?")) signOut(auth);
        };

        function showProfile(user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('profile-container').classList.remove('hidden');
            document.getElementById('display-name').innerText = user.displayName || "អតិថិជន";
            document.getElementById('display-email').innerText = user.email;
            document.getElementById('user-initial').innerText = (user.displayName || "R").charAt(0).toUpperCase();
        }

        function showAuth() {
            document.getElementById('profile-container').classList.add('hidden');
            document.getElementById('auth-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
