<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Construction - Official Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f9fafb; -webkit-user-select: none; }
        .cart-sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-700 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-2">
            <i class="fas fa-building text-xl text-yellow-400"></i>
            <h1 class="font-bold text-lg tracking-tight">Roththa Construction</h1>
        </div>
        <div class="relative cursor-pointer p-2" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] rounded-full px-1.5 font-bold border-2 border-blue-700">0</span>
        </div>
    </nav>

    <div class="p-4 bg-white sticky top-16 z-40 shadow-sm">
        <div class="relative max-w-md mx-auto">
            <input type="text" id="search-input" onkeyup="searchProduct()" 
                class="w-full p-3 pl-10 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 transition-all" 
                placeholder="ស្វែងរកសម្ភារៈសំណង់...">
            <i class="fas fa-search absolute left-3 top-4 text-gray-400"></i>
        </div>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4 mb-24">
        </div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full bg-white shadow-2xl transform translate-x-full cart-sidebar z-[60] flex flex-col">
        <div class="p-5 bg-blue-700 text-white flex justify-between items-center shadow-md">
            <span class="font-bold text-lg"><i class="fas fa-shopping-basket mr-2"></i> កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-3xl p-2 outline-none">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-grow overflow-y-auto p-5 space-y-4 bg-gray-50">
            <p class="text-center text-gray-400 mt-20 italic">មិនទាន់មានទំនិញក្នុងកន្ត្រក</p>
        </div>

        <div class="p-6 border-t bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
            <div class="mb-4">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">អតិថិជន (Telegram Name)</label>
                <input type="text" id="cust-name" readonly 
                    class="w-full mt-1 p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-800 outline-none">
            </div>
            
            <div class="flex justify-between items-center font-bold text-xl mb-6 px-1">
                <span class="text-gray-500">សរុប:</span>
                <span id="cart-total" class="text-red-600 font-black">$0.00</span>
            </div>

            <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all flex justify-center items-center">
                <i class="fab fa-telegram-plane mr-3 text-2xl"></i> ផ្ញើការកុម្ម៉ង់ទៅ Telegram
            </button>
        </div>
    </div>

    <script>
        // ៣. ចាប់ផ្តើម Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ៤. ទិន្នន័យផលិតផល
        const products = [
            { id: 1, name: "ស៊ីម៉ងត៍ K-Cement", price: 5.50, img: "https://via.placeholder.com/200?text=K-Cement" },
            { id: 2, name: "ដែកសរសៃ ១២លី", price: 0.85, img: "https://via.placeholder.com/200?text=Steel" },
            { id: 3, name: "ការ៉ូបាត 60x60", price: 12.00, img: "https://via.placeholder.com/200?text=Tiles" },
            { id: 4, name: "ថ្នាំលាប Nippon", price: 45.00, img: "https://via.placeholder.com/200?text=Paint" },
            { id: 5, name: "ឥដ្ឋតាន់ (១០០០ដុំ)", price: 65.00, img: "https://via.placeholder.com/200?text=Bricks" }
        ];

        let cart = [];

        // ៥. បំពេញឈ្មោះអូតូ និងបង្ហាញផលិតផល
        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            const nameInput = document.getElementById('cust-name');
            if (user) {
                nameInput.value = (user.first_name + " " + (user.last_name || "")).trim();
            } else {
                nameInput.value = "ភ្ញៀវទូទៅ";
            }
            renderProducts(products);
        };

        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-50 flex flex-col transition hover:shadow-md">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-3 shadow-sm">
                    <h3 class="font-bold text-sm text-gray-800 h-10 overflow-hidden leading-snug">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-red-600 font-bold">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg active:bg-blue-800 transition">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function searchProduct() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(term)));
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            exist ? exist.qty++ : cart.push({ ...product, qty: 1 });
            updateCartUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-20 italic">មិនទាន់មានទំនិញក្នុងកន្ត្រក</p>';
                document.getElementById('cart-total').innerText = "$0.00";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                const sub = item.price * item.qty;
                total += sub;
                return `
                    <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${item.name}</p>
                            <p class="text-xs text-blue-600 font-bold">$${item.price.toFixed(2)} x ${item.qty} = $${sub.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 p-2 text-2xl">&times;</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        // ៦. មុខងារផ្ញើការកុម្ម៉ង់ (បច្ចេកទេសបង្ខំឱ្យបើក Chat Roththa2)
        function checkout() {
            if (cart.length === 0) {
                alert("សូមរើសផលិតផលសិន!");
                return;
            }

            const name = document.getElementById('cust-name').value;
            const myTelegramUser = "roththa2"; // ប្រាកដថាដក @ ចេញ

            let message = "🏗️ *ការកុម្ម៉ង់សម្ភារៈសំណង់ថ្មី*\n";
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `👤 *អតិថិជន:* ${name}\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            
            let total = 0;
            cart.forEach((item, index) => {
                const subTotal = item.price * item.qty;
                total += subTotal;
                message += `${index + 1}. ${item.name} (x${item.qty}) = *$${subTotal.toFixed(2)}*\n`;
            });

            message += "━━━━━━━━━━━━━━━━━━\n";
            message += `💰 *សរុបរួម: $${total.toFixed(2)}*\n`;
            message += "━━━━━━━━━━━━━━━━━━\n";
            message += "⏰ _ផ្ញើចេញពី Roththa Mini App_";

            // បង្កើត Link ផ្លូវការ (Format: https://t.me/username?text=message)
            const telegramUrl = `https://t.me/${myTelegramUser}?text=${encodeURIComponent(message)}`;

            // ឆែកមើល SDK និងបង្ខំឱ្យបើក Chat ថ្មី
            try {
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
                    // វិធីនេះគឺដើរ ១០០% សម្រាប់ Telegram Mini App លើទូរស័ព្ទ
                    window.Telegram.WebApp.openTelegramLink(telegramUrl);
                } else {
                    // បើបើកតាម Browser កុំព្យូទ័រ
                    window.location.href = telegramUrl;
                }
            } catch (e) {
                // បើមានបញ្ហា បាញ់តាម Link ធម្មតា
                window.open(telegramUrl, '_blank');
            }
        }
    </script>
</body>
</html>
