<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop - Management System v10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; padding: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden-panel { display: none !important; }
        .invoice-page { page-break-after: always; padding: 30px; background: white; border-bottom: 1px dashed #eee; }
        .selected-row { background-color: #eff6ff !important; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-panel" class="max-w-md mx-auto mt-20 card text-center border-t-8 border-blue-600">
        <h1 class="font-bold text-blue-900 text-2xl mb-6 uppercase italic italic">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 border rounded-2xl text-center mb-4 outline-none focus:ring-2 ring-blue-500 text-lg">
        <button onclick="window.login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg uppercase">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
            <h2 class="font-bold text-blue-900 italic uppercase">Roththa Shop v10.0</h2>
            <div class="flex gap-2">
                <button onclick="window.showModal('cat-modal')" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-blue-200">+ Category</button>
                <button onclick="window.showModal('sup-modal')" class="bg-orange-50 text-orange-600 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-orange-200">+ Supplier</button>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-3 py-2 rounded-xl text-[10px] font-bold">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="card border-t-4 border-blue-600">
                    <h3 class="font-bold text-xs mb-4 uppercase underline text-blue-600 italic">បញ្ចូលទំនិញថ្មី</h3>
                    <div class="space-y-3">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-2 border rounded-xl text-xs outline-none">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-blue-50"></select>
                            <select id="p-sup-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-orange-50"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ $" class="w-1/2 p-2 border rounded-xl text-xs font-bold text-emerald-600">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-2 border rounded-xl text-xs">
                        </div>
                        <input type="file" id="p-file" class="w-full text-[10px] border p-1 rounded-xl bg-gray-50">
                        <input type="hidden" id="p-img">
                        <button onclick="window.saveProduct()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-md">រក្សាទុក</button>
                    </div>
                </div>

                <div class="card border-t-4 border-orange-500">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-[10px] uppercase text-orange-600 underline">ប្រវត្តិការលក់</h3>
                        <button onclick="window.exportSelectedInvoices()" class="bg-red-600 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">Export Selected</button>
                    </div>
                    <input type="text" onkeyup="window.searchTable('order-body', this.value)" placeholder="ស្វែងរកឈ្មោះភ្ញៀវ..." class="w-full p-2 mb-2 border rounded-xl text-[10px] outline-none">
                    <div class="overflow-y-auto max-h-[300px]">
                        <table class="w-full text-[10px]">
                            <thead class="bg-orange-50 sticky top-0">
                                <tr>
                                    <th class="p-2"><input type="checkbox" onclick="window.selectAll('o-chk', this)"></th>
                                    <th>Customer</th><th class="text-right">Total</th><th class="text-center">PDF</th>
                                </tr>
                            </thead>
                            <tbody id="order-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 card border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-xs uppercase text-emerald-700 italic">របាយការណ៍ស្តុក</h3>
                    <button onclick="window.exportStockPDF()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow uppercase"><i class="fas fa-file-pdf mr-1"></i> Stock PDF</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[11px] text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-3"><input type="checkbox" onclick="window.selectAll('p-chk', this)"></th>
                                <th>រូបភាព</th><th>ឈ្មោះទំនិញ</th><th>ប្រភេទ</th><th class="text-center">ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-center">លុប</th>
                            </tr>
                        </thead>
                        <tbody id="product-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="cat-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h3 class="font-bold mb-4 uppercase text-sm border-b pb-2">ប្រភេទផលិតផល</h3>
            <input type="text" id="new-cat" placeholder="ឈ្មោះប្រភេទ..." class="w-full p-2 border rounded-xl mb-2 outline-none">
            <button onclick="window.addCategory()" class="w-full bg-blue-600 text-white py-2 rounded-xl text-xs font-bold uppercase">បន្ថែម</button>
            <div id="cat-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div>
            <button onclick="window.closeModal('cat-modal')" class="w-full mt-4 text-gray-400 text-xs">បិទវិញ</button>
        </div>
    </div>

    <div id="sup-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h3 class="font-bold mb-4 uppercase text-sm border-b pb-2 text-orange-600">អ្នកផ្គត់ផ្គង់</h3>
            <input type="text" id="new-sup-name" placeholder="ឈ្មោះក្រុមហ៊ុន..." class="w-full p-2 border rounded-xl mb-2 outline-none">
            <input type="text" id="new-sup-phone" placeholder="លេខទូរស័ព្ទ..." class="w-full p-2 border rounded-xl mb-2 outline-none">
            <button onclick="window.addSupplier()" class="w-full bg-orange-600 text-white py-2 rounded-xl text-xs font-bold uppercase">បន្ថែម</button>
            <div id="sup-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div>
            <button onclick="window.closeModal('sup-modal')" class="w-full mt-4 text-gray-400 text-xs">បិទវិញ</button>
        </div>
    </div>

    <div id="pdf-view-panel" class="hidden-panel fixed inset-0 bg-gray-900/95 z-[100] flex flex-col items-center p-4 overflow-y-auto">
        <div class="w-full max-w-3xl flex justify-between mb-4 sticky top-0 bg-gray-900/80 p-2 rounded-xl backdrop-blur">
            <button onclick="window.showMain()" class="bg-white px-6 py-2 rounded-xl font-bold text-blue-900"><i class="fas fa-arrow-left mr-2"></i>Back</button>
            <button id="btn-download" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold shadow-xl">Download PDF Now</button>
        </div>
        <div id="pdf-render-area" class="w-full max-w-2xl bg-white shadow-2xl rounded p-2"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH & UI ---
        window.login = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden-panel');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                window.loadAll();
            } else alert("លេខកូដខុស!");
        };
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden-panel');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden-panel');
        window.showMain = () => {
            document.getElementById('pdf-view-panel').classList.add('hidden-panel');
            document.getElementById('admin-main').classList.remove('hidden-panel');
        };

        // --- FIXED: CATEGORY & SUPPLIER ---
        window.addCategory = async () => {
            const name = document.getElementById('new-cat').value;
            if(!name) return alert("សូមបញ្ចូលឈ្មោះ!");
            await addDoc(collection(db, "categories"), { name, createdAt: serverTimestamp() });
            document.getElementById('new-cat').value = "";
            window.loadAll();
        };

        window.addSupplier = async () => {
            const name = document.getElementById('new-sup-name').value;
            const phone = document.getElementById('new-sup-phone').value;
            if(!name) return alert("សូមបញ្ចូលឈ្មោះ!");
            await addDoc(collection(db, "suppliers"), { name, phone, createdAt: serverTimestamp() });
            document.getElementById('new-sup-name').value = "";
            document.getElementById('new-sup-phone').value = "";
            window.loadAll();
        };

        // --- DATA LOADING ---
        window.loadAll = async () => {
            const [pSnap, oSnap, cSnap, sSnap] = await Promise.all([
                getDocs(query(collection(db, "products"), orderBy("createdAt", "desc"))),
                getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc"))),
                getDocs(collection(db, "categories")),
                getDocs(collection(db, "suppliers"))
            ]);

            const cSel = document.getElementById('p-cat-select');
            const sSel = document.getElementById('p-sup-select');
            const cList = document.getElementById('cat-list-display');
            const sList = document.getElementById('sup-list-display');
            cSel.innerHTML = sSel.innerHTML = cList.innerHTML = sList.innerHTML = "";

            cSnap.forEach(d => {
                cSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                cList.innerHTML += `<div class="flex justify-between bg-gray-50 p-2 border rounded"><span>${d.data().name}</span><button onclick="window.del('categories','${d.id}')" class="text-red-400 font-bold">x</button></div>`;
            });
            sSnap.forEach(d => {
                sSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                sList.innerHTML += `<div class="flex justify-between bg-orange-50 p-2 border rounded"><span>${d.data().name}</span><button onclick="window.del('suppliers','${d.id}')" class="text-red-400 font-bold">x</button></div>`;
            });

            const pBody = document.getElementById('product-body');
            pBody.innerHTML = "";
            pSnap.forEach(d => {
                const p = d.data();
                pBody.innerHTML += `<tr class="border-b" id="p-row-${d.id}"><td class="p-3"><input type="checkbox" class="p-chk" data-id="${d.id}" onclick="window.highRow('p-row-${d.id}', this)"></td><td><img src="${p.img || ''}" class="w-10 h-10 rounded border object-cover" crossorigin="anonymous"></td><td class="font-bold">${p.name}</td><td class="text-gray-400 italic">${p.category || ''}</td><td class="text-center font-bold text-orange-600">${p.stock}</td><td class="text-right font-bold text-emerald-600">$${(p.price || 0).toFixed(2)}</td><td class="text-center"><button onclick="window.del('products','${d.id}')" class="text-gray-200 hover:text-red-500"><i class="fas fa-trash"></i></button></td></tr>`;
            });

            const oBody = document.getElementById('order-body');
            oBody.innerHTML = "";
            oSnap.forEach(d => {
                const o = d.data();
                oBody.innerHTML += `<tr class="border-b" id="o-row-${d.id}"><td class="p-2"><input type="checkbox" class="o-chk" data-id="${d.id}" onclick="window.highRow('o-row-${d.id}', this)"></td><td class="font-bold text-slate-700">${o.customer_name || 'Guest'}</td><td class="text-right font-bold text-orange-600">$${o.total_amount}</td><td class="text-center"><button onclick="window.exportSingleInvoice('${d.id}')" class="text-blue-500"><i class="fas fa-file-pdf"></i></button></td></tr>`;
            });
        };

        // --- FIXED: EXPORT STOCK PDF ---
        window.exportStockPDF = async () => {
            const checked = document.querySelectorAll('.p-chk:checked');
            if(checked.length === 0) return alert("សូមជ្រើសរើសទំនិញក្នុងតារាងសិន!");
            
            const area = document.getElementById('pdf-render-area');
            area.innerHTML = `
                <div style="padding: 20px; font-family: 'Hanuman', serif;">
                    <h2 style="text-align:center; color:#059669; border-bottom:2px solid #059669; padding-bottom:10px; margin-bottom:20px;">របាយការណ៍ស្តុកទំនិញ - ROTH THA SHOP</h2>
                    <table style="width:100%; border-collapse:collapse; font-size:11px;">
                        <thead><tr style="background:#f0fdf4;">
                            <th style="border:1px solid #ddd; padding:8px;">រូបភាព</th>
                            <th style="border:1px solid #ddd; padding:8px; text-align:left;">ឈ្មោះទំនិញ</th>
                            <th style="border:1px solid #ddd; padding:8px;">ប្រភេទ</th>
                            <th style="border:1px solid #ddd; padding:8px;">ស្តុក</th>
                            <th style="border:1px solid #ddd; padding:8px; text-align:right;">តម្លៃរាយ</th>
                        </tr></thead>
                        <tbody id="stock-pdf-rows"></tbody>
                    </table>
                </div>`;
            
            const rowArea = area.querySelector('#stock-pdf-rows');
            for(let c of checked) {
                const d = await getDoc(doc(db, "products", c.dataset.id));
                const p = d.data();
                rowArea.innerHTML += `
                    <tr>
                        <td style="border:1px solid #eee; text-align:center; padding:5px;"><img src="${p.img || ''}" style="width:40px; height:40px; object-fit:cover;" crossorigin="anonymous"></td>
                        <td style="border:1px solid #eee; padding:8px;"><b>${p.name}</b></td>
                        <td style="border:1px solid #eee; padding:8px; text-align:center;">${p.category || '---'}</td>
                        <td style="border:1px solid #eee; padding:8px; text-align:center; font-weight:bold; color:#d97706;">${p.stock}</td>
                        <td style="border:1px solid #eee; padding:8px; text-align:right; font-weight:bold; color:#059669;">$${p.price.toFixed(2)}</td>
                    </tr>`;
            }
            window.showPDFPreview("Stock_Report.pdf");
        };

        // --- FIXED: EXPORT SALES PDF ---
        window.exportSelectedInvoices = async () => {
            const checked = document.querySelectorAll('.o-chk:checked');
            if(checked.length === 0) return alert("សូមជ្រើសរើសភ្ញៀវ!");
            const area = document.getElementById('pdf-render-area');
            area.innerHTML = "";
            for(let c of checked) {
                const d = await getDoc(doc(db, "orders", c.dataset.id));
                area.innerHTML += window.generateInvoiceHTML(d.id, d.data());
            }
            window.showPDFPreview("Batch_Invoices.pdf");
        };

        window.exportSingleInvoice = async (id) => {
            const d = await getDoc(doc(db, "orders", id));
            document.getElementById('pdf-render-area').innerHTML = window.generateInvoiceHTML(id, d.data());
            window.showPDFPreview(`Invoice_${d.data().customer_name}.pdf`);
        };

        window.generateInvoiceHTML = (id, o) => {
            const date = o.createdAt?.toDate().toLocaleString('km-KH') || '---';
            let itemsHTML = "";
            if(o.items && o.items.length > 0) {
                o.items.forEach(i => {
                    itemsHTML += `<tr><td style="border:1px solid #ddd; padding:10px;">${i.name}</td><td style="border:1px solid #ddd; padding:10px; text-align:center;">${i.qty}</td><td style="border:1px solid #ddd; padding:10px; text-align:right;">$${parseFloat(i.price).toFixed(2)}</td><td style="border:1px solid #ddd; padding:10px; text-align:right;">$${(i.price*i.qty).toFixed(2)}</td></tr>`;
                });
            } else {
                itemsHTML = `<tr><td style="border:1px solid #ddd; padding:10px;">លក់រាយទូទៅ</td><td style="border:1px solid #ddd; padding:10px; text-align:center;">1</td><td style="border:1px solid #ddd; padding:10px; text-align:right;">$${o.total_amount}</td><td style="border:1px solid #ddd; padding:10px; text-align:right;">$${o.total_amount}</td></tr>`;
            }
            return `<div class="invoice-page"><h2 style="color:#1e3a8a; border-bottom:3px solid #1e3a8a;">ROTH THA SHOP</h2><p><b>អតិថិជន:</b> ${o.customer_name || 'Guest'}<br><b>លេខវិក្កយបត្រ:</b> #${id.substring(0,8).toUpperCase()}<br><b>កាលបរិច្ឆេទ:</b> ${date}</p><table style="width:100%; border-collapse:collapse; font-size:12px;"><thead><tr style="background:#1e3a8a; color:white;"><th style="padding:10px;">ទំនិញ</th><th>ចំនួន</th><th>តម្លៃ</th><th>សរុប</th></tr></thead><tbody>${itemsHTML}</tbody></table><div style="text-align:right; margin-top:20px;"><h3>សរុបរួម: $${parseFloat(o.total_amount).toFixed(2)}</h3></div></div>`;
        };

        // --- FINAL PDF HANDLER ---
        window.showPDFPreview = (filename) => {
            document.getElementById('admin-main').classList.add('hidden-panel');
            document.getElementById('pdf-view-panel').classList.remove('hidden-panel');
            document.getElementById('btn-download').onclick = () => {
                const opt = { margin:0.2, filename, image:{type:'jpeg', quality:0.98}, html2canvas:{scale:2, useCORS:true}, jsPDF:{unit:'in', format:'a4', orientation:'portrait'} };
                html2pdf().from(document.getElementById('pdf-render-area')).set(opt).save().then(() => alert("ជោគជ័យ!"));
            };
        };

        // --- UTILS ---
        window.saveProduct = async () => {
            const data = { name: document.getElementById('p-name').value, category: document.getElementById('p-cat-select').value, supplier: document.getElementById('p-sup-select').value, price: parseFloat(document.getElementById('p-price').value) || 0, stock: parseInt(document.getElementById('p-stock').value) || 0, img: document.getElementById('p-img').value, createdAt: serverTimestamp() };
            if(!data.name) return alert("សូមបំពេញឈ្មោះ!");
            await addDoc(collection(db, "products"), data); window.loadAll();
        };
        window.del = async (col, id) => { if(confirm("លុប?")) { await deleteDoc(doc(db, col, id)); window.loadAll(); } };
        window.highRow = (rid, el) => document.getElementById(rid).classList.toggle('selected-row', el.checked);
        window.selectAll = (cls, master) => { const chks = document.getElementsByClassName(cls); for(let c of chks) { c.checked = master.checked; window.highRow(c.closest('tr').id, c); } };
        window.searchTable = (tid, q) => { for(let r of document.getElementById(tid).children) r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? "" : "none"; };
        document.getElementById('p-file').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => document.getElementById('p-img').value = ev.target.result; r.readAsDataURL(e.target.files[0]); };
    </script>
</body>
</html>
