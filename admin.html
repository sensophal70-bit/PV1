<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Roththa Shop (PV1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">

    <div class="max-w-[1400px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-blue-100">
                    <h2 class="font-bold text-blue-900 mb-4 flex items-center text-sm"><i class="fas fa-tags mr-2"></i> បន្ថែមប្រភេទផលិតផល</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-cat-name" placeholder="ឈ្មោះប្រភេទ (ឧ៖ ថ្ម)" class="flex-grow p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-xs">
                        <button id="btn-add-cat" class="bg-blue-600 text-white px-5 rounded-xl font-bold text-[10px] active:scale-95 shadow-sm">បន្ថែម</button>
                    </div>
                    <div id="cat-tags-list" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h1 id="form-title" class="text-blue-900 font-bold text-center text-lg mb-6 underline underline-offset-8">បញ្ចូលទំនិញថ្មី</h1>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                        <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                        
                        <div class="p-4 bg-gray-50 border border-dashed border-gray-300 rounded-2xl text-center">
                            <label class="text-[9px] text-gray-400 block mb-2 font-bold uppercase">រូបភាពផលិតផល</label>
                            <input type="file" id="p-file" accept="image/*" class="text-[10px] text-gray-500 mb-2">
                            <input type="hidden" id="p-img">
                            <div id="preview-container" class="hidden flex justify-center mt-2"><img id="img-preview" src="" class="w-16 h-16 object-cover rounded-xl border"></div>
                        </div>

                        <select id="p-cat" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none text-sm">
                            <option value="">ជ្រើសរើសប្រភេទផលិតផល</option>
                        </select>

                        <div class="flex gap-2 pt-2">
                            <button id="btn-save" class="flex-grow bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all text-sm">រក្សាទុកទិន្នន័យ</button>
                            <button id="btn-cancel" class="hidden bg-gray-400 text-white px-6 rounded-2xl font-bold text-sm" onclick="resetForm()">បោះបង់</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col max-h-[450px]">
                    <div class="p-5 bg-gray-50 flex justify-between items-center border-b">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">បញ្ជីផលិតផល</span>
                        <div class="flex gap-1">
                            <button onclick="exportProducts('excel')" class="bg-green-100 text-green-600 px-2 py-1 rounded text-[9px] font-bold hover:bg-green-600 hover:text-white transition-all">EXCEL</button>
                            <button onclick="exportProducts('pdf')" class="bg-red-100 text-red-600 px-2 py-1 rounded text-[9px] font-bold hover:bg-red-600 hover:text-white transition-all">PDF</button>
                            <input type="text" onkeyup="searchProduct(this.value)" placeholder="ស្វែងរក..." class="ml-2 p-1.5 border rounded-lg text-[10px] w-24 outline-none">
                        </div>
                    </div>
                    <div class="overflow-y-auto no-scrollbar">
                        <table class="w-full text-left"><tbody id="product-table-body" class="divide-y divide-gray-100"></tbody></table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col max-h-[500px]">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b">
                        <h2 class="font-bold text-blue-900 text-sm italic underline underline-offset-4">ប្រវត្តិកម្មង់</h2>
                        <div class="flex gap-1">
                            <button onclick="exportOrders('excel')" class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[9px] font-bold hover:bg-blue-600 hover:text-white transition-all">EXCEL</button>
                            <button onclick="exportOrders('pdf')" class="bg-red-100 text-red-600 px-2 py-1 rounded text-[9px] font-bold hover:bg-red-600 hover:text-white transition-all">PDF</button>
                        </div>
                    </div>
                    <div id="order-history-list" class="space-y-4 overflow-y-auto no-scrollbar pr-1"></div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];
        let allOrders = [];

        // --- EXPORT LOGIC ---
        window.exportProducts = (type) => {
            if(allProducts.length === 0) return alert("គ្មានទិន្នន័យ!");
            if(type === 'excel') {
                let csv = "\uFEFFឈ្មោះ,តម្លៃ,ប្រភេទ\n";
                allProducts.forEach(p => csv += `"${p.name}","${p.price}","${p.category}"\n`);
                downloadFile(csv, "Products.csv", "text/csv;charset=utf-8;");
            } else {
                const { jsPDF } = window.jspdf;
                const docPdf = new jsPDF();
                docPdf.text("Product List - Roththa Shop", 14, 15);
                const rows = allProducts.map(p => [p.name, `$${p.price.toFixed(2)}`, p.category]);
                docPdf.autoTable({ head: [['Name', 'Price', 'Category']], body: rows, startY: 20 });
                docPdf.save("Products.pdf");
            }
        };

        window.exportOrders = (type) => {
            if(allOrders.length === 0) return alert("គ្មានទិន្នន័យ!");
            if(type === 'excel') {
                let csv = "\uFEFFថ្ងៃខែ,អតិថិជន,ទំនិញ,សរុប\n";
                allOrders.forEach(o => {
                    const date = o.createdAt?.toDate().toLocaleString('km-KH').replace(/,/g, '') || "";
                    const items = o.items.map(i => `${i.name}(x${i.qty})`).join(' | ');
                    csv += `"${date}","${o.customer_name}","${items}","${o.total_amount}"\n`;
                });
                downloadFile(csv, "Orders.csv", "text/csv;charset=utf-8;");
            } else {
                const { jsPDF } = window.jspdf;
                const docPdf = new jsPDF();
                docPdf.text("Order History - Roththa Shop", 14, 15);
                const rows = allOrders.map(o => [o.createdAt?.toDate().toLocaleDateString() || "", o.customer_name, o.items.map(i => `${i.name}x${i.qty}`).join(', '), o.total_amount]);
                docPdf.autoTable({ head: [['Date', 'Customer', 'Items', 'Total']], body: rows, startY: 20, styles: { fontSize: 8 } });
                docPdf.save("Orders.pdf");
            }
        };

        function downloadFile(content, name, type) {
            const blob = new Blob([content], { type: type });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = name; link.click();
        }

        // --- FIREBASE LOGIC ---
        window.loadCategories = async () => {
            const snap = await getDocs(collection(db, "categories"));
            const list = document.getElementById('cat-tags-list');
            const select = document.getElementById('p-cat');
            list.innerHTML = ''; select.innerHTML = '<option value="">ជ្រើសរើសប្រភេទផលិតផល</option>';
            snap.forEach(res => {
                const cat = res.data().name;
                list.innerHTML += `<span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-100 flex items-center gap-2">${cat} <i onclick="deleteCategory('${res.id}')" class="fas fa-times-circle cursor-pointer text-red-400"></i></span>`;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        };

        document.getElementById('btn-add-cat').onclick = async () => {
            const name = document.getElementById('new-cat-name').value;
            if(!name) return;
            await addDoc(collection(db, "categories"), { name });
            document.getElementById('new-cat-name').value = '';
            loadCategories();
        };

        window.deleteCategory = async (id) => { if(confirm("លុបប្រភេទនេះ?")) { await deleteDoc(doc(db, "categories", id)); loadCategories(); } };

        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('p-img').value = ev.target.result;
                document.getElementById('img-preview').src = ev.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                img: document.getElementById('p-img').value,
                category: document.getElementById('p-cat').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name || !data.price || !data.category) return alert("សូមបំពេញឱ្យគ្រប់!");
            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            resetForm(); loadAllData();
        };

        window.editProduct = (id) => {
            const p = allProducts.find(i => i.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.img;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('img-preview').src = p.img;
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('form-title').innerText = "កែសម្រួលផលិតផល";
            document.getElementById('btn-save').innerText = "អាប់ដេត";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = async (id) => { if(confirm("លុបផលិតផលនេះ?")) { await deleteDoc(doc(db, "products", id)); loadAllData(); } };
        window.deleteOrder = async (id) => { if(confirm("លុបប្រវត្តិកម្មង់?")) { await deleteDoc(doc(db, "orders", id)); loadAllData(); } };

        async function loadAllData() {
            loadCategories();
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = []; pSnap.forEach(d => allProducts.push({id: d.id, ...d.data()}));
            document.getElementById('product-table-body').innerHTML = allProducts.map(p => `
                <tr class="hover:bg-gray-50 border-b border-gray-50">
                    <td class="px-4 py-3 w-16"><img src="${p.img}" class="w-10 h-10 object-cover rounded-xl border"></td>
                    <td class="px-2 py-3"><div class="font-bold text-gray-800 text-[10px]">${p.name}</div><div class="text-red-500 text-[9px] font-bold">$${p.price.toFixed(2)}</div></td>
                    <td class="px-4 py-3 text-right space-x-1">
                        <button onclick="editProduct('${p.id}')" class="text-blue-400 p-1"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-300 p-1"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');

            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            allOrders = []; oSnap.forEach(d => allOrders.push({id: d.id, ...d.data()}));
            document.getElementById('order-history-list').innerHTML = allOrders.map(o => `
                <div class="bg-gray-50 p-4 rounded-2xl border relative border-gray-100 mb-3">
                    <button onclick="deleteOrder('${o.id}')" class="absolute top-3 right-3 text-red-300"><i class="fas fa-times-circle text-lg"></i></button>
                    <div class="font-bold text-blue-900 text-[11px]">${o.customer_name}</div>
                    <div class="text-[9px] text-gray-400 mb-2">${o.createdAt?.toDate().toLocaleString() || ""}</div>
                    <div class="text-[10px] text-gray-600 border-t border-dashed mt-2 pt-2">${o.items.map(i => `<div>• ${i.name} (x${i.qty})</div>`).join('')}</div>
                    <div class="text-right font-bold text-red-600 text-[11px] mt-1 border-t pt-1">សរុប៖ ${o.total_amount}</div>
                </div>`).join('') || "<p class='text-center text-gray-400 text-[10px] py-10'>មិនទាន់មានកុម្ម៉ង់</p>";
        }

        window.resetForm = () => {
            document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = ""; document.getElementById('p-img').value = "";
            document.getElementById('p-file').value = ""; document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('form-title').innerText = "បញ្ចូលទំនិញថ្មី";
            document.getElementById('btn-save').innerText = "រក្សាទុកទិន្នន័យ";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        window.searchProduct = (v) => {
            const term = v.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            document.getElementById('product-table-body').innerHTML = filtered.map(p => `
                <tr class="hover:bg-gray-50 border-b border-gray-50">
                    <td class="px-4 py-3 w-16"><img src="${p.img}" class="w-10 h-10 object-cover rounded-xl border"></td>
                    <td class="px-2 py-3"><div class="font-bold text-gray-800 text-[10px]">${p.name}</div><div class="text-red-500 text-[9px] font-bold">$${p.price.toFixed(2)}</div></td>
                    <td class="px-4 py-3 text-right space-x-1">
                        <button onclick="editProduct('${p.id}')" class="text-blue-400 p-1"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-300 p-1"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        };

        window.onload = loadAllData;
    </script>
</body>
</html>
