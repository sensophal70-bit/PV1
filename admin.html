<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Roththa Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* Style សម្រាប់ពេល Export PDF */
        #pdf-template { font-family: 'Hanuman', serif; padding: 20px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 10px; }
        .pdf-table th { background-color: #f2f2f2; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-blue-50">
                <h2 class="font-bold text-blue-900 mb-4"><i class="fas fa-plus-circle mr-2"></i> បន្ថែមទំនិញ</h2>
                <div class="space-y-3">
                    <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                    <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                    <select id="p-cat" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                        <option value="ទូទៅ">ជ្រើសរើសប្រភេទ</option>
                    </select>
                    <button id="btn-save" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">រក្សាទុក</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            
            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden h-[400px] flex flex-col">
                <div class="p-5 bg-gray-50 flex justify-between items-center border-b">
                    <span class="text-xs font-bold text-gray-500 uppercase">បញ្ជីផលិតផល</span>
                    <div class="flex gap-2">
                        <button onclick="exportProducts('excel')" class="bg-green-100 text-green-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">EXCEL</button>
                        <button onclick="exportProducts('pdf')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">PDF</button>
                    </div>
                </div>
                <div class="overflow-y-auto no-scrollbar flex-grow p-4">
                    <table class="w-full text-left" id="prod-table">
                        <tbody id="product-list" class="divide-y divide-gray-50 text-xs"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 h-[450px] flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="font-bold text-blue-900 text-sm">ប្រវត្តិកម្មង់</h2>
                    <div class="flex gap-2">
                        <button onclick="exportOrders('excel')" class="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">EXCEL</button>
                        <button onclick="exportOrders('pdf')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">PDF</button>
                    </div>
                </div>
                <div id="order-list" class="space-y-4 overflow-y-auto no-scrollbar"></div>
            </div>
        </div>
    </div>

    <div id="pdf-container" style="display: none;">
        <div id="pdf-content">
            <h2 style="text-align: center; color: #1e40af;" id="pdf-title">របាយការណ៍</h2>
            <div id="pdf-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];
        let allOrders = [];

        // --- EXPORT PDF (Support Khmer) ---
        window.exportProducts = (type) => {
            if (type === 'excel') {
                let csv = "\uFEFFឈ្មោះ,តម្លៃ,ប្រភេទ\n";
                allProducts.forEach(p => csv += `"${p.name}","${p.price}","${p.category}"\n`);
                downloadExcel(csv, "Products.csv");
            } else {
                generatePDF("បញ្ជីផលិតផល", `
                    <table class="pdf-table">
                        <thead><tr><th>ឈ្មោះផលិតផល</th><th>តម្លៃ</th><th>ប្រភេទ</th></tr></thead>
                        <tbody>${allProducts.map(p => `<tr><td>${p.name}</td><td>$${p.price}</td><td>${p.category}</td></tr>`).join('')}</tbody>
                    </table>
                `, "Product_List.pdf");
            }
        };

        window.exportOrders = (type) => {
            if (type === 'excel') {
                let csv = "\uFEFFថ្ងៃខែ,អតិថិជន,ទំនិញ,សរុប\n";
                allOrders.forEach(o => {
                    const items = o.items.map(i => `${i.name}x${i.qty}`).join(' | ');
                    csv += `"${o.createdAt?.toDate().toLocaleDateString('km-KH')}","${o.customer_name}","${items}","${o.total_amount}"\n`;
                });
                downloadExcel(csv, "Orders.csv");
            } else {
                generatePDF("ប្រវត្តិការកុម្ម៉ង់", `
                    <table class="pdf-table">
                        <thead><tr><th>ថ្ងៃខែ</th><th>អតិថិជន</th><th>ទំនិញ</th><th>សរុប</th></tr></thead>
                        <tbody>${allOrders.map(o => `<tr><td>${o.createdAt?.toDate().toLocaleDateString('km-KH')}</td><td>${o.customer_name}</td><td>${o.items.map(i => i.name+'x'+i.qty).join(', ')}</td><td>${o.total_amount}</td></tr>`).join('')}</tbody>
                    </table>
                `, "Order_History.pdf");
            }
        };

        function generatePDF(title, htmlContent, fileName) {
            const element = document.getElementById('pdf-content');
            document.getElementById('pdf-title').innerText = title;
            document.getElementById('pdf-body').innerHTML = htmlContent;

            const opt = {
                margin: 10,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function downloadExcel(csv, name) {
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = name; link.click();
        }

        // --- Load Data ---
        async function loadData() {
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = pSnap.docs.map(d => d.data());
            document.getElementById('product-list').innerHTML = allProducts.map(p => `
                <tr><td class="py-3 font-bold">${p.name}</td><td class="py-3 text-red-500">$${p.price}</td></tr>
            `).join('');

            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            allOrders = oSnap.docs.map(d => d.data());
            document.getElementById('order-list').innerHTML = allOrders.map(o => `
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-[11px]">
                    <div class="font-bold text-blue-900">${o.customer_name}</div>
                    <div class="text-gray-500">${o.createdAt?.toDate().toLocaleString('km-KH')}</div>
                    <div class="mt-1 text-red-600 font-bold">សរុប៖ ${o.total_amount}</div>
                </div>
            `).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
