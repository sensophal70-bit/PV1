<div class="bg-blue-800 p-6 rounded-b-[2.5rem] shadow-lg sticky top-0 z-30">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-white text-lg font-bold flex items-center gap-2">
            <i class="fas fa-hard-hat text-yellow-400"></i> Roththa Shop
        </h1>
        <button onclick="toggleHistoryModal()" class="text-white bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">
            <i class="fas fa-history mr-1"></i> ប្រវត្តិកម្មង់
        </button>
    </div>
    <div class="relative">
        <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
        <input type="text" id="search-box" onkeyup="filterProducts()" placeholder="ស្វែងរកផលិតផល..." 
            class="w-full pl-11 p-3.5 rounded-2xl border-none outline-none text-sm shadow-inner">
    </div>
</div>

<div id="history-overlay" class="fixed inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity" onclick="toggleHistoryModal()"></div>
<div id="history-modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[3rem] z-50 modal-up p-6 shadow-2xl max-h-[80vh] flex flex-col">
    <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
    <h2 class="text-center font-bold text-blue-900 mb-4 text-sm uppercase">ប្រវត្តិការកុម្ម៉ង់របស់អ្នក</h2>
    <div id="customer-history-list" class="flex-grow overflow-y-auto space-y-3 no-scrollbar">
        </div>
</div>

<script type="module">
    // ... (កូដ Firebase ខាងលើរក្សាទុកដដែល) ...

    // ១. មុខងារ Checkout បែបថ្មី (មិនចាំបាច់បំពេញឈ្មោះច្រើនដង)
    window.checkout = async () => {
        // ឆែកមើលថាតើមានឈ្មោះក្នុងម៉ាស៊ីនហើយឬនៅ
        let fullName = localStorage.getItem('customer_name');
        let tgUser = localStorage.getItem('customer_tg');

        if (!fullName) {
            fullName = prompt("សូមបញ្ចូលឈ្មោះពេញរបស់អ្នក (បំពេញតែម្តងគត់):");
            if (!fullName) return;
            localStorage.setItem('customer_name', fullName);
        }

        if (!tgUser) {
            tgUser = prompt("សូមបញ្ចូល Username Telegram (ឧ៖ sensophal):");
            if (tgUser) localStorage.setItem('customer_tg', tgUser);
        }

        const tgLink = tgUser ? `https://t.me/${tgUser.replace('@','')}` : "មិនមាន";
        const total = cart.reduce((s, i) => s + (i.qty * i.price), 0);
        const now = new Date();
        const date = now.toLocaleDateString('en-GB');
        const time = now.toLocaleTimeString('en-US', { hour12: true });

        let itemsTxt = cart.map((i, idx) => `${idx + 1}. ${i.name}  (x${i.qty}) = *$${(i.qty * i.price).toFixed(2)}*`).join('\n');

        const message = 
            `🏗 *ការកុម្ម៉ង់ថ្មី (ស្វ័យប្រវត្តិ)*\n` +
            `⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯\n\n` +
            `👤 *អតិថិជន:* ${fullName}\n` +
            `📅 *ថ្ងៃទី:* ${date}\n` +
            `⏰ *ម៉ោង:* ${time}\n` +
            `🔗 *Profile:* [ចុចទីនេះដើម្បី Chat](${tgLink})\n\n` +
            `⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯\n\n` +
            `${itemsTxt}\n\n` +
            `⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯\n` +
            `💰 *សរុប: $${total.toFixed(2)}*\n\n` +
            `🚀 *ផ្ញើចេញពី Roththa Mini App*`;

        try {
            // រក្សាទុកក្នុង Firebase
            await addDoc(collection(db, "orders"), {
                customer_name: fullName,
                items: cart,
                total_amount: `$${total.toFixed(2)}`,
                createdAt: serverTimestamp()
            });

            // ផ្ញើទៅ Telegram
            await fetch(`https://api.telegram.org/bot7981313490:AAEV9-R868xX9vX_5rA-uG6tF65R0eW_U2w/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: "5091763784", text: message, parse_mode: "Markdown" })
            });

            alert("ការកម្មង់ទទួលបានជោគជ័យ!");
            cart = []; 
            updateCartUI(); 
            if(document.getElementById('cart-modal').classList.contains('active')) toggleCartModal();
        } catch (e) { alert("Error!"); }
    };

    // ២. មុខងារបង្ហាញ History សម្រាប់អតិថិជន
    window.toggleHistoryModal = async () => {
        const modal = document.getElementById('history-modal');
        const overlay = document.getElementById('history-overlay');
        const list = document.getElementById('customer-history-list');
        
        modal.classList.toggle('active');
        overlay.classList.toggle('hidden');
        setTimeout(() => overlay.classList.toggle('opacity-0'), 10);

        if (modal.classList.contains('active')) {
            list.innerHTML = "<p class='text-center py-10 text-xs text-gray-400'>កំពុងទាញទិន្នន័យ...</p>";
            const name = localStorage.getItem('customer_name');
            
            // ទាញយកតែ Order ណាដែលមានឈ្មោះដូចអ្នកប្រើបច្ចុប្បន្ន
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            
            let html = "";
            snap.forEach(d => {
                const o = d.data();
                if(o.customer_name === name) { // បង្ហាញតែប្រវត្តិខ្លួនឯង
                    html += `
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] text-gray-400">${o.createdAt?.toDate().toLocaleString() || ""}</span>
                            <span class="text-blue-600 font-bold text-xs">${o.total_amount}</span>
                        </div>
                        <div class="text-[9px] text-gray-500">
                            ${o.items.map(i => `• ${i.name} (x${i.qty})`).join('<br>')}
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || "<p class='text-center py-10 text-xs text-gray-400'>មិនទាន់មានប្រវត្តិកម្មង់</p>";
        }
    };
</script>
