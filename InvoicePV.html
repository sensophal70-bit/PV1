<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Admin Pro - Roththa Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f4f7fa; }
        .table-row:hover { background-color: #f0f4f8; cursor: pointer; }
        .modal-active { display: flex !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:row justify-between items-center mb-6 gap-4 bg-white p-6 rounded-3xl shadow-sm no-print">
            <div>
                <h1 class="text-2xl font-bold text-blue-900 uppercase italic">របាយការណ៍វិក្កយបត្រលម្អិត</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Roththa Shop - Management System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="window.exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-xl text-xs font-bold transition-all shadow-md">
                    <i class="fas fa-file-excel mr-2"></i> EXPORT TO EXCEL
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 no-print">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="s-text" oninput="window.applyFilter()" placeholder="ស្វែងរកឈ្មោះ ឬលេខវិក្កយបត្រ..." 
                    class="w-full pl-11 pr-4 py-3 bg-white rounded-2xl border-none shadow-sm text-xs outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <input type="date" id="s-date" onchange="window.applyFilter()" class="bg-white rounded-2xl border-none shadow-sm p-3 text-xs outline-none">
            <input type="number" id="s-min" oninput="window.applyFilter()" placeholder="តម្លៃទាបបំផុត $" class="bg-white rounded-2xl border-none shadow-sm p-3 text-xs outline-none">
            <input type="number" id="s-max" oninput="window.applyFilter()" placeholder="តម្លៃខ្ពស់បំផុត $" class="bg-white rounded-2xl border-none shadow-sm p-3 text-xs outline-none">
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="invoice-table">
                    <thead class="bg-blue-900 text-white text-[11px] uppercase italic tracking-wider">
                        <tr>
                            <th class="p-5 text-center"><input type="checkbox" id="select-all" onchange="window.toggleAll(this)"></th>
                            <th class="p-5">ល.រ (No.)</th>
                            <th class="p-5">លេខវិក្កយបត្រ</th>
                            <th class="p-5">កាលបរិច្ឆេទ</th>
                            <th class="p-5">ឈ្មោះអតិថិជន</th>
                            <th class="p-5 text-right">តម្លៃសរុប ($)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-[12px] text-gray-600 divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
            <div id="loading" class="p-20 text-center text-gray-400 italic">កំពុងទាញទិន្នន័យ...</div>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="bg-blue-900 p-6 text-white flex justify-between items-center no-print">
                <h2 class="font-bold italic uppercase text-xs tracking-widest">វិក្កយបត្រលម្អិត</h2>
                <button onclick="window.closeModal()" class="text-2xl">&times;</button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-grow" id="print-content">
                <div class="flex justify-between items-start border-b-2 border-dashed pb-6 mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-blue-900">ROTHTHA SHOP</h1>
                        <p class="text-[10px] text-gray-400 font-bold uppercase italic">Construction & Tech Supplies</p>
                    </div>
                    <div class="text-right">
                        <p id="m-id" class="font-bold text-blue-600 text-sm"></p>
                        <p id="m-date" class="text-[10px] text-gray-400 mt-1 font-bold"></p>
                    </div>
                </div>

                <div class="mb-6">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Customer Name:</p>
                    <p id="m-customer" class="font-bold text-gray-800 text-lg"></p>
                </div>

                <table class="w-full text-xs mb-8">
                    <thead class="bg-gray-50 text-gray-400 uppercase italic">
                        <tr>
                            <th class="py-3 px-2 text-left">ទំនិញ</th>
                            <th class="py-3 px-2 text-center">ចំនួន</th>
                            <th class="py-3 px-2 text-right">តម្លៃរាយ</th>
                            <th class="py-3 px-2 text-right">សរុប</th>
                        </tr>
                    </thead>
                    <tbody id="m-items" class="divide-y divide-gray-100"></tbody>
                </table>

                <div class="flex justify-end pt-4 border-t-2 border-blue-900">
                    <div class="w-full md:w-1/2 flex justify-between items-center p-4 bg-blue-50 rounded-2xl">
                        <span class="font-bold text-blue-900 uppercase text-[10px]">Grand Total:</span>
                        <span id="m-total" class="text-2xl font-bold text-red-600"></span>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-gray-50 border-t flex gap-3 no-print">
                <button onclick="window.print()" class="flex-grow bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">
                    <i class="fas fa-print mr-2"></i> Print Invoice
                </button>
                <button onclick="window.closeModal()" class="px-8 bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let masterData = [];

        async function loadData() {
            const snap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            masterData = snap.docs.map((d, index) => {
                const doc = d.data();
                const dObj = doc.createdAt?.toDate();
                return {
                    id: d.id,
                    invNo: "INV-" + d.id.substring(0, 8).toUpperCase(),
                    customer: doc.customer_name || "Unknown",
                    date: dObj ? dObj.toLocaleString('km-KH') : "N/A",
                    rawDate: dObj ? dObj.toISOString().split('T')[0] : "",
                    total: doc.total_amount || "$0.00",
                    val: parseFloat(doc.total_amount?.replace('$', '') || 0),
                    items: doc.items || []
                };
            });
            render(masterData);
            document.getElementById('loading').style.display = 'none';
        }

        function render(list) {
            const body = document.getElementById('table-body');
            body.innerHTML = list.map((inv, i) => `
                <tr class="table-row" onclick="window.viewInfo('${inv.id}')">
                    <td class="p-5 text-center" onclick="event.stopPropagation()">
                        <input type="checkbox" class="row-check" data-id="${inv.id}">
                    </td>
                    <td class="p-5 text-gray-400 font-bold">${i + 1}</td>
                    <td class="p-5 font-mono font-bold text-blue-600">${inv.invNo}</td>
                    <td class="p-5">${inv.date}</td>
                    <td class="p-5 font-bold text-gray-800">${inv.customer}</td>
                    <td class="p-5 text-right font
