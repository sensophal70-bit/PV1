<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Shop Admin - v16.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; padding: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden-panel { display: none !important; }
        .selected-row { background-color: #f0f9ff !important; border-left: 4px solid #3b82f6; }
        .invoice-page { padding: 40px; background: white; page-break-after: always; color: #1e293b; min-height: 11in; }
        table th { background-color: #f8fafc; text-transform: uppercase; font-size: 10px; color: #64748b; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-panel" class="max-w-md mx-auto mt-20 card text-center border-t-8 border-blue-600">
        <h1 class="font-bold text-blue-900 text-2xl mb-6 uppercase italic">Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="លេខកូដសម្ងាត់..." class="w-full p-4 border rounded-2xl text-center mb-4 outline-none focus:ring-2 ring-blue-500">
        <button onclick="window.login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase hover:bg-blue-700 transition">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
            <h2 class="font-bold text-blue-900 italic uppercase">Roththa Shop Admin v16.2</h2>
            <div class="flex gap-2 text-[10px] font-bold">
                <button onclick="window.showModal('cat-modal')" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-xl border border-blue-200">+ ប្រភេទ</button>
                <button onclick="window.showModal('sup-modal')" class="bg-orange-50 text-orange-600 px-3 py-2 rounded-xl border border-orange-200">+ អ្នកផ្គត់ផ្គង់</button>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-3 py-2 rounded-xl text-white bg-red-500">ចាកចេញ</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="card border-t-4 border-blue-600">
                    <h3 id="form-title" class="font-bold text-xs mb-4 uppercase underline text-blue-600 italic">បញ្ចូលទំនិញថ្មី</h3>
                    <div class="space-y-3">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="p-name" placeholder="ឈ្មោះទំនិញ" class="w-full p-2 border rounded-xl text-xs outline-none">
                        <div class="flex gap-2">
                            <select id="p-cat-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-blue-50"></select>
                            <select id="p-sup-select" class="w-1/2 p-2 border rounded-xl text-[10px] font-bold bg-orange-50"></select>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ $" class="w-1/2 p-2 border rounded-xl text-xs font-bold text-emerald-600">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-2 border rounded-xl text-xs">
                        </div>
                        <div id="img-preview-container" class="hidden text-center">
                            <img id="img-view" class="w-16 h-16 rounded mx-auto border mb-2 object-cover shadow-sm">
                        </div>
                        <input type="file" id="p-file" accept="image/*" class="w-full text-[10px] border p-1 rounded-xl bg-gray-50">
                        <input type="hidden" id="p-img">
                        <div class="flex gap-2 pt-2">
                            <button id="btn-save" onclick="window.saveProduct()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow hover:bg-blue-700 transition-all">រក្សាទុក</button>
                            <button id="btn-cancel" onclick="window.cancelEdit()" class="hidden flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold text-xs uppercase">បោះបង់</button>
                        </div>
                    </div>
                </div>

                <div class="card border-t-4 border-orange-500">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-[10px] uppercase text-orange-600 underline italic">ប្រវត្តិការលក់</h3>
                        <div class="flex gap-1">
                            <button onclick="window.exportSelectedInvoices()" class="bg-blue-600 text-white px-2 py-1 rounded text-[8px] font-bold uppercase">Export PDF</button>
                            <button onclick="window.deleteSelectedOrders()" class="bg-red-500 text-white px-2 py-1 rounded text-[8px] font-bold uppercase">លុប</button>
                        </div>
                    </div>
                    <div class="overflow-y-auto max-h-[400px] border rounded-lg">
                        <table class="w-full text-[10px] text-left">
                            <thead class="sticky top-0 z-10">
                                <tr class="border-b">
                                    <th class="p-2 text-center w-8"><input type="checkbox" onclick="window.selectAll('o-chk', this)"></th>
                                    <th class="p-2">អតិថិជន / កាលបរិច្ឆេទ</th><th class="text-right p-2">សរុប ($)</th>
                                </tr>
                            </thead>
                            <tbody id="order-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 card border-t-4 border-emerald-500">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                    <h3 class="font-bold text-xs uppercase text-emerald-700 italic">របាយការណ៍ស្តុកទំនិញ</h3>
                    <div class="relative w-full md:w-64">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                        <input type="text" id="stock-search-input" onkeyup="window.searchStock(this.value)" placeholder="ស្វែងរកទំនិញ..." class="w-full pl-9 p-2 border rounded-2xl text-[10px] outline-none">
                    </div>
                    <button onclick="window.exportStockPDF()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow">Stock PDF</button>
                </div>
                <div class="overflow-x-auto border rounded-xl">
                    <table class="w-full text-[11px] text-left">
                        <thead>
                            <tr class="border-b">
                                <th class="p-3 w-8"><input type="checkbox" onclick="window.selectAll('p-chk', this)"></th>
                                <th class="p-3">រូបភាព</th><th class="p-3">ឈ្មោះ</th><th class="p-3 text-center">ស្តុក</th><th class="p-3 text-right">តម្លៃ</th><th class="p-3 text-center">សកម្មភាព</th>
                            </tr>
                        </thead>
                        <tbody id="product-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-view-panel" class="hidden-panel fixed inset-0 bg-gray-900/95 z-[100] flex flex-col items-center p-4 overflow-y-auto">
        <div class="w-full max-w-4xl flex justify-between mb-4 sticky top-0 bg-gray-900/80 p-3 rounded-2xl backdrop-blur">
            <button onclick="window.showMain()" class="bg-white px-6 py-2 rounded-xl font-bold text-blue-900 shadow-lg">បិទវិញ</button>
            <button id="btn-download" class="bg-emerald-500 text-white px-8 py-2 rounded-xl font-bold uppercase shadow-xl hover:bg-emerald-400">Download PDF</button>
        </div>
        <div id="pdf-render-area" class="w-full max-w-3xl bg-white shadow-2xl rounded"></div>
    </div>

    <div id="cat-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center"><h3 class="font-bold mb-4 uppercase text-sm border-b pb-2 text-blue-700">បន្ថែមប្រភេទផលិតផល</h3><input type="text" id="new-cat" class="w-full p-2 border rounded-xl mb-4 text-center outline-none"><button onclick="window.addCategory()" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold">បន្ថែម</button><div id="cat-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div><button onclick="window.closeModal('cat-modal')" class="w-full mt-4 text-gray-400 text-[10px]">បោះបង់</button></div></div>
    <div id="sup-modal" class="hidden-panel fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center"><h3 class="font-bold mb-4 uppercase text-sm border-b pb-2 text-orange-600">បន្ថែមអ្នកផ្គត់ផ្គង់</h3><input type="text" id="new-sup-name" placeholder="ឈ្មោះ" class="w-full p-2 border rounded-xl mb-2 text-center"><input type="text" id="new-sup-phone" placeholder="លេខទូរស័ព្ទ" class="w-full p-2 border rounded-xl mb-4 text-center"><button onclick="window.addSupplier()" class="w-full bg-orange-600 text-white py-2 rounded-xl font-bold">បន្ថែម</button><div id="sup-list-display" class="mt-4 space-y-1 max-h-40 overflow-y-auto text-[10px]"></div><button onclick="window.closeModal('sup-modal')" class="w-full mt-4 text-gray-400 text-[10px]">បោះបង់</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden-panel');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                window.loadAll();
            } else alert("លេខកូដសម្ងាត់មិនត្រឹមត្រូវ!");
        };

        window.loadAll = async () => {
            const [pSnap, oSnap, cSnap, sSnap] = await Promise.all([
                getDocs(query(collection(db, "products"), orderBy("createdAt", "desc"))),
                getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc"))),
                getDocs(collection(db, "categories")),
                getDocs(collection(db, "suppliers"))
            ]);

            const cSel = document.getElementById('p-cat-select');
            const sSel = document.getElementById('p-sup-select');
            const cList = document.getElementById('cat-list-display');
            const sList = document.getElementById('sup-list-display');
            cSel.innerHTML = sSel.innerHTML = cList.innerHTML = sList.innerHTML = "";
            
            cSnap.forEach(d => {
                cSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                cList.innerHTML += `<div class="flex justify-between bg-gray-50 p-1 border rounded"><span>${d.data().name}</span><button onclick="window.del('categories','${d.id}')" class="text-red-400 px-2">x</button></div>`;
            });
            sSnap.forEach(d => {
                sSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                sList.innerHTML += `<div class="flex justify-between bg-orange-50 p-1 border rounded"><span>${d.data().name}</span><button onclick="window.del('suppliers','${d.id}')" class="text-red-400 px-2">x</button></div>`;
            });

            const pBody = document.getElementById('product-body');
            pBody.innerHTML = "";
            pSnap.forEach(d => {
                const p = d.data();
                pBody.innerHTML += `<tr id="p-row-${d.id}"><td class="p-3 text-center"><input type="checkbox" class="p-chk" data-id="${d.id}" onclick="window.highRow('p-row-${d.id}', this)"></td><td class="p-3"><img src="${p.img || ''}" class="w-10 h-10 rounded border object-cover bg-gray-100"></td><td class="p-3 font-bold">${p.name}</td><td class="p-3 text-center font-bold text-orange-600">${p.stock || 0}</td><td class="p-3 text-right font-bold text-emerald-600">$${(parseFloat(p.price) || 0).toFixed(2)}</td><td class="p-3 text-center"><button onclick="window.editProduct('${d.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button><button onclick="window.del('products','${d.id}')" class="text-red-300"><i class="fas fa-trash"></i></button></td></tr>`;
            });

            const oBody = document.getElementById('order-body');
            oBody.innerHTML = "";
            oSnap.forEach(d => {
                const o = d.data();
                const dt = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString('km-KH') : 'ថ្មីៗនេះ';
                oBody.innerHTML += `<tr id="o-row-${d.id}"><td class="p-2 text-center"><input type="checkbox" class="o-chk" data-id="${d.id}" onclick="window.highRow('o-row-${d.id}', this)"></td><td class="p-2"><div class="font-bold text-slate-700">${o.customer_name}</div><div class="text-[8px] text-gray-400">${dt}</div></td><td class="p-2 text-right font-bold text-blue-600 pr-3">${o.total_amount}</td></tr>`;
            });
        };

        window.saveProduct = async () => {
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat-select').value,
                supplier: document.getElementById('p-sup-select').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                img: document.getElementById('p-img').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name || !data.price) return alert("សូមបំពេញឈ្មោះ និងតម្លៃ!");
            btn.disabled = true;
            try {
                if(id) await updateDoc(doc(db, "products", id), data);
                else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
                window.cancelEdit(); window.loadAll();
            } catch (e) { alert("Error!"); }
            btn.disabled = false;
        };

        window.editProduct = async (id) => {
            const snap = await getDoc(doc(db, "products", id));
            const p = snap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat-select').value = p.category;
            document.getElementById('p-sup-select').value = p.supplier;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-img').value = p.img || "";
            if(p.img) { document.getElementById('img-view').src = p.img; document.getElementById('img-preview-container').classList.remove('hidden'); }
            document.getElementById('form-title').innerText = "កែសម្រួលទំនិញ";
            document.getElementById('btn-save').innerText = "Update Now";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => {
            document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = ""; document.getElementById('p-price').value = ""; document.getElementById('p-stock').value = ""; document.getElementById('p-img').value = ""; document.getElementById('img-preview-container').classList.add('hidden');
            document.getElementById('form-title').innerText = "បញ្ចូលទំនិញថ្មី"; document.getElementById('btn-save').innerText = "រក្សាទុក"; document.getElementById('btn-cancel').classList.add('hidden');
        };

        document.getElementById('p-file').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 400; let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('p-img').value = compressed; document.getElementById('img-view').src = compressed; document.getElementById('img-preview-container').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- EXPORT INVOICE PDF WITH DATE/TIME ---
        window.exportSelectedInvoices = async () => {
            const checked = document.querySelectorAll('.o-chk:checked');
            if(checked.length === 0) return alert("សូមរើសវិក្កយបត្រ!");
            const area = document.getElementById('pdf-render-area');
            area.innerHTML = "";
            for(let c of checked) {
                const snap = await getDoc(doc(db, "orders", c.dataset.id));
                const o = snap.data();
                const total = parseFloat(o.total_amount?.replace('$', '')) || 0;
                const invId = snap.id.substring(0,8).toUpperCase();
                const dateTime = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString('km-KH') : "ថ្មីៗនេះ";
                
                let itemsHTML = (o.items || []).map(it => `<tr><td style="border:1px solid #e2e8f0; padding:8px;">${it.name}</td><td style="border:1px solid #e2e8f0; padding:8px; text-align:center;">${it.qty}</td><td style="border:1px solid #e2e8f0; padding:8px; text-align:right;">$${parseFloat(it.price).toFixed(2)}</td><td style="border:1px solid #e2e8f0; padding:8px; text-align:right;">$${(it.qty * it.price).toFixed(2)}</td></tr>`).join('');

                area.innerHTML += `<div class="invoice-page">
                    <div style="display:flex; justify-content:space-between; border-bottom:4px solid #2563eb; padding-bottom:10px; margin-bottom:20px;">
                        <div><h1 style="margin:0; color:#2563eb; font-size:24px; font-weight:bold;">ROTH THA SHOP</h1><p style="margin:0; font-size:10px;">វិក្កយបត្រ / INVOICE</p></div>
                        <div style="text-align:right;"><p style="margin:0; font-weight:bold;">លេខវិក្កយបត្រ: #${invId}</p><p style="margin:0; font-size:10px; color:#64748b;">កាលបរិច្ឆេទ: ${dateTime}</p></div>
                    </div>
                    <p style="font-size:13px; margin-bottom:15px;">អតិថិជន: <b>${o.customer_name || 'ភ្ញៀវ'}</b></p>
                    <table style="width:100%; border-collapse:collapse; font-size:11px;">
                        <thead style="background:#f8fafc;"><tr><th style="border:1px solid #e2e8f0; padding:10px; text-align:left;">ឈ្មោះទំនិញ</th><th style="border:1px solid #e2e8f0; padding:10px;">ចំនួន</th><th style="border:1px solid #e2e8f0; padding:10px; text-align:right;">តម្លៃ</th><th style="border:1px solid #e2e8f0; padding:10px; text-align:right;">សរុប</th></tr></thead>
                        <tbody>${itemsHTML}</tbody>
                    </table>
                    <div style="text-align:right; margin-top:20px; border-top:2px solid #eee; padding-top:10px;"><h2 style="color:#2563eb; margin:0; font-size:20px;">សរុបទឹកប្រាក់: $${total.toFixed(2)}</h2></div>
                    <div style="margin-top:50px; display:flex; justify-content:space-between; font-size:10px; color:#64748b;">
                        <div style="text-align:center; width:150px; border-top:1px solid #e2e8f0; padding-top:5px;">ហត្ថលេខាអ្នកលក់</div>
                        <div style="text-align:center; width:150px; border-top:1px solid #e2e8f0; padding-top:5px;">ហត្ថលេខាអ្នកទិញ</div>
                    </div>
                </div>`;
            }
            window.showPDFPreview("Invoices_List.pdf");
        };

        window.exportStockPDF = async () => {
            const checked = document.querySelectorAll('.p-chk:checked');
            if(checked.length === 0) return alert("សូមរើសទំនិញ!");
            const area = document.getElementById('pdf-render-area');
            let rowsHTML = "", grandTotal = 0;
            for(let c of checked) {
                const p = (await getDoc(doc(db, "products", c.dataset.id))).data();
                const sub = p.price * p.stock; grandTotal += sub;
                rowsHTML += `<tr><td style="border:1px solid #ddd; text-align:center;"><img src="${p.img}" style="width:40px;height:40px;object-fit:cover;"></td><td style="border:1px solid #ddd; padding:8px;">${p.name}</td><td style="border:1px solid #ddd; text-align:center;">${p.stock}</td><td style="border:1px solid #ddd; text-align:right; padding:8px;">$${p.price.toFixed(2)}</td><td style="border:1px solid #ddd; text-align:right; padding:8px;">$${sub.toFixed(2)}</td></tr>`;
            }
            area.innerHTML = `<div style="padding:40px; font-family:'Hanuman',serif;"><h2 style="text-align:center; color:#059669; border-bottom:2px solid #059669; padding-bottom:10px;">របាយការណ៍ស្តុកទំនិញ</h2><p style="text-align:right; font-size:10px;">កាលបរិច្ឆេទ: ${new Date().toLocaleString('km-KH')}</p><table style="width:100%; border-collapse:collapse; margin-top:20px; font-size:11px;"><thead style="background:#f8fafc;"><tr><th style="border:1px solid #ddd; padding:8px;">រូបភាព</th><th style="border:1px solid #ddd; padding:8px; text-align:left;">ឈ្មោះ</th><th style="border:1px solid #ddd; padding:8px;">ស្តុក</th><th style="border:1px solid #ddd; padding:8px; text-align:right;">តម្លៃ</th><th style="border:1px solid #ddd; padding:8px; text-align:right;">សរុប</th></tr></thead><tbody>${rowsHTML}</tbody><tfoot><tr><td colspan="4" style="text-align:right; padding:15px; font-weight:bold;">សរុបទឹកប្រាក់ក្នុងស្តុកទាំងអស់:</td><td style="text-align:right; padding:15px; font-weight:bold; color:#059669; font-size:14px;">$${grandTotal.toFixed(2)}</td></tr></tfoot></table></div>`;
            window.showPDFPreview("Stock_Report.pdf");
        };

        window.showPDFPreview = (filename) => {
            document.getElementById('admin-main').classList.add('hidden-panel');
            document.getElementById('pdf-view-panel').classList.remove('hidden-panel');
            document.getElementById('btn-download').onclick = () => {
                const opt = { margin: 0.1, filename, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
                html2pdf().from(document.getElementById('pdf-render-area')).set(opt).save();
            };
        };

        window.showMain = () => { document.getElementById('pdf-view-panel').classList.add('hidden-panel'); document.getElementById('admin-main').classList.remove('hidden-panel'); };
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden-panel');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden-panel');
        window.del = async (col, id) => { if(confirm("តើអ្នកពិតជាចង់លុបទិន្នន័យនេះមែនទេ?")) { await deleteDoc(doc(db, col, id)); window.loadAll(); } };
        window.deleteSelectedOrders = async () => {
            const chk = document.querySelectorAll('.o-chk:checked'); if(chk.length === 0) return;
            if(confirm("លុបវិក្កយបត្រដែលបានរើសទាំងនេះ?")) { for(let c of chk) await deleteDoc(doc(db, "orders", c.dataset.id)); window.loadAll(); }
        };
        window.highRow = (rid, el) => document.getElementById(rid).classList.toggle('selected-row', el.checked);
        window.selectAll = (cls, master) => { const chks = document.getElementsByClassName(cls); for(let c of chks) { c.checked = master.checked; window.highRow(c.closest('tr').id, c); } };
        window.searchStock = (q) => { const rows = document.getElementById('product-body').children; for(let r of rows) r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? "" : "none"; };
        window.addCategory = async () => { const n = document.getElementById('new-cat').value; if(n) { await addDoc(collection(db, "categories"), { name: n }); document.getElementById('new-cat').value = ""; window.loadAll(); } };
        window.addSupplier = async () => { const n = document.getElementById('new-sup-name').value; if(n) { await addDoc(collection(db, "suppliers"), { name: n, phone: document.getElementById('new-sup-phone').value }); document.getElementById('new-sup-name').value = ""; window.loadAll(); } };
    </script>
</body>
</html>
