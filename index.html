<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Construction - PV1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <nav class="bg-blue-900 text-white sticky top-0 z-50 shadow-xl">
        <div class="p-4 flex justify-between items-center">
            <h1 class="font-bold text-lg text-yellow-400">Roththa Shop</h1>
            <div class="relative cursor-pointer p-2" onclick="toggleCart()">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-red-600 text-[10px] rounded-full px-1.5 border-2 border-blue-900 font-bold">0</span>
            </div>
        </div>
        <div class="px-4 pb-3">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
                <input type="text" id="search-input" onkeyup="searchProduct()" placeholder="ស្វែងរកផលិតផល..." class="w-full pl-11 p-3 rounded-2xl border-none text-gray-800 outline-none shadow-inner">
            </div>
        </div>
        <div class="flex overflow-x-auto gap-2 px-4 pb-4 no-scrollbar">
            <button onclick="filterCat('ទាំងអស់')" class="whitespace-nowrap px-4 py-1.5 bg-yellow-400 text-blue-900 rounded-full font-bold text-xs shadow">ទាំងអស់</button>
            <button onclick="filterCat('ដែក')" class="whitespace-nowrap px-4 py-1.5 bg-blue-800 text-white rounded-full font-bold text-xs shadow">ដែក</button>
            <button onclick="filterCat('ស៊ីម៉ង់ត៍')" class="whitespace-nowrap px-4 py-1.5 bg-blue-800 text-white rounded-full font-bold text-xs shadow">ស៊ីម៉ង់ត៍</button>
            <button onclick="filterCat('ឥដ្ឋ/ខ្សាច់')" class="whitespace-nowrap px-4 py-1.5 bg-blue-800 text-white rounded-full font-bold text-xs shadow">ឥដ្ឋ/ខ្សាច់</button>
        </div>
    </nav>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4"></div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-4 bg-blue-900 text-white flex justify-between items-center">
            <span class="font-bold text-lg"><i class="fas fa-shopping-basket mr-2"></i>កន្ត្រកទំនិញ</span>
            <button onclick="toggleCart()" class="text-3xl p-2">&times;</button>
        </div>
        
        <div id="cart-items-list" class="flex-grow overflow-y-auto p-4 space-y-3 bg-gray-50">
            <p class="text-center text-gray-400 mt-10 italic">មិនទាន់មានទំនិញ</p>
        </div>

        <div class="p-5 border-t bg-white shadow-lg">
            <div class="flex justify-between items-center font-bold text-xl mb-4 text-red-600">
                <span>សរុប:</span><span id="cart-total">$0.00</span>
            </div>
            <button onclick="sendOrder()" id="btn-submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                <i class="fab fa-telegram-plane mr-2"></i>បញ្ជាក់ការកុម្ម៉ង់
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];

        window.onload = async () => {
            const tele = window.Telegram.WebApp;
            tele.expand();
            const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            allProducts = [];
            querySnapshot.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
            renderProducts(allProducts);
        };

        window.renderProducts = (products) => {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border active:scale-95 transition-transform">
                    <img src="${p.img}" class="w-full h-28 object-cover rounded-xl mb-2">
                    <h3 class="font-bold text-[11px] h-8 overflow-hidden text-gray-700">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-red-600 font-bold text-sm">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})" class="bg-blue-800 text-white w-8 h-8 rounded-lg flex items-center justify-center">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                </div>`).join('');
        };

        window.filterCat = (cat) => {
            const filtered = cat === 'ទាំងអស់' ? allProducts : allProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        };

        window.searchProduct = () => {
            const val = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(val));
            renderProducts(filtered);
        };

        window.sendOrder = async () => {
            if (cart.length === 0) return alert("សូមរើសទំនិញសិន!");
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "កំពុងរក្សាទុក...";

            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            const userName = user ? (user.first_name + (user.last_name ? " " + user.last_name : "")) : "ភ្ញៀវ";
            
            const orderData = {
                customer_name: userName,
                customer_id: user ? user.id : "N/A",
                items: cart,
                total_amount: document.getElementById('cart-total').innerText,
                status: "ថ្មី",
                createdAt: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "orders"), orderData);
                const text = `🏗 *កុម្ម៉ង់ថ្មីពី៖ ${userName}*\nសរុប៖ ${orderData.total_amount}`;
                await fetch(`https://api.telegram.org/bot8790246863:AAGhESD1muJVvaO9DhNxiuqoVmY8dIhEl8U/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: "7453536903", text: text, parse_mode: 'Markdown' })
                });
                alert("✅ បញ្ជូនជោគជ័យ!"); cart = []; updateCartUI(); toggleCart();
            } catch (e) { alert("Error!"); } finally { btn.disabled = false; btn.innerHTML = '<i class="fab fa-telegram-plane mr-2"></i>បញ្ជាក់ការកុម្ម៉ង់'; }
        };
    </script>

    <script>
        let cart = [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        function addToCart(id, name, price) {
            const item = cart.find(i => i.id === id);
            item ? item.qty++ : cart.push({ id, name, price, qty: 1 });
            updateCartUI();
        }

        // មុខងារ បូក ឬ ដកចំនួន (Change Quantity)
        function changeQty(index, amount) {
            if (cart[index].qty + amount > 0) {
                cart[index].qty += amount;
            } else {
                if (confirm("លុបទំនិញនេះ?")) cart.splice(index, 1);
            }
            updateCartUI();
        }

        // មុខងារលុបទំនិញចេញពីកន្ត្រក (Delete)
        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            let total = 0;

            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10 italic text-sm">មិនទាន់មានទំនិញ</p>';
                totalDisplay.innerText = '$0.00';
                countDisplay.innerText = '0';
                return;
            }

            list.innerHTML = cart.map((item, index) => {
                const subTotal = item.price * item.qty;
                total += subTotal;
                return `
                    <div class="bg-white p-3 rounded-2xl border flex flex-col gap-2 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-[11px] text-gray-700 w-3/4">${item.name}</span>
                            <button onclick="removeItem(${index})" class="text-red-400 p-1"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center border rounded-xl bg-gray-50 overflow-hidden">
                                <button onclick="changeQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center font-bold text-red-500 bg-gray-100 hover:bg-red-50">-</button>
                                <span class="w-10 text-center font-bold text-sm text-blue-800">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center font-bold text-green-600 bg-gray-100 hover:bg-green-50">+</button>
                            </div>
                            <span class="font-bold text-blue-700 text-sm">$${subTotal.toFixed(2)}</span>
                        </div>
                    </div>`;
            }).join('');

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = cart.length;
        }
    </script>
</body>
</html>
