<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roththa Admin - Browser Download Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&display=swap');
        body { font-family: 'Hanuman', serif; background-color: #f1f5f9; }
        .hidden-panel { display: none; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .pdf-box { font-family: 'Hanuman', serif !important; padding: 30px; background: white; color: black; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th { background-color: #1e40af; color: white; border: 1px solid #1e3a8a; padding: 10px; font-size: 11px; }
        .pdf-table td { border: 1px solid #ddd; padding: 8px; font-size: 10px; vertical-align: middle; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-panel" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-[2.5rem] shadow-2xl border border-blue-50">
        <div class="text-center mb-6">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 text-2xl">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="font-bold text-blue-900 text-xl text-center">Admin Access</h1>
        </div>
        <input type="password" id="admin-pass" placeholder="បញ្ចូលលេខកូដសម្ងាត់..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none text-center mb-4 focus:ring-2 focus:ring-blue-500">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all text-sm">ចូលប្រព័ន្ធ</button>
    </div>

    <div id="admin-main" class="hidden-panel max-w-[1400px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-6 rounded-[2rem] shadow-xl text-white">
                <div class="text-xs opacity-80 uppercase mb-1">ចំណូលសរុប</div>
                <div id="total-revenue" class="text-3xl font-bold">$0.00</div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-blue-100">
                <div class="text-xs text-gray-400 uppercase mb-1">ការកុម្ម៉ង់</div>
                <div id="total-orders" class="text-3xl font-bold text-blue-900">0</div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-100">
                <div class="text-xs text-gray-400 uppercase mb-1">ស្តុកទំនិញ</div>
                <div id="total-stock-items" class="text-3xl font-bold text-orange-600">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-blue-100">
                    <h2 id="form-title" class="font-bold text-blue-900 mb-6 text-sm"><i class="fas fa-edit mr-2"></i> គ្រប់គ្រងទំនិញ & Supplier</h2>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="ឈ្មោះផលិតផល" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-xs">
                        <select id="p-cat" class="w-full p-3 bg-gray-50 border rounded-xl outline-none text-xs font-bold"></select>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="តម្លៃ ($)" class="w-1/2 p-3 bg-gray-50 border rounded-xl outline-none text-xs">
                            <input type="number" id="p-stock" placeholder="ស្តុក" class="w-1/2 p-3 bg-gray-50 border rounded-xl outline-none text-xs">
                        </div>
                        <div class="p-4 bg-blue-50 rounded-2xl space-y-2 border border-blue-100">
                            <span class="text-[9px] font-bold text-blue-600 uppercase">Supplier Info</span>
                            <input type="text" id="s-name" placeholder="ឈ្មោះអ្នកផ្គត់ផ្គង់" class="w-full p-2.5 bg-white border rounded-lg outline-none text-xs">
                            <input type="text" id="s-phone" placeholder="លេខទូរសព្ទ" class="w-full p-2.5 bg-white border rounded-lg outline-none text-xs">
                        </div>
                        <div class="p-3 bg-gray-50 border border-dashed rounded-xl text-center">
                            <input type="file" id="p-file" accept="image/*" class="text-[10px]">
                            <input type="hidden" id="p-img">
                        </div>
                        <button id="btn-save" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-md active:scale-95 text-sm">រក្សាទុក</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-100 h-[500px] flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-blue-900 italic text-sm">បញ្ជីស្តុកទំនិញ</h2>
                        <button onclick="exportData('product')" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider border border-red-100">Export Stock</button>
                    </div>
                    <div class="overflow-y-auto no-scrollbar flex-grow">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-gray-400 border-b sticky top-0 bg-white">
                                <tr><th>រូបភាព</th><th>ឈ្មោះ</th><th>ស្តុក</th><th class="text-right">តម្លៃ</th><th class="text-right">សកម្មភាព</th></tr>
                            </thead>
                            <tbody id="product-list" class="divide-y divide-gray-50 text-xs"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 h-[450px] flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-blue-900 italic text-sm">ប្រវត្តិការកម្មង់</h2>
                        <button onclick="exportData('order')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider border border-blue-100">Export Orders</button>
                    </div>
                    <div id="order-list" class="space-y-3 overflow-y-auto no-scrollbar flex-grow"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pdf-overlay" class="fixed inset-0 bg-white z-[100] hidden overflow-y-auto p-4 md:p-10">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6 bg-gray-50 p-4 rounded-2xl border">
                <button onclick="closePDFPreview()" class="flex items-center gap-2 text-blue-600 font-bold text-xs bg-white px-4 py-2 rounded-xl shadow-sm border active:scale-95">
                    <i class="fas fa-arrow-left"></i> ត្រឡប់ក្រោយ (Back)
                </button>
                <div id="download-link-container"></div>
            </div>

            <div id="pdf-content" class="pdf-box shadow-xl border rounded-lg overflow-hidden">
                <h1 style="text-align: center; color: #1e40af; border-bottom: 2px solid #1e40af; padding-bottom: 10px; font-size: 18px;" id="pdf-title"></h1>
                <p style="text-align: right; font-size: 9px; color: #666; margin-top: 5px;">បង្កើតនៅ៖ <span id="pdf-date"></span></p>
                <div id="pdf-table-area"></div>
                <div id="pdf-footer-total" style="margin-top: 20px; text-align: right; font-weight: bold; font-size: 14px; color: #d32f2f;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZowMF95RsoC3c3xkyFv4kMvjI",
            authDomain: "roththa-shop.firebaseapp.com",
            projectId: "roththa-shop",
            storageBucket: "roththa-shop.firebasestorage.app",
            messagingSenderId: "570621300574",
            appId: "1:570621300574:web:5448479ab7727038e9c402"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [], allOrders = [];

        window.checkLogin = () => {
            if(document.getElementById('admin-pass').value === "12345") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-main').classList.remove('hidden-panel');
                loadAll();
            } else alert("លេខកូដខុស!");
        };

        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => document.getElementById('p-img').value = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-save').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                img: document.getElementById('p-img').value,
                supplier_name: document.getElementById('s-name').value,
                supplier_phone: document.getElementById('s-phone').value,
                updatedAt: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, "products", id), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "products"), data); }
            location.reload(); 
        };

        async function loadAll() {
            const pSnap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            allProducts = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('total-stock-items').innerText = allProducts.length;
            document.getElementById('product-list').innerHTML = allProducts.map(p => `
                <tr class="border-b">
                    <td class="py-2"><img src="${p.img}" class="w-8 h-8 rounded object-cover"></td>
                    <td><div class="font-bold">${p.name}</div></td>
                    <td class="text-center font-bold text-orange-600">${p.stock}</td>
                    <td class="text-right font-bold text-red-500">$${p.price.toFixed(2)}</td>
                    <td class="text-right">
                        <button onclick="editProduct('${p.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                    </td>
                </tr>`).join('');

            const oSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            allOrders = oSnap.docs.map(d => ({id: d.id, ...d.data()}));
            let revenue = 0;
            allOrders.forEach(o => revenue += parseFloat(o.total_amount.replace('$', '')));
            document.getElementById('total-revenue').innerText = `$${revenue.toFixed(2)}`;
            document.getElementById('total-orders').innerText = allOrders.length;
            document.getElementById('order-list').innerHTML = allOrders.map(o => `
                <div class="bg-gray-50 p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold text-blue-900 text-[11px]">${o.customer_name}</div>
                        <div class="text-[8px] text-gray-400">${o.createdAt?.toDate().toLocaleString('km-KH')}</div>
                    </div>
                    <div class="text-right font-bold text-red-600 text-[11px]">${o.total_amount}</div>
                </div>`).join('');
        }

        window.closePDFPreview = () => {
            document.getElementById('pdf-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        // --- BROWSER DOWNLOAD LINK LOGIC ---
        window.exportData = async (target) => {
            const data = (target === 'product') ? allProducts : allOrders;
            const area = document.getElementById('pdf-table-area');
            const footer = document.getElementById('pdf-footer-total');
            const overlay = document.getElementById('pdf-overlay');
            const linkContainer = document.getElementById('download-link-container');
            
            document.getElementById('pdf-title').innerText = target === 'product' ? "របាយការណ៍ស្តុកទំនិញ" : "របាយការណ៍លក់";
            document.getElementById('pdf-date').innerText = new Date().toLocaleString('km-KH');

            let html = `<table class="pdf-table"><thead><tr>`;
            let grandTotal = 0;

            if(target === 'product') {
                html += `<th>រូបភាព</th><th>ឈ្មោះ</th><th>Supplier</th><th>ស្តុក</th><th>តម្លៃ</th></tr></thead><tbody>`;
                data.forEach(p => html += `<tr><td><img src="${p.img}" crossOrigin="anonymous" style="width:30px;height:30px;"></td><td>${p.name}</td><td>${p.supplier_name || '-'}</td><td style="text-align:center;">${p.stock}</td><td style="text-align:right;">$${p.price.toFixed(2)}</td></tr>`);
            } else {
                html += `<th>ពេលវេលា</th><th>អតិថិជន</th><th>ទំនិញ (Qty)</th><th>សរុប ($)</th></tr></thead><tbody>`;
                data.forEach(o => {
                    grandTotal += parseFloat(o.total_amount.replace('$', ''));
                    const items = o.items.map(i => `${i.name} (x${i.qty})`).join(', ');
                    html += `<tr><td>${o.createdAt?.toDate().toLocaleString('km-KH')}</td><td>${o.customer_name}</td><td style="font-size:8px;">${items}</td><td style="text-align:right;">${o.total_amount}</td></tr>`;
                });
            }

            area.innerHTML = html + `</tbody></table>`;
            footer.innerText = grandTotal > 0 ? `សរុបចំណូល៖ $${grandTotal.toFixed(2)}` : "";

            overlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            // Generate Blob Link for Browser Download
            linkContainer.innerHTML = `<span class="text-blue-400 text-[10px] animate-pulse">កំពុងបង្កើត Link...</span>`;
            
            const canvas = await html2canvas(document.getElementById('pdf-content'), { scale: 2, useCORS: true });
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            
            // Create Blob URL
            const blob = pdf.output('blob');
            const url = URL.createObjectURL(blob);
            const fileName = `${target}_report_${new Date().getTime()}.pdf`;

            // Display as a Real Browser Download Link
            linkContainer.innerHTML = `
                <a href="${url}" download="${fileName}" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-blue-200 active:scale-95 transition-all">
                    <i class="fas fa-download"></i> ចុចទីនេះដើម្បី Download
                </a>
            `;
        };
        
        window.loadAll = loadAll;
    </script>
</body>
</html>
